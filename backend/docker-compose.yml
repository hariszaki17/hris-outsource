# Local dev dependencies. Postgres is the only hard dependency (River queue lives
# in it too — no Redis). otel-collector is optional; leave OTEL endpoint empty to skip.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hris
      POSTGRES_PASSWORD: hris
      POSTGRES_DB: hris
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hris"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Object storage (S3-compatible) behind a single PRIVATE bucket. The API never
  # proxies file bytes — it hands clients short-TTL presigned URLs. First used by
  # E2 profile photos; reused by E5 attendance selfies. API talks to it via
  # STORAGE_ENDPOINT=localhost:9000; the console UI is on :9001.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API (presigned PUT/GET)
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: an OTLP collector for traces. Point OTEL_EXPORTER_OTLP_ENDPOINT
  # at http://localhost:4318 to use it.
  # otel-collector:
  #   image: otel/opentelemetry-collector:latest
  #   ports: ["4318:4318"]

volumes:
  pgdata:
  miniodata:
