# Lint config — the Go-side counterpart to the frontend's Biome.
run:
  timeout: 5m
  tests: true

# Generated code is the contract output; never hand-edited, never linted.
issues:
  exclude-dirs:
    - api/gen
    - internal/repository/sqlc
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec]

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gofumpt
    - revive
    - gosec
    - bodyclose
    - sqlclosecheck
    - contextcheck
    - errorlint
    - noctx

linters-settings:
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: exported
        disabled: true # spec types carry their own doc burden; don't double-document
