# Ephemeral Postgres for E2E tests — port 5433 (avoids clash with dev 5432).
# tmpfs keeps data in RAM: fast startup, no leftover state between CI runs.
# Managed by globalSetup / globalTeardown via `docker compose -f docker-compose.e2e.yml up/down`.
services:
  e2e-postgres:
    image: postgres:16
    container_name: swp-e2e-postgres
    environment:
      POSTGRES_USER: hris
      POSTGRES_PASSWORD: hris
      POSTGRES_DB: hris_e2e
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hris -d hris_e2e"]
      interval: 2s
      timeout: 3s
      retries: 15
