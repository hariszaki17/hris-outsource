# Static SPA server (inside the web container). The HOST nginx terminates TLS
# and proxies here; this just serves the built Vite bundle with SPA fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Hashed assets are immutable; cache hard.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routes -> index.html (TanStack Router handles client routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the shell.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
