# ADDITIVE host vhost for the HRIS staging app. Drop into
# /etc/nginx/conf.d/hris.conf — does NOT touch any lumen-* / mig.id vhost.
# `sudo nginx -t` then `sudo nginx -s reload` (zero downtime to neighbours).
# Then: `sudo certbot --nginx -d swp-hris.duckdns.org` (injects 443 + redirect).
server {
    listen 80;
    listen [::]:80;
    server_name swp-hris.duckdns.org;

    client_max_body_size 8m;

    # JSON API -> Go (path /api/v1 preserved; backend routes under /api/v1).
    location /api/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MinIO presigned object access (path-style: /<bucket>/<key>?X-Amz-...).
    # Bucket is `hris-private`. Pass through untouched so the SigV4 stays valid.
    location /hris-private/ {
        proxy_pass         http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # SPA (everything else) -> web container.
    location / {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
