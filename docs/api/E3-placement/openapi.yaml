openapi: 3.1.0
info:
  title: SWP HRIS — E3 Placement Management API
  version: 1.0.0
  description: |
    Placement is the **product differentiator** for SWP's HRIS. This spec covers the
    full lifecycle of a `Placement` (the work designation of an SWP agent to a client
    company, in a service line, for a contract period) and the `ShiftLeaderAssignment`
    that ties an agent to the leader role at a given company.

    ### Invariants enforced by this API (E3 FEATURE.md §4)
    - **INV-1** — an agent has at most one *active* placement at any moment.
    - **INV-2** — a client company with active placements has exactly one shift leader.
    - **INV-3** — a shift leader leads exactly one company (strict 1:1).
    - **INV-4** — the designated shift leader must themselves be an agent actively placed at that same company.

    Each invariant violation surfaces as a `409 Conflict` with a stable
    `error.code` (`INV_1_VIOLATION` … `INV_4_VIOLATION`) and a structured
    `INVViolationDetails` payload so the frontend can render the right
    inline-warning state (Wave 2.3 INV variants).

    Conventions inherited from `docs/api/CONVENTIONS.md` — when this spec
    conflicts with that doc, **CONVENTIONS.md wins**.

    Cross-epic dependencies:
      - **E2** — every placement references an existing `agreement_id` (`SWP-AG-*`),
        `employee_id` (`SWP-EMP-*`), `client_company_id` (`SWP-CMP-*`),
        `service_line_id` (`SWP-SVC-*`), `position_id` (`SWP-POS-*`).
      - **E4** — ending/transferring a placement cancels future schedules for the
        agent (cache-invalidation side effect; not exposed in this spec).
      - **E10** — every transition fires notifications (HR / agent / shift leader);
        fire-and-forget per CONVENTIONS §16.2.
  contact:
    name: SWP HRIS product+architecture
    email: hris-team@swp.example.com

servers:
  - url: https://api.swp.example.com/api/v1
    description: Production
  - url: https://api.staging.swp.example.com/api/v1
    description: Staging

tags:
  - name: placements
    description: |
      Placement CRUD + lifecycle actions (create, edit, transfer, renew,
      end, terminate, resign). Roster reads live under the
      `client-companies` tag (cross-resource).
  - name: shift-leader-assignments
    description: |
      Per-company shift leader designation. Enforces INV-2/3/4 server-side.
  - name: client-companies
    description: |
      Per-company roster projection (read-only; placement editing lives under
      `placements`).

security:
  - bearerAuth: []

paths:
  # ─────────────────────────────────────────────────────────────────────────
  # Placements
  # ─────────────────────────────────────────────────────────────────────────
  /placements:
    get:
      operationId: listPlacements
      tags: [placements]
      summary: List placements (also serves global roster queries)
      description: |
        Returns placements matching the filters. Doubles as the global
        cross-company roster source (per-company roster is a convenience
        view at `/client-companies/{company_id}/roster`).

        Cursor pagination per CONVENTIONS §8. Default sort:
        `status_changed_at:desc` (active first via `lifecycle_status`).
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          description: Exact-match on `lifecycle_status`. Use `status__in` for multi-value.
          schema: { $ref: '#/components/schemas/PlacementLifecycleStatus' }
        - name: status__in
          in: query
          description: Multi-value status filter (CSV).
          schema:
            type: string
            example: ACTIVE,EXPIRING
        - name: company_id
          in: query
          description: Filter by client company ID.
          schema: { type: string, example: SWP-CMP-014 }
        - name: service_line_id
          in: query
          schema: { type: string, example: SWP-SVC-003 }
        - name: employee_id
          in: query
          schema: { type: string, example: SWP-EMP-1042 }
        - name: agreement_id
          in: query
          description: Filter by the parent employment agreement (E2).
          schema: { type: string, example: SWP-AG-882 }
        - name: awaiting_agreement
          in: query
          description: |
            Compliance filter. When `true`, returns only placements created
            without an employment agreement yet (`agreement_id` null /
            `awaiting_agreement = true`) — the "pending agreement" backlog
            (BR-1, EPICS §8 2026-06-11). When `false`, only placements that
            already have an agreement. Omit for both.
          schema: { type: boolean }
        - name: expiring_within_days
          in: query
          description: |
            Convenience filter: returns placements whose `end_date` falls
            within N days from today (Asia/Jakarta). Equivalent to
            `end_date__lte=today+N AND lifecycle_status__in=ACTIVE,EXPIRING`.
            N must be 1..365.
          schema:
            type: integer
            minimum: 1
            maximum: 365
            example: 30
        - name: start_date__gte
          in: query
          schema: { type: string, format: date, example: '2026-01-01' }
        - name: start_date__lte
          in: query
          schema: { type: string, format: date }
        - name: end_date__gte
          in: query
          schema: { type: string, format: date }
        - name: end_date__lte
          in: query
          schema: { type: string, format: date }
        - name: include_history
          in: query
          description: |
            When `true`, includes terminal states (ENDED, TERMINATED, RESIGNED,
            TRANSFERRED, SUPERSEDED). Default `false` returns only
            ACTIVE / SCHEDULED / EXPIRING / PENDING_START.
          schema:
            type: boolean
            default: false
        - name: q
          in: query
          description: Free-text search on agent name, agent ID, company name.
          schema: { type: string }
        - name: sort
          in: query
          description: |
            Comma-separated `field:asc|desc`. Allowed fields:
            `start_date`, `end_date`, `status_changed_at`, `created_at`.
          schema:
            type: string
            example: 'end_date:asc'
      responses:
        '200':
          description: Page of placements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacementListResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      x-design-screens:
        - C2SSLA  # Companies list (computes counts from this)
        - nLN4d   # HR roster
        - o5Txgg  # SL roster (read-only)

    post:
      operationId: createPlacement
      tags: [placements]
      summary: Create a placement (AP-1)
      description: |
        Creates a placement. Per F3.1 BR-5:
          - if `start_date <= today` (Asia/Jakarta) → `lifecycle_status = ACTIVE`
          - if `start_date > today` → `lifecycle_status = PENDING_START` (a.k.a. Scheduled)

        **Invariants enforced server-side:**
        - INV-1 — `409 INV_1_VIOLATION` if the employee already has an
          `ACTIVE`/`EXPIRING`/`PENDING_START` placement that overlaps the new period.
          Response `error.details` includes the conflicting placement so the
          frontend can render the "End or Transfer existing?" prompt
          (PRD F3.1 Gherkin "Block double-booking").

        **Employment agreement is optional at create** (EPICS §8 2026-06-11,
        supersedes the original BR-1 mandatory rule). If `agreement_id` is
        omitted, the placement is created **awaiting agreement**
        (`awaiting_agreement: true`) — the agent can start work before the
        PKWT/PKWTT is finalized; the agreement is backfilled later via
        `POST /placements/{id}/agreement`. `awaiting_agreement` is an
        orthogonal compliance flag, **not** a lifecycle state. No period /
        contract validation runs when no agreement is supplied, and
        `end_date` may be open-ended.

        **Business-rule validations (`422`):**
        - `PLACEMENT_OUTSIDE_CONTRACT` — **only when `agreement_id` is
          supplied** — period falls outside the agreement's validity.
          For `PKWT` the server **auto-caps** `end_date` to the agreement end
          (BR-1b) — response is `201` with `auto_capped: true` and a warning;
          only an explicitly out-of-range *start* triggers 422.
        - `PLACEMENT_PERIOD_OVERLAP` — overlaps a prior terminal placement (rare; only
          if a buffer rule is hit and no active conflict was found).
        - `COMPANY_INACTIVE` — `client_company_id` is not `ACTIVE` (409 per BR-3).
        - `INVALID_REQUEST` with `fields.end_date` — `end_date <= start_date` (BR-4).
        - `INVALID_REQUEST` with `fields.backdate_reason` — `start_date < today`
          without a reason (BR-6).

        Soft warning (NOT an error): when the target company has no active
        shift leader, the placement is still created (201) with
        `warnings: ["NO_SHIFT_LEADER_AT_COMPANY"]` (BR-8).

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlacementWriteRequest'
            examples:
              immediate:
                summary: HR Admin Sari creates an immediate Parking placement for Budi
                value:
                  employee_id: SWP-EMP-1042
                  agreement_id: SWP-AG-882
                  client_company_id: SWP-CMP-014
                  site_id: SWP-SITE-501
                  service_line_id: SWP-SVC-003
                  position_id: SWP-POS-021
                  start_date: '2026-06-03'
                  end_date: '2026-12-31'
                  notes: 'Replacement for Andi (resigned).'
              pendingAgreement:
                summary: |
                  Placement created WITHOUT an agreement yet — agent starts
                  work before the PKWT is finalized (awaiting_agreement: true).
                  No period/contract check runs; end_date left open-ended.
                value:
                  employee_id: SWP-EMP-1042
                  client_company_id: SWP-CMP-014
                  site_id: SWP-SITE-501
                  service_line_id: SWP-SVC-003
                  position_id: SWP-POS-021
                  start_date: '2026-06-09'
                  notes: 'Mulai bertugas; PKWT menyusul (perjanjian akan dilampirkan kemudian).'
              future:
                summary: Future-dated (PENDING_START) placement
                value:
                  employee_id: SWP-EMP-1042
                  agreement_id: SWP-AG-882
                  client_company_id: SWP-CMP-014
                  site_id: SWP-SITE-501
                  service_line_id: SWP-SVC-003
                  position_id: SWP-POS-021
                  start_date: '2026-07-01'
                  end_date: '2027-06-30'
              backdated:
                summary: Backdated by HR Admin (requires reason)
                value:
                  employee_id: SWP-EMP-1042
                  agreement_id: SWP-AG-882
                  client_company_id: SWP-CMP-014
                  site_id: SWP-SITE-501
                  service_line_id: SWP-SVC-003
                  position_id: SWP-POS-021
                  start_date: '2026-05-15'
                  end_date: '2026-12-31'
                  backdate_reason: 'Onboarding doc lost; agent has worked since 15 Mei per timesheets.'
      responses:
        '201':
          description: |
            Placement created. `Location` header points to the new resource.
            May include `warnings[]` (e.g. `NO_SHIFT_LEADER_AT_COMPANY`,
            `END_DATE_AUTO_CAPPED_TO_AGREEMENT`).
          headers:
            Location:
              schema: { type: string, example: '/api/v1/placements/SWP-PL-1207' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacementCreateResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Invariant or state conflict. Inspect `error.code`:
              - `INV_1_VIOLATION` — employee already has an active placement
                (see `error.details.current_placement`).
              - `COMPANY_INACTIVE` — target company is not active.
              - `IDEMPOTENCY_KEY_REUSED`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                inv1:
                  summary: INV-1 — employee already placed
                  value:
                    error:
                      code: INV_1_VIOLATION
                      message: 'Agen sudah memiliki penempatan aktif. Akhiri atau transfer terlebih dahulu.'
                      fields:
                        employee_id: 'Sudah memiliki penempatan aktif di Mall Kelapa Gading.'
                      details:
                        invariant: INV_1
                        current_placement:
                          id: SWP-PL-988
                          employee_id: SWP-EMP-1042
                          client_company_id: SWP-CMP-009
                          client_company_name: 'Mall Kelapa Gading'
                          service_line_id: SWP-SVC-003
                          lifecycle_status: ACTIVE
                          start_date: '2025-09-01'
                          end_date: '2026-08-31'
                        suggested_actions: [transfer, end]
                      request_id: req_01J5XK22YR8
                companyInactive:
                  summary: BR-3 — inactive company
                  value:
                    error:
                      code: COMPANY_INACTIVE
                      message: 'Perusahaan klien tidak aktif. Tidak dapat membuat penempatan.'
                      fields:
                        client_company_id: 'Status perusahaan: ARCHIVED.'
                      request_id: req_01J5XK22YR9
        '422':
          description: |
            Semantic validation failure. Specific `error.code`:
              - `PLACEMENT_OUTSIDE_CONTRACT`
              - `PLACEMENT_PERIOD_OVERLAP`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                outsideContract:
                  value:
                    error:
                      code: PLACEMENT_OUTSIDE_CONTRACT
                      message: 'Periode penempatan di luar masa berlaku perjanjian kerja.'
                      fields:
                        start_date: 'Sebelum perjanjian dimulai (2026-06-01).'
                      details:
                        agreement_id: SWP-AG-882
                        agreement_type: PKWT
                        agreement_start: '2026-06-01'
                        agreement_end: '2027-05-31'
                      request_id: req_01J5XK22YRA
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - g3OzZz  # Buat Penempatan create form
      x-idempotent: true

  /placements/{id}/agreement:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: backfillPlacementAgreement
      tags: [placements]
      summary: Attach (backfill) the employment agreement to a pending placement (AP-2)
      description: |
        Attaches an `agreement_id` to a placement that was created
        **awaiting agreement** (EPICS §8 2026-06-11; BR-1 supersession).
        Clears the `awaiting_agreement` flag and re-runs the
        period-within-agreement validation:
          - `PLACEMENT_OUTSIDE_CONTRACT` (422) if the start lies outside the
            agreement validity.
          - For `PKWT`, an out-of-range `end_date` is **auto-capped** to the
            agreement end (BR-1b) — `200` with
            `warnings: ["END_DATE_AUTO_CAPPED_TO_AGREEMENT"]`.

        Returns the updated placement with `awaiting_agreement: false`.

        Idempotent re-attachment of the **same** agreement is a no-op `200`.
        A placement that already has an agreement (not awaiting) is rejected
        `422` (`error.code: AGREEMENT_ALREADY_SET`); use `:renew`/`:transfer`
        to move an agreement.

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlacementAgreementBackfillRequest'
            examples:
              backfill:
                summary: Attach the finalized PKWT to a pending placement
                value:
                  agreement_id: SWP-AG-882
      responses:
        '200':
          description: |
            Agreement attached; `awaiting_agreement` now false. May include
            `warnings: ["END_DATE_AUTO_CAPPED_TO_AGREEMENT"]` (BR-1b).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: |
            `NOT_FOUND` — no placement with this `id`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: "`TERMINAL_STATE_IMMUTABLE` — placement is in a terminal state."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            Semantic validation failure. Specific `error.code`:
              - `PLACEMENT_OUTSIDE_CONTRACT` — placement start lies outside
                the agreement validity (same check as create, BR-1b).
              - `AGREEMENT_NOT_OWNED` — the agreement does not belong to the
                placement's agent (`employee_id`).
              - `AGREEMENT_ALREADY_SET` — placement already has an agreement
                (not awaiting); nothing to backfill.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                notOwned:
                  summary: Agreement belongs to a different agent
                  value:
                    error:
                      code: AGREEMENT_NOT_OWNED
                      message: 'Perjanjian kerja bukan milik agen pada penempatan ini.'
                      fields:
                        agreement_id: 'Milik agen lain (SWP-EMP-0917).'
                      request_id: req_01J5XK22YRE
                outsideContract:
                  summary: Period outside the attached agreement
                  value:
                    error:
                      code: PLACEMENT_OUTSIDE_CONTRACT
                      message: 'Periode penempatan di luar masa berlaku perjanjian kerja.'
                      fields:
                        start_date: 'Sebelum perjanjian dimulai (2026-06-15).'
                      details:
                        agreement_id: SWP-AG-882
                        agreement_type: PKWT
                        agreement_start: '2026-06-15'
                        agreement_end: '2027-06-14'
                      request_id: req_01J5XK22YRF
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79   # Lampirkan perjanjian action on Detail Penempatan
      x-idempotent: true

  /placements/{id}:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    get:
      operationId: getPlacement
      tags: [placements]
      summary: Get a placement with history chain (PL-1)
      description: |
        Returns the placement plus the full history chain via
        `predecessor_id`/`successor_id`. The `history_chain` field is a
        flat ordered list (oldest → newest) of the chain this placement
        belongs to, so the client can render the Riwayat panel without
        N+1 fetches.
      responses:
        '200':
          description: Placement detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlacementDetailResponse'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader, agent]
        scope: company_or_global  # agent: self only; SL: own company only
      x-design-screens:
        - pFR79   # Detail Penempatan
        - mqGEi   # Mobile · Penempatan Saya (agent)

    patch:
      operationId: updatePlacement
      tags: [placements]
      summary: Edit limited placement fields
      description: |
        Edits a non-terminal placement. **Read-only fields** (rejected
        with `INVALID_REQUEST` if present in body): `employee_id`,
        `agreement_id`, `client_company_id`, `service_line_id`,
        `start_date`, `lifecycle_status`, `predecessor_id`, `successor_id`,
        `created_at`, `updated_at`, `created_by`. Use action endpoints
        (`:transfer`, `:renew`, `:end`, `:terminate`, `:resign`) for
        anything that changes the chain or lifecycle.

        Editable: `position_id`, `end_date` (within agreement / BR-1b),
        `notes`.

        Terminal-state placements (LC-1) reject all edits with
        `409 TERMINAL_STATE_IMMUTABLE` except via Super Admin override
        (out of scope for v1 here; flagged for E1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlacementPatchRequest'
            examples:
              fixNotes:
                value:
                  notes: 'Pindah pos parkir Lantai B2 — disesuaikan dengan supervisor site.'
      responses:
        '200':
          description: Updated placement.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `TERMINAL_STATE_IMMUTABLE` — placement is in a terminal state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79   # Detail Penempatan (inline edit)

  /placements/{id}:transfer:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: transferPlacement
      tags: [placements]
      summary: Transfer agent to a new company / service line (RT-1)
      description: |
        Atomically: (1) closes the current placement with
        `ended_reason = TRANSFERRED` and `ended_at = effective_date − 1 day`
        (1-day buffer, F3.1 BR-2); (2) creates a successor placement at the
        new company/service-line/position with `predecessor_id` set; (3) if
        the agent was the shift leader of the **old** company, vacates that
        leadership (auto-end SLA with `vacated_reason = PLACEMENT_ENDED`)
        and raises a vacancy (SL-6).

        Both writes succeed or fail together (TR-6).

        If the **new** company has no leader, the response includes
        `warnings: ["NO_SHIFT_LEADER_AT_DESTINATION"]` (TR-5).

        If the destination is the same company *and* same service line,
        rejected `422 RULE_VIOLATION` (TR-1: must be an actual change —
        use `:renew` instead).

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            examples:
              transferToPlazaSenayan:
                summary: Transfer Budi from Mall Kelapa Gading → Plaza Senayan
                value:
                  new_client_company_id: SWP-CMP-014
                  new_service_line_id: SWP-SVC-002
                  new_position_id: SWP-POS-031
                  new_start_date: '2026-07-01'
                  new_end_date: '2027-06-30'
                  new_agreement_id: SWP-AG-882
                  transfer_reason: 'Rotasi rutin — pengembangan skill Building Mgmt.'
                  transfer_note: 'New office: Plaza Senayan tower B.'
      responses:
        '201':
          description: |
            Successor placement created; predecessor closed. Returns both.
          headers:
            Location:
              schema: { type: string, example: '/api/v1/placements/SWP-PL-1208' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `COMPANY_INACTIVE` (destination archived) · `INV_1_VIOLATION`
            (rare: agent was already in another non-terminal placement
            outside the one being transferred) · `TERMINAL_STATE_IMMUTABLE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79   # Transfer button on Detail
      x-idempotent: true

  /placements/{id}:renew:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: renewPlacement
      tags: [placements]
      summary: Renew (same company + service line) via linked successor (PL-3)
      description: |
        F3.2 LC-7. Creates a **successor placement** with the same
        `employee_id`, `client_company_id`, `service_line_id`, and
        `position_id` (overridable in the request), and sets the prior
        placement to `SUPERSEDED` effective the successor's `start_date`.
        Honours the 1-day buffer (F3.1 BR-2).

        If a PKWT agreement has been extended in E2, the successor may
        extend up to the new agreement end (LC-8 / BR-1b auto-cap).

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewRequest'
            examples:
              standardRenewal:
                summary: Renew Budi at Plaza Senayan for 12 more months
                value:
                  new_start_date: '2027-01-01'
                  new_end_date: '2027-12-31'
                  new_agreement_id: SWP-AG-991
                  notes: 'Renewal under new PKWT 2027.'
      responses:
        '201':
          description: Successor placement created; predecessor → SUPERSEDED.
          headers:
            Location:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenewResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `TERMINAL_STATE_IMMUTABLE` · `COMPANY_INACTIVE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            `PLACEMENT_PERIOD_OVERLAP` (1-day buffer hit) ·
            `PLACEMENT_OUTSIDE_CONTRACT`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79   # Perpanjang button on Detail
      x-idempotent: true

  /placements/{id}:end:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: endPlacement
      tags: [placements]
      summary: End placement (PL-4) — reason capture
      description: |
        Used for the "end of term / soft end" path (legacy ims-system EnabP
        reason capture, Wave-1). Closes the placement with
        `ended_reason = ENDED` (default) or one of the explicit reasons
        listed below. The placement transitions to `ENDED`.

        This is an **explicit HR-decision action** (taken at or after the
        `EXPIRING` flag via the Inbox decision task), **not** a system
        auto-end at `end_date`. Per F2.7, a PKWT placement reaching its
        `end_date` with no HR decision stays `EXPIRING` (grace) — the
        login also stays valid — until HR explicitly ends it here; there
        is no auto-end of the placement (the former LC-4 auto-end is
        removed). Ending a placement never revokes the agent's login;
        only employment-end / offboarding (E2 F2.7) does that.

        If the agent was the company's shift leader, the assignment
        auto-vacates with `vacated_reason = PLACEMENT_ENDED` (SL-6) and a
        vacancy is raised.

        For a **hard, intentional early end with stronger confirmation**
        (HR-driven termination with company-name typed confirmation), use
        `:terminate` instead.

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndRequest'
            examples:
              endOfTerm:
                value:
                  reason: END_OF_TERM
                  effective_date: '2026-12-31'
                  notes: 'Kontrak selesai tepat waktu.'
      responses:
        '200':
          description: Placement ended.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: "`TERMINAL_STATE_IMMUTABLE`."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79   # Akhiri button on Detail
      x-idempotent: true

  /placements/{id}:terminate:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: terminatePlacement
      tags: [placements]
      summary: Terminate placement (PL-5) — strong destructive
      description: |
        Hard early termination with **typed company-name confirmation**
        (per Wave-1 V4LG8 destructive-confirm pattern). Closes the
        placement with `ended_reason = TERMINATED`, mandatory reason text
        for audit, optional effective_date (defaults to today). Transitions
        to `TERMINATED`.

        `type_company_name_confirm` MUST exactly match the
        `client_company.name` (case-insensitive, trimmed); otherwise
        `400 INVALID_REQUEST` with `fields.type_company_name_confirm`.

        Side effects: leader vacancy if applicable (SL-6); E4 future
        schedules for the agent cancelled (cache-invalidation).

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateRequest'
            examples:
              misconduct:
                value:
                  termination_reason: 'Pelanggaran SOP: meninggalkan pos parkir tanpa izin tiga kali (terdokumentasi).'
                  effective_date: '2026-06-15'
                  type_company_name_confirm: 'Plaza Senayan'
      responses:
        '200':
          description: Placement terminated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: "`TERMINAL_STATE_IMMUTABLE`."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79
      x-idempotent: true

  /placements/{id}:resign:
    parameters:
      - $ref: '#/components/parameters/PlacementId'
    post:
      operationId: resignPlacement
      tags: [placements]
      summary: Record agent resignation (LC-6)
      description: |
        Records an agent-initiated end. Closes the placement with
        `ended_reason = RESIGNED` and sets `resign_at` (may be
        future-dated — agent's last working day). Transitions to
        `RESIGNED`. The associated employment agreement is **not** closed
        here (that's E2); only the placement.

        If the agent was the company's shift leader, auto-vacate (SL-6).

        Requires `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResignRequest'
            examples:
              immediate:
                value:
                  resign_at: '2026-06-30'
                  resignation_reason: 'Pindah kerja — agen mengajukan resign 1 bulan sebelumnya.'
                  notes: 'Surat resign diterima HR 30 Mei 2026.'
      responses:
        '200':
          description: Placement marked RESIGNED.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: "`TERMINAL_STATE_IMMUTABLE`."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - pFR79
      x-idempotent: true

  /placements/expiring:
    get:
      operationId: listExpiringPlacements
      tags: [placements]
      summary: Convenience filter — placements ending soon
      description: |
        Convenience endpoint for the E10 dashboard "Penempatan akan berakhir"
        tile and Wave 3.4 expiring list. Equivalent to
        `GET /placements?expiring_within_days={n}&lifecycle_status__in=ACTIVE,EXPIRING&sort=end_date:asc`
        but cached server-side at a 5-minute granularity.
      parameters:
        - name: within_days
          in: query
