        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createPosition
      tags: [service-lines-positions]
      summary: Create a position under a service line (SP-2/SP-3)
      description: |
        Creates a position scoped to one service line. The pair
        `(service_line_id, name)` is unique (SP-3) — duplicate returns
        `POSITION_IN_USE` (409 — same code is reused for line+name
