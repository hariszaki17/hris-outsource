                  name: Parking Night OT
                  service_line_id: SWP-SVC-003
                  weekday_rate: 1.5
                  restday_rate: 2.0
                  holiday_rate: 3.0
                  min_minutes: 30
                  max_minutes_per_day: 240
                  pre_approval_required: true
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OvertimeRule' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Duplicate name.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /overtime-rules/{overtime_rule_id}:
    parameters:
      - in: path
        name: overtime_rule_id
        required: true
        schema: { $ref: '#/components/schemas/OvertimeRuleId' }
    get:
      operationId: getOvertimeRule
      tags: [master-data]
      summary: Get an overtime rule
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: global
      responses:
        '200':
          description: Overtime rule detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OvertimeRule' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateOvertimeRule
      tags: [master-data]
      summary: Update an overtime rule
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OvertimeRuleWriteRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OvertimeRule' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
    delete:
      operationId: softDeleteOvertimeRule
      tags: [master-data]
      summary: Soft-delete an overtime rule (MD-1)
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      responses:
        '204':
          description: Soft-deleted.
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Referenced by OT requests — refuse.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

# =========================================================================
# COMPONENTS
# =========================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-or-jwt
      description: |
        `Authorization: Bearer <token>` per CONVENTIONS §3. Token type
        (opaque vs JWT) is deferred to E1; consumers MUST treat as opaque.

  parameters:
    Limit:
      in: query
      name: limit
      description: Page size (default 50, max 200) per §8.
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      in: query
      name: cursor
      description: Opaque cursor from a previous page's `next_cursor` per §8.
      schema: { type: string }
    Sort:
      in: query
      name: sort
      description: |
        Comma-separated `field:direction` per §9 (e.g.,
        `?sort=created_at:desc,full_name:asc`). Cursor encodes sort — mismatch
        returns `CURSOR_MISMATCH` (400).
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: UUID v4. Same key with different body → `IDEMPOTENCY_KEY_REUSED` (409). Per §13.
      schema: { type: string, format: uuid }
    IdempotencyKeyRequired:
      in: header
      name: Idempotency-Key
      required: true
      description: UUID v4 — required for bulk endpoints per §14.
      schema: { type: string, format: uuid }
    EmployeeIdPath:
      in: path
      name: employee_id
      required: true
      schema: { $ref: '#/components/schemas/EmployeeId' }
    AgreementIdPath:
      in: path
      name: agreement_id
      required: true
      schema: { $ref: '#/components/schemas/AgreementId' }
    ClientCompanyIdPath:
      in: path
      name: client_company_id
      required: true
      schema: { $ref: '#/components/schemas/ClientCompanyId' }
    ServiceLineIdPath:
      in: path
      name: service_line_id
      required: true
      schema: { $ref: '#/components/schemas/ServiceLineId' }
    PositionIdPath:
      in: path
      name: position_id
      required: true
      schema: { $ref: '#/components/schemas/PositionId' }

  responses:
    BadRequest:
      description: Malformed request or invalid input (CONVENTIONS §11).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: INVALID_REQUEST
                  message: "Permintaan tidak valid."
                  request_id: req_01J5XK0A
    Unauthenticated:
      description: Missing or expired bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            expired:
              value:
                error:
                  code: UNAUTHENTICATED
                  message: "Sesi berakhir. Silakan masuk kembali."
                  request_id: req_01J5XK0B
    Forbidden:
      description: Authenticated but role-not-permitted (CONVENTIONS §3, §17).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            no_permission:
              value:
                error:
                  code: FORBIDDEN
                  message: "Anda tidak memiliki izin untuk tindakan ini."
                  request_id: req_01J5XK0C
    NotFound:
      description: Resource not found (or hidden from caller's scope).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: NOT_FOUND
                  message: "Data tidak ditemukan."
                  request_id: req_01J5XK0D
    UnprocessableEntity:
      description: Business-rule violation (semantically invalid).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: RULE_VIOLATION
                  message: "Aturan bisnis tidak terpenuhi."
                  request_id: req_01J5XK0E

  schemas:

    # ---- Common envelopes ------------------------------------------------

    PageEnvelope:
      type: object
      description: Standard pagination envelope (CONVENTIONS §8).
      properties:
        data:
          type: array
          items: {}
        next_cursor:
          type: [string, "null"]
          description: Opaque cursor for the next page; `null` when no more pages.
        has_more:
          type: boolean
      required: [data, has_more]

    ErrorEnvelope:
      type: object
      description: Standard error envelope (CONVENTIONS §11).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string, example: "QUOTA_EXCEEDED" }
            message: { type: string, example: "Permintaan melebihi kuota tersisa." }
            fields:
              type: object
              additionalProperties: { type: string }
              description: Only on 400/422 — maps field name → field-level error.
            request_id: { type: string, example: "req_01J5XK..." }

    BulkResult:
      type: object
      description: Bulk-operation result envelope (CONVENTIONS §14).
      required: [succeeded, failed]
      properties:
        succeeded:
          type: array
          items: { type: string }
          description: IDs that succeeded.
        failed:
          type: array
          items:
            type: object
            required: [id, error]
            properties:
              id: { type: string }
              error: { $ref: '#/components/schemas/ErrorEnvelope' }

    FileRef:
      type: object
      description: File-upload response per CONVENTIONS §15.
      required: [id, url, name, size_bytes, mime, uploaded_at]
      properties:
        id: { type: string, example: "SWP-FILE-9912" }
        url: { type: string, format: uri }
        name: { type: string }
        size_bytes: { type: integer }
        mime: { type: string }
        uploaded_at: { type: string, format: date-time }

    # ---- ID types (string aliases with SWP-* prefix per §4) -------------

    EmployeeId:
      type: string
      pattern: '^SWP-EMP-\d+$'
      example: SWP-EMP-1042
    ChangeRequestId:
      type: string
      pattern: '^SWP-CHG-\d+$'
      example: SWP-CHG-2117
    AgreementId:
      type: string
      pattern: '^SWP-AG-\d+$'
      example: SWP-AG-7711
    ClientCompanyId:
      type: string
      pattern: '^SWP-CMP-\d+$'
      example: SWP-CMP-101
    ServiceLineId:
      type: string
      pattern: '^SWP-SVC-\d+$'
      example: SWP-SVC-003
    PositionId:
      type: string
      pattern: '^SWP-POS-\d+$'
      example: SWP-POS-014
    LeaveTypeId:
      type: string
      pattern: '^SWP-LT-\d+$'
      example: SWP-LT-001
    AttendanceCodeId:
      type: string
      pattern: '^SWP-AC-\d+$'
      example: SWP-AC-001
    OvertimeRuleId:
      type: string
      pattern: '^SWP-OTR-\d+$'
      example: SWP-OTR-001
    UserId:
      type: string
      pattern: '^SWP-USR-\d+$'
      example: SWP-USR-1042

    # ---- Employee -------------------------------------------------------

    BankAccount:
      type: object
      properties:
        bank_name: { type: string, example: BCA }
        account_number: { type: string, example: "1234567890" }
        account_holder_name: { type: string, example: Budi Santoso }

    Gender:
      type: string
      enum: [MALE, FEMALE]

    EmployeeStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
      description: |
        Employee lifecycle state. Deactivation is a terminal soft-state per
        EP-7 / Wave 3.4 (reactivation possible via `:reactivate`).

    Employee:
      type: object
      description: |
        Full employee record. The list response uses the same shape — the
        picker projection is just `id`, `full_name`, `nip`,
        `current_position`, `current_client_company`.
      required: [id, full_name, nik, join_at, status, has_login]
      properties:
        id: { $ref: '#/components/schemas/EmployeeId' }
        user_id:
          allOf: [{ $ref: '#/components/schemas/UserId' }]
          nullable: true
          description: Linked E1 User account (null until provisioned).
        full_name: { type: string, maxLength: 200 }
        nik:
          type: string
          description: Indonesian KTP / national ID. Unique (EP-2). HR-only edit (EP-6).
          example: "3175011505900012"
        nip:
          type: string
          description: SWP internal employee number.
          example: "1042"
        join_at: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        birth_date: { type: string, format: date }
        birth_place: { type: string }
        phone:
          type: string
          description: Agent-editable via change-request (E2 §8 lock).
          example: "+62-812-3344-5566"
        email_personal: { type: string, format: email }
        address:
          type: string
          description: Agent-editable via change-request.
        npwp:
          type: string
          description: HR-only edit. Indonesian tax ID. May be null for non-PKP agents.
        bpjs_kesehatan: { type: string }
        bpjs_ketenagakerjaan: { type: string }
        bank_account:
          allOf: [{ $ref: '#/components/schemas/BankAccount' }]
          description: Agent-editable via change-request.
        status: { $ref: '#/components/schemas/EmployeeStatus' }
        has_login:
          type: boolean
          description: True if a User record is linked (EP-3 provisioning state).
        current_position:
          type: object
          nullable: true
          description: Picker summary of the agent's current placement (E3 read).
          properties:
            id: { $ref: '#/components/schemas/PositionId' }
            name: { type: string }
        current_service_line:
          type: object
          nullable: true
          properties:
            id: { $ref: '#/components/schemas/ServiceLineId' }
            name: { type: string }
        current_client_company:
          type: object
          nullable: true
          properties:
            id: { $ref: '#/components/schemas/ClientCompanyId' }
            name: { type: string }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
        created_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          readOnly: true

    EmployeeWriteRequest:
      type: object
      description: |
        Used for both create (`POST /employees`) and patch
        (`PATCH /employees/{id}`). On patch, all fields are optional and
        only present fields are updated.
      properties:
        full_name: { type: string, maxLength: 200 }
        nik: { type: string }
        nip: { type: string }
        join_at: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        birth_date: { type: string, format: date }
        birth_place: { type: string }
        phone: { type: string }
        email_personal: { type: string, format: email }
        address: { type: string }
        npwp: { type: string }
        bpjs_kesehatan: { type: string }
        bpjs_ketenagakerjaan: { type: string }
        bank_account: { $ref: '#/components/schemas/BankAccount' }
        provision_login:
          type: boolean
          description: |
            On create only. If true, also create a linked E1 User with role
            `agent` and send an invite (EP-3). Optional at create — login can
            be provisioned later via a separate call (C-1).
        login_email:
          type: string
          format: email
          description: |
            Required if `provision_login=true`. Used as the User's login
            email; unique system-wide (EP-2).

    # ---- ChangeRequest --------------------------------------------------

    ChangeRequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    ChangeRequest:
      type: object
      description: |
        Agent's profile-change request awaiting HR approval (EP-5). Only the
        whitelisted fields can be changed: `phone`, `address`, `bank_account`.
      required: [id, employee_id, status, submitted_at, changes]
      properties:
        id: { $ref: '#/components/schemas/ChangeRequestId' }
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        status: { $ref: '#/components/schemas/ChangeRequestStatus' }
        submitted_at: { type: string, format: date-time }
        resolved_at:
          type: [string, "null"]
          format: date-time
        resolved_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          nullable: true
        rejection_reason:
          type: [string, "null"]
          description: Set when status=REJECTED.
        note:
          type: [string, "null"]
          description: Free-text note from the agent at submission.
        changes:
          type: object
          description: Only the agent-editable subset.
          properties:
            phone: { type: string }
            address: { type: string }
            bank_account: { $ref: '#/components/schemas/BankAccount' }
        request_type:
          type: string
          enum: [PHONE, ADDRESS, BANK_ACCOUNT, MULTIPLE]
          description: Derived from which fields are in `changes`; used by HR filters.

    ChangeRequestCreate:
      type: object
      description: Body for `POST /employees/{id}/change-requests`.
      required: [changes]
      properties:
        changes:
          type: object
          minProperties: 1
          properties:
            phone: { type: string }
            address: { type: string }
            bank_account: { $ref: '#/components/schemas/BankAccount' }
          additionalProperties: false
        note: { type: string, maxLength: 500 }

    ChangeRequestDetail:
      type: object
      description: HR review detail — embeds submitter summary + per-field diff.
      required: [id, employee, status, submitted_at, diff]
      properties:
        id: { $ref: '#/components/schemas/ChangeRequestId' }
        employee:
          type: object
          properties:
            id: { $ref: '#/components/schemas/EmployeeId' }
            full_name: { type: string }
            nip: { type: string }
        status: { $ref: '#/components/schemas/ChangeRequestStatus' }
        submitted_at: { type: string, format: date-time }
        resolved_at:
          type: [string, "null"]
          format: date-time
        resolved_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          nullable: true
        rejection_reason:
          type: [string, "null"]
        note:
          type: [string, "null"]
        diff:
          type: object
          description: Per-field old → new diff.
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}

    # ---- Agreement ------------------------------------------------------

    AgreementType:
      type: string
      enum: [PKWT, PKWTT]
      description: |
        Indonesian labor-law employment type. `PKWT` = perjanjian kerja
        waktu tertentu (fixed-term, with end_date). `PKWTT` = perjanjian
        kerja waktu tidak tertentu (indefinite, no end_date).

    AgreementStatus:
      type: string
      enum: [ACTIVE, SUPERSEDED, CLOSED, EXPIRING]
      description: |
        `EXPIRING` is a server-computed virtual status — active PKWT within
        30 days of `end_date`. Persisted status is one of ACTIVE/SUPERSEDED/CLOSED.

    AgreementCloseReason:
      type: string
      enum: [RESIGNED, TERMINATED, END_OF_TERM, OTHER]

    TaxProfile:
      type: string
      description: |
        Indonesian PTKP code. Examples: `PTKP_TK0` (single, no dependents),
        `PTKP_K0`, `PTKP_K1` (married, N dependents).
      example: PTKP_K0

    BpjsTerms:
      type: object
      description: BPJS percentages (statutory + agreement-specific overrides).
      properties:
        kesehatan_employer_pct: { type: number, format: float, example: 4.0 }
        kesehatan_employee_pct: { type: number, format: float, example: 1.0 }
        ketenagakerjaan_employer_pct: { type: number, format: float, example: 6.24 }
        ketenagakerjaan_employee_pct: { type: number, format: float, example: 3.0 }

    CompensationTerms:
      type: object
      description: |
        Current compensation. Encrypted at rest (EA-4); response **masks**
        values to `***` for callers without the `view_compensation`
        permission (HR admin & super admin only; agents on mobile never see
        these — they get the agreement summary only).
      properties:
        base_salary_idr:
          type: number
          format: float
          description: Base monthly salary in IDR. Encrypted at rest.
          example: 5200000
        bpjs_terms: { $ref: '#/components/schemas/BpjsTerms' }
        tax_profile: { $ref: '#/components/schemas/TaxProfile' }
        effective_date:
          type: string
          format: date
          description: |
            Effective date of these terms (`CompensationRecord.effective_date`
            — F2.2 C-3). Defaults to agreement start_date on create.

    Agreement:
      type: object
      required: [id, employee_id, type, status, start_date]
      properties:
        id: { $ref: '#/components/schemas/AgreementId' }
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        type: { $ref: '#/components/schemas/AgreementType' }
        agreement_no:
          type: string
          example: "PKWT/SWP/2026/0142"
        start_date: { type: string, format: date }
        end_date:
          type: [string, "null"]
          format: date
          description: Required when type=PKWT; null for PKWTT.
        status: { $ref: '#/components/schemas/AgreementStatus' }
        predecessor_id:
          allOf: [{ $ref: '#/components/schemas/AgreementId' }]
          nullable: true
          description: Set on the successor created via `:renew` (EA-3).
        successor_id:
          allOf: [{ $ref: '#/components/schemas/AgreementId' }]
          nullable: true
        closed_reason: { $ref: '#/components/schemas/AgreementCloseReason' }
        closed_at:
          type: [string, "null"]
          format: date-time
        compensation:
          allOf: [{ $ref: '#/components/schemas/CompensationTerms' }]
          description: |
            Current comp. Hidden / masked for unauthorized roles (EA-4). On
            mobile (agent role) this field is omitted entirely.
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    AgreementWriteRequest:
      type: object
      description: Body for create/patch on agreements.
      properties:
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        type: { $ref: '#/components/schemas/AgreementType' }
        agreement_no: { type: string }
        start_date: { type: string, format: date }
        end_date:
          type: string
          format: date
          description: Required for PKWT; must be omitted for PKWTT.
        compensation: { $ref: '#/components/schemas/CompensationTerms' }

    # ---- ClientCompany --------------------------------------------------

    Geofence:
      type: object
      description: |
        Geofence definition for a client company. `radius_m` defaults to
        **100m** per EPICS.md §8 lock. `active` is derived server-side from
        `center` (lat/lng) presence per D11.
      properties:
        center:
          type: object
          nullable: true
          required: [lat, lng]
          properties:
            lat: { type: number, format: double, minimum: -90, maximum: 90 }
            lng: { type: number, format: double, minimum: -180, maximum: 180 }
        radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
          description: Geofence radius in meters. Out-of-range → `GEOFENCE_RADIUS_INVALID`.
        active:
          type: boolean
          readOnly: true
          description: Server-derived from `center` presence (D11).

    ClientCompany:
      type: object
      description: Client company directory entry (F2.3).
      required: [id, name, address, geofence_radius_m, status]
      properties:
        id: { $ref: '#/components/schemas/ClientCompanyId' }
        name: { type: string, maxLength: 200, example: Plaza Senayan }
        address: { type: string, example: "Jl. Asia Afrika No. 8, Tanah Abang, Jakarta Pusat 10270" }
        geo:
          type: object
          nullable: true
          required: [lat, lng]
          properties:
            lat: { type: number, format: double }
            lng: { type: number, format: double }
        geofence_radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
          description: Per-site geofence radius (default 100m per §8 lock).
        geofence_active:
          type: boolean
          readOnly: true
          description: Server-derived — true iff `geo.lat` and `geo.lng` are set (D11).
        npwp:
          type: [string, "null"]
          description: Optional Indonesian tax ID. Unique when set (CC-2).
        pic_name: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        email: { type: [string, "null"], format: email }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        has_leader:
          type: boolean
          readOnly: true
          description: True iff the company has an assigned shift leader (E3 — 1/company invariant).
        active_placement_count:
          type: integer
          readOnly: true
          description: Cached count for the warn-and-guide deactivate flow (CC-5).
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    ClientCompanyWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        address: { type: string }
        geo:
          type: object
          nullable: true
          properties:
            lat: { type: number, format: double, minimum: -90, maximum: 90 }
            lng: { type: number, format: double, minimum: -180, maximum: 180 }
        geofence_radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
        npwp: { type: string }
        pic_name: { type: string }
        phone: { type: string }
        email: { type: string, format: email }

    # ---- ServiceLine / Position -----------------------------------------

    ServiceLine:
      type: object
      required: [id, name, status]
      properties:
        id: { $ref: '#/components/schemas/ServiceLineId' }
        name:
          type: string
          example: Parking
          description: |
            Unique. Seeded values: Facility Services, Building Management,
            Parking (SP-1).
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        position_count:
          type: integer
          readOnly: true
          description: Cached count of active positions in this service line.

    ServiceLineWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }

    Position:
      type: object
      required: [id, service_line_id, name, status]
      properties:
        id: { $ref: '#/components/schemas/PositionId' }
        service_line_id: { $ref: '#/components/schemas/ServiceLineId' }
        name:
          type: string
          example: Petugas Parkir
          description: Unique within its service line (SP-3).
        alias:
          type: string
          description: English label / alternative name.
          example: Parking Attendant
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    PositionWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        alias: { type: string, maxLength: 100 }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    # ---- Operational master data ----------------------------------------

    LeaveType:
      type: object
      required: [id, name, code, is_annual, requires_document, status]
      properties:
        id: { $ref: '#/components/schemas/LeaveTypeId' }
        name:
          type: string
          example: Cuti Tahunan
          description: Unique (MD-2).
        code:
          type: string
          description: Machine-readable code (e.g., `ANNUAL`, `SICK`, `MATERNITY`). Unique.
          example: ANNUAL
        description: { type: string }
        default_annual_quota:
          type: integer
          minimum: 0
          description: Default per-year quota days (consumed by E6 quota seeding).
        is_annual:
          type: boolean
          description: If true, quota accrues annually (LT-2).
        requires_document:
          type: boolean
          description: If true, leave request must attach a document (LT-3).
        color:
          type: string
          description: Hex color used by calendar UIs (E6). Tokenized — DESIGN-SYSTEM §2.
          example: "#188E4D"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    LeaveTypeWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        code: { type: string, maxLength: 30 }
        description: { type: string }
        default_annual_quota: { type: integer, minimum: 0 }
        is_annual: { type: boolean }
        requires_document: { type: boolean }
        color: { type: string }

    AttendanceCode:
      type: object
      required: [id, code, label, color, is_workday, is_paid, is_billable, needs_verification, status]
      properties:
        id: { $ref: '#/components/schemas/AttendanceCodeId' }
        code:
          type: string
          description: Machine-readable code (e.g., `PRESENT`, `LATE`, `ABSENT`). Unique.
          example: PRESENT
        label:
          type: string
          description: Indonesian display label (e.g., "Hadir"). Unique.
          example: Hadir
        description: { type: string }
        color:
          type: string
          description: |
            Hex. Per DESIGN-SYSTEM §2 the **present** status is **teal**
            (`#0F8B8D`), NOT brand green — brand green (`#188E4D`) is reserved
            for primary actions.
          example: "#0F8B8D"
        is_workday:
          type: boolean
          description: Counts as a working day (relevant for E6 day-counting).
        is_paid:
          type: boolean
          description: Paid by SWP to the agent.
        is_billable:
          type: boolean
          description: Chargeable to the client (E10 billable reporting; verified-only).
        needs_verification:
          type: boolean
          description: Shift-leader verification required (E5).
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    AttendanceCodeWriteRequest:
      type: object
      properties:
        code: { type: string, maxLength: 30 }
        label: { type: string, maxLength: 60 }
        description: { type: string }
        color: { type: string }
        is_workday: { type: boolean }
        is_paid: { type: boolean }
        is_billable: { type: boolean }
        needs_verification: { type: boolean }

    OvertimeRule:
      type: object
      required: [id, name, weekday_rate, restday_rate, holiday_rate, min_minutes, pre_approval_required, status]
      properties:
        id: { $ref: '#/components/schemas/OvertimeRuleId' }
        name:
          type: string
          example: Default OT
          description: Unique (MD-2).
        service_line_id:
          allOf: [{ $ref: '#/components/schemas/ServiceLineId' }]
          nullable: true
          description: |
            Optional scope. `null` = global default; otherwise restricted to
            that service line (OR-2). When both apply, line-scoped wins (C-4).
        weekday_rate:
          type: number
          format: float
          description: Multiplier for weekday OT (e.g., 1.5).
          example: 1.5
        restday_rate:
          type: number
          format: float
          description: Multiplier for rest-day OT (e.g., 2.0).
          example: 2.0
        holiday_rate:
          type: number
          format: float
          description: Multiplier for public-holiday OT (e.g., 3.0). Beats rest-day when both apply.
          example: 3.0
        min_minutes:
          type: integer
          minimum: 30
          default: 30
          description: |
            Minimum OT counted in minutes. **Locked at 30** per EPICS.md §8
            D4 (resolved 2026-06-02 — was 60 in earlier review). Values
            below 30 → `RULE_VIOLATION` (422).
        max_minutes_per_day:
          type: integer
          description: Daily cap (e.g., 240 minutes = 4 hours).
          example: 240
        pre_approval_required:
          type: boolean
          description: If true, OT request must be pre-approved before worked (E7).
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    OvertimeRuleWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        service_line_id:
          allOf: [{ $ref: '#/components/schemas/ServiceLineId' }]
          nullable: true
        weekday_rate: { type: number, format: float }
        restday_rate: { type: number, format: float }
        holiday_rate: { type: number, format: float }
        min_minutes:
          type: integer
          minimum: 30
          default: 30
        max_minutes_per_day: { type: integer }
        pre_approval_required: { type: boolean }
