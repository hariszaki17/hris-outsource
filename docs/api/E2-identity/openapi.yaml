      description: |
        Sites of a client company (F2.6). Doubles as the **Site picker** for
        placement (E3) per §18 — the primary "Main Site" is returned first.
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
