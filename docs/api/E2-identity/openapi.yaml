        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createSite
      tags: [sites]
      summary: Add a site to a client company (ST-1)
      description: |
        Creates a site. `geofence_radius_m` defaults to 100m (§8 lock); valid
        range 25–1000m → else `GEOFENCE_RADIUS_INVALID` (400). `geofence_active`
        is derived from `geo` presence (ST-8). A site with no geo is allowed —
        geofencing is just disabled until coordinates are added. `name` is
        unique within the company (ST-2).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SiteWriteRequest' }
            examples:
              senayan:
                value:
                  name: Plaza Senayan
                  address: "Jl. Asia Afrika No. 8, Jakarta Pusat 10270"
                  geo: { lat: -6.2253, lng: 106.7995 }
                  geofence_radius_m: 100
                  pic_name: Ahmad Rizki
      responses:
        '201':
          description: Created.
          headers:
            Location: { schema: { type: string, format: uri } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Site' }
        '400':
          description: Bad request — e.g., geofence radius out of bounds.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                bad_radius:
                  value:
                    error:
                      code: GEOFENCE_RADIUS_INVALID
                      message: "Radius geofence harus 25–1000 meter."
                      fields: { geofence_radius_m: "Nilai 5000 di luar rentang yang diizinkan." }
                      request_id: req_01J5XLA2
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Duplicate site name within the company (ST-2).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

