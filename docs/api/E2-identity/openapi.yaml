      summary: Discontinue (soft-delete) a service line (SP-1)
      description: |
        Soft-deactivation only (status → `INACTIVE`); hard-delete forbidden
        when referenced. Returns `SERVICE_LINE_IN_USE` (409) if any active
        placement / position / overtime-rule references it.
