                        geo: { lat: -6.2253, lng: 106.7995 }
                        geofence_radius_m: 100
                        geofence_active: true
                        is_primary: true
                        pic_name: Ahmad Rizki
                        phone: "+62-21-572-5555"
                        status: ACTIVE
                        active_placement_count: 42
                      - id: SWP-SITE-502
                        client_company_id: SWP-CMP-101
                        name: Plaza Senayan Annex
                        code: null
                        address: "Jl. Asia Afrika No. 10, Jakarta Pusat 10270"
