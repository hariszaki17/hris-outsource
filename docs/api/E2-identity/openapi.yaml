# =========================================================================
# COMPONENTS
# =========================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-or-jwt
      description: |
        `Authorization: Bearer <token>` per CONVENTIONS §3. Token type
        (opaque vs JWT) is deferred to E1; consumers MUST treat as opaque.

  parameters:
    Limit:
      in: query
      name: limit
      description: Page size (default 50, max 200) per §8.
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      in: query
      name: cursor
      description: Opaque cursor from a previous page's `next_cursor` per §8.
      schema: { type: string }
    Sort:
      in: query
      name: sort
      description: |
        Comma-separated `field:direction` per §9 (e.g.,
        `?sort=created_at:desc,full_name:asc`). Cursor encodes sort — mismatch
        returns `CURSOR_MISMATCH` (400).
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: UUID v4. Same key with different body → `IDEMPOTENCY_KEY_REUSED` (409). Per §13.
      schema: { type: string, format: uuid }
    IdempotencyKeyRequired:
      in: header
      name: Idempotency-Key
      required: true
      description: UUID v4 — required for bulk endpoints per §14.
      schema: { type: string, format: uuid }
    EmployeeIdPath:
      in: path
      name: employee_id
      required: true
      schema: { $ref: '#/components/schemas/EmployeeId' }
    AgreementIdPath:
      in: path
      name: agreement_id
      required: true
      schema: { $ref: '#/components/schemas/AgreementId' }
    ClientCompanyIdPath:
      in: path
      name: client_company_id
      required: true
      schema: { $ref: '#/components/schemas/ClientCompanyId' }
    SiteIdPath:
      in: path
      name: site_id
      required: true
      schema: { $ref: '#/components/schemas/SiteId' }

  responses:
    BadRequest:
      description: Malformed request or invalid input (CONVENTIONS §11).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: INVALID_REQUEST
                  message: "Permintaan tidak valid."
                  request_id: req_01J5XK0A
    Unauthenticated:
      description: Missing or expired bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            expired:
              value:
                error:
                  code: UNAUTHENTICATED
                  message: "Sesi berakhir. Silakan masuk kembali."
                  request_id: req_01J5XK0B
    Forbidden:
      description: Authenticated but role-not-permitted (CONVENTIONS §3, §17).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            no_permission:
              value:
                error:
                  code: FORBIDDEN
                  message: "Anda tidak memiliki izin untuk tindakan ini."
                  request_id: req_01J5XK0C
    NotFound:
      description: Resource not found (or hidden from caller's scope).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: NOT_FOUND
                  message: "Data tidak ditemukan."
                  request_id: req_01J5XK0D
    UnprocessableEntity:
      description: Business-rule violation (semantically invalid).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            generic:
              value:
                error:
                  code: RULE_VIOLATION
                  message: "Aturan bisnis tidak terpenuhi."
                  request_id: req_01J5XK0E

  schemas:

    # ---- Common envelopes ------------------------------------------------

    PageEnvelope:
      type: object
      description: Standard pagination envelope (CONVENTIONS §8).
      properties:
        data:
          type: array
          items: {}
        next_cursor:
          type: [string, "null"]
          description: Opaque cursor for the next page; `null` when no more pages.
        has_more:
          type: boolean
      required: [data, has_more]

    ErrorEnvelope:
      type: object
      description: Standard error envelope (CONVENTIONS §11).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string, example: "QUOTA_EXCEEDED" }
            message: { type: string, example: "Permintaan melebihi kuota tersisa." }
            fields:
              type: object
              additionalProperties: { type: string }
              description: Only on 400/422 — maps field name → field-level error.
            request_id: { type: string, example: "req_01J5XK..." }

    BulkResult:
      type: object
      description: Bulk-operation result envelope (CONVENTIONS §14).
      required: [succeeded, failed]
      properties:
        succeeded:
          type: array
          items: { type: string }
          description: IDs that succeeded.
        failed:
          type: array
          items:
            type: object
            required: [id, error]
            properties:
              id: { type: string }
              error: { $ref: '#/components/schemas/ErrorEnvelope' }

    FileRef:
      type: object
      description: File-upload response per CONVENTIONS §15.
      required: [id, url, name, size_bytes, mime, uploaded_at]
      properties:
        id: { type: string, example: "SWP-FILE-9912" }
        url: { type: string, format: uri }
        name: { type: string }
        size_bytes: { type: integer }
        mime: { type: string }
        uploaded_at: { type: string, format: date-time }

    UploadTicket:
      type: object
      description: |
        Presigned direct-upload ticket for private object storage. The client
        PUTs the file bytes to `upload_url` with the pinned `Content-Type`,
        respecting `max_bytes`, then references the returned `object_key` in
        the follow-up write (e.g. `PATCH /me/profile { photo_object_key }`).
        Server generates the key (the client never picks it). Reusable across
        epics — E5 attendance selfies use the same pattern
        (`attendance-selfies/...` namespace).
      required: [upload_url, object_key, expires_at, max_bytes]
      properties:
        upload_url:
          type: string
          format: uri
          description: |
            Short-TTL presigned PUT URL. The `Content-Type` is pinned and a
            `content-length-range` size cap is enforced by the signature — a
            mismatch fails the upload at the storage layer.
        object_key:
          type: string
          description: |
            Server-generated storage key (e.g.
            `profile-photos/{employee_id}/{ulid}.jpg`). Opaque to the client.
          example: "profile-photos/SWP-EMP-1042/01J8XK7QF3.jpg"
        expires_at:
          type: string
          format: date-time
          description: When `upload_url` stops being valid (presign TTL, ~5 min).
        max_bytes:
          type: integer
          description: Maximum allowed object size in bytes (size cap mirrored in the signature).
          example: 5242880

    # ---- ID types (string aliases with SWP-* prefix per §4) -------------

    EmployeeId:
      type: string
      pattern: '^SWP-EMP-\d+$'
      example: SWP-EMP-1042
    ChangeRequestId:
      type: string
      pattern: '^SWP-CHG-\d+$'
      example: SWP-CHG-2117
    AgreementId:
      type: string
      pattern: '^SWP-AG-\d+$'
      example: SWP-AG-7711
    ClientCompanyId:
      type: string
      pattern: '^SWP-CMP-\d+$'
      example: SWP-CMP-101
    SiteId:
      type: string
      pattern: '^SWP-SITE-\d+$'
      example: SWP-SITE-501
    LeaveTypeId:
      type: string
      pattern: '^SWP-LT-\d+$'
      example: SWP-LT-001
    AttendanceCodeId:
      type: string
      pattern: '^SWP-AC-\d+$'
      example: SWP-AC-001
    OvertimeRuleId:
      type: string
      pattern: '^SWP-OTR-\d+$'
      example: SWP-OTR-001
    UserId:
      type: string
      pattern: '^SWP-USR-\d+$'
      example: SWP-USR-1042

    # ---- Employee -------------------------------------------------------

    BankAccount:
      type: object
      properties:
        bank_name: { type: string, example: BCA }
        account_number: { type: string, example: "1234567890" }
        account_holder_name: { type: string, example: Budi Santoso }

    EmergencyContact:
      type: object
      description: |
        Agent's emergency contact (name + phone). Agent-editable via
        change-request (approval tier) — NOT instant, since HR verifies the
        next-of-kin record.
      properties:
        name: { type: string, maxLength: 200, example: Siti Santoso }
        phone: { type: string, example: "+62-812-7766-5544" }

    AppLanguage:
      type: string
      enum: [id, en]
      default: id
      description: |
        Agent's preferred UI language (Bahasa default). Self-editable
        instantly via `PATCH /me/profile` — no approval.

    Gender:
      type: string
      enum: [MALE, FEMALE]

    EmployeeStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
      description: |
        Employee lifecycle state. Deactivation is a terminal soft-state per
        EP-7 / Wave 3.4 (reactivation possible via `:reactivate`).

    Employee:
      type: object
      description: |
        Full employee record. The list response uses the same shape — the
        picker projection is just `id`, `full_name`, `nip`,
        `current_position`, `current_client_company`.
      required: [id, user_id, full_name, nik, join_at, status, phone]
      properties:
        id: { $ref: '#/components/schemas/EmployeeId' }
        user_id:
          allOf: [{ $ref: '#/components/schemas/UserId' }]
          description: |
            Linked E1 User account. Always present (1:1, non-null) — every
            employee auto-provisions a login at create (D1).
        full_name: { type: string, maxLength: 200 }
        nik:
          type: string
          description: Indonesian KTP / national ID. Unique (EP-2). HR-only edit (EP-6).
          example: "3175011505900012"
        nip:
          type: string
          description: SWP internal employee number.
          example: "1042"
        join_at: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        birth_date: { type: string, format: date }
        birth_place: { type: string }
        phone:
          type: string
          description: |
            Primary login identifier (E.164, `+62...`), required and unique
            (D2). Also the contact number; agent-editable via change-request
            (E2 §8 lock).
          example: "+62-812-3344-5566"
        email_personal: { type: string, format: email }
        address:
          type: string
          description: |
            Tier: **instant** self-edit via `PATCH /me/profile` (no approval).
            Also HR-editable.
        emergency_contact:
          allOf: [{ $ref: '#/components/schemas/EmergencyContact' }]
          description: |
            Tier: **approval** — agent-editable only via change-request
            (`POST /employees/{id}/change-requests`), not instant.
        app_language:
          allOf: [{ $ref: '#/components/schemas/AppLanguage' }]
          description: |
            Tier: **instant** self-edit via `PATCH /me/profile` (no approval).
        photo_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: |
            Short-TTL presigned GET URL for the agent's profile photo (private
            object storage). Read-only — never written directly. The agent sets
            a new photo by uploading to the presigned PUT from
            `POST /me/profile/photo-upload-init`, then passing the returned
            `object_key` to `PATCH /me/profile` (tier: **instant**).
        npwp:
          type: string
          description: HR-only edit. Indonesian tax ID. May be null for non-PKP agents.
        bpjs_kesehatan: { type: string }
        bpjs_ketenagakerjaan: { type: string }
        bank_account:
          allOf: [{ $ref: '#/components/schemas/BankAccount' }]
          description: |
            Tier: **approval** — agent-editable only via change-request, not
            instant.
        status: { $ref: '#/components/schemas/EmployeeStatus' }
        temp_password:
          type: string
          nullable: true
          readOnly: true
          description: |
            One-time temporary password (EP-3 / D3 show-once). Present ONLY in
            the create and `:regenerate-password` responses; never returned by
            reads. The agent must rotate it on first login (see
            `must_change_password` on the login response).
        current_position:
          type: string
          nullable: true
          description: |
            Free-text position label from the agent's current placement (E3
            read). Position is free-text — no master, no FK, no ID.
          example: Petugas Parkir
        current_client_company:
          type: object
          nullable: true
          properties:
            id: { $ref: '#/components/schemas/ClientCompanyId' }
            name: { type: string }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
        created_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          readOnly: true

    EmployeeWriteRequest:
      type: object
      description: |
        Used for both create (`POST /employees`) and patch
        (`PATCH /employees/{id}`). On create, `full_name`, `nik`, `join_at`,
        and `phone` are required (phone is the login identifier — see below).
        On patch, all fields are optional and only present fields are updated.
        Creating an employee always auto-provisions a 1:1 login (D1); there is
        no opt-out flag.
      properties:
        full_name: { type: string, maxLength: 200 }
        nik: { type: string }
        nip: { type: string }
        join_at: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        birth_date: { type: string, format: date }
        birth_place: { type: string }
        phone:
          type: string
          description: |
            Primary login identifier (E.164, `+62...`). Required on create,
            unique system-wide (D2). Also serves as the contact number.
          example: "+6281233445566"
        email_personal: { type: string, format: email }
        address: { type: string }
        npwp: { type: string }
        bpjs_kesehatan: { type: string }
        bpjs_ketenagakerjaan: { type: string }
        bank_account: { $ref: '#/components/schemas/BankAccount' }
        login_email:
          type: string
          format: email
          description: |
            Optional secondary login email for the auto-provisioned User;
            unique system-wide when present (D2, EP-2).

    SelfProfileUpdate:
      type: object
      description: |
        Body for `PATCH /me/profile` — instant-tier self-edit only. All fields
        optional; only present fields are updated. Approval-tier fields
        (phone, emergency_contact, bank_account) are NOT accepted here and
        return `FIELD_REQUIRES_APPROVAL` (422).
      minProperties: 1
      additionalProperties: false
      properties:
        address: { type: string }
        app_language: { $ref: '#/components/schemas/AppLanguage' }
        photo_object_key:
          type: string
          description: |
            `object_key` returned by `POST /me/profile/photo-upload-init`,
            after the bytes were PUT to the presigned URL. Must belong to the
            caller's own key namespace.
          example: "profile-photos/SWP-EMP-1042/01J8XK7QF3.jpg"

    # ---- ChangeRequest --------------------------------------------------

    ChangeRequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, PARTIALLY_APPROVED]
      description: |
        `PARTIALLY_APPROVED` — a shift leader applied the non-bank fields but
        the request still has a `bank_account` change pending HR escalation
        (`bank_pending=true`). HR finalizes the bank field to move it to
        `APPROVED`. SL lacks `change_requests.approve.bank`, so a mixed
        (bank + non-bank) request resolves to this intermediate state.

    FieldResolution:
      type: string
      enum: [PENDING, APPLIED, ESCALATED_TO_HR]
      description: |
        Per-field resolution within a change request. `APPLIED` — written to
        the Employee record (records who applied it). `ESCALATED_TO_HR` — the
        bank field a shift leader could not approve; routed to the HR bank
        queue. `PENDING` — not yet acted on.

    ChangeRequest:
      type: object
      description: |
        Agent's profile-change request awaiting approval. Whitelisted
        (approval-tier) fields: `phone`, `emergency_contact`, `bank_account`.
        Instant-tier fields (`address`, `app_language`, photo) never appear
        here — they apply immediately via `PATCH /me/profile`.
      required: [id, employee_id, status, submitted_at, changes]
      properties:
        id: { $ref: '#/components/schemas/ChangeRequestId' }
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        status: { $ref: '#/components/schemas/ChangeRequestStatus' }
        submitted_at: { type: string, format: date-time }
        resolved_at:
          type: [string, "null"]
          format: date-time
        resolved_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          nullable: true
        rejection_reason:
          type: [string, "null"]
          description: Set when status=REJECTED.
        note:
          type: [string, "null"]
          description: Free-text note from the agent at submission.
        changes:
          type: object
          description: Only the approval-tier subset.
          properties:
            phone: { type: string }
            emergency_contact: { $ref: '#/components/schemas/EmergencyContact' }
            bank_account: { $ref: '#/components/schemas/BankAccount' }
        field_resolutions:
          type: object
          readOnly: true
          description: |
            Per-field resolution map (keys match `changes`), recording which
            fields a shift leader already applied and which bank field was
            escalated to HR. Drives the partial-approval flow. Empty until the
            first approval action.
          additionalProperties:
            type: object
            properties:
              resolution: { $ref: '#/components/schemas/FieldResolution' }
              resolved_by:
                allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
                nullable: true
              resolved_at:
                type: [string, "null"]
                format: date-time
          example:
            phone: { resolution: APPLIED, resolved_by: SWP-EMP-1043, resolved_at: "2026-06-11T03:20:00Z" }
            bank_account: { resolution: ESCALATED_TO_HR, resolved_by: SWP-EMP-1043, resolved_at: "2026-06-11T03:20:00Z" }
        bank_pending:
          type: boolean
          readOnly: true
          default: false
          description: |
            Denormalized flag — `true` when a `bank_account` change is still
            awaiting HR (escalated by a shift leader who lacks
            `change_requests.approve.bank`). Drives the HR bank-escalation
            queue (partial index).
        request_type:
          type: string
          enum: [PHONE, EMERGENCY_CONTACT, BANK_ACCOUNT, MULTIPLE]
          description: Derived from which fields are in `changes`; used by HR filters.

    ChangeRequestCreate:
      type: object
      description: Body for `POST /employees/{id}/change-requests`.
      required: [changes]
      properties:
        changes:
          type: object
          minProperties: 1
          properties:
            phone: { type: string }
            emergency_contact: { $ref: '#/components/schemas/EmergencyContact' }
            bank_account: { $ref: '#/components/schemas/BankAccount' }
          additionalProperties: false
        note: { type: string, maxLength: 500 }

    ChangeRequestDetail:
      type: object
      description: |
        Review detail (HR or shift leader) — embeds submitter summary +
        per-field diff + per-field resolutions.
      required: [id, employee, status, submitted_at, diff]
      properties:
        id: { $ref: '#/components/schemas/ChangeRequestId' }
        employee:
          type: object
          properties:
            id: { $ref: '#/components/schemas/EmployeeId' }
            full_name: { type: string }
            nip: { type: string }
        status: { $ref: '#/components/schemas/ChangeRequestStatus' }
        submitted_at: { type: string, format: date-time }
        resolved_at:
          type: [string, "null"]
          format: date-time
        resolved_by:
          allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
          nullable: true
        rejection_reason:
          type: [string, "null"]
        note:
          type: [string, "null"]
        bank_pending:
          type: boolean
          readOnly: true
          default: false
          description: |
            `true` when a bank change is still awaiting HR escalation (a shift
            leader applied the non-bank fields). See `ChangeRequest.bank_pending`.
        field_resolutions:
          type: object
          readOnly: true
          description: Per-field resolution map — see `ChangeRequest.field_resolutions`.
          additionalProperties:
            type: object
            properties:
              resolution: { $ref: '#/components/schemas/FieldResolution' }
              resolved_by:
                allOf: [{ $ref: '#/components/schemas/EmployeeId' }]
                nullable: true
              resolved_at:
                type: [string, "null"]
                format: date-time
        diff:
          type: object
          description: Per-field old → new diff.
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}

    # ---- Agreement ------------------------------------------------------

    AgreementType:
      type: string
      enum: [PKWT, PKWTT]
      description: |
        Indonesian labor-law employment type. `PKWT` = perjanjian kerja
        waktu tertentu (fixed-term, with end_date). `PKWTT` = perjanjian
        kerja waktu tidak tertentu (indefinite, no end_date).

    AgreementStatus:
      type: string
      enum: [ACTIVE, SUPERSEDED, CLOSED, EXPIRING]
      description: |
        `EXPIRING` is a server-computed virtual status — active PKWT within
        30 days of `end_date`. Persisted status is one of ACTIVE/SUPERSEDED/CLOSED.

    AgreementCloseReason:
      type: string
      enum: [RESIGNED, TERMINATED, END_OF_TERM, DECEASED, RETIRED, ABSCONDED, OTHER]

    TaxProfile:
      type: string
      description: |
        Indonesian PTKP code. Examples: `PTKP_TK0` (single, no dependents),
        `PTKP_K0`, `PTKP_K1` (married, N dependents).
      example: PTKP_K0

    BpjsTerms:
      type: object
      description: BPJS percentages (statutory + agreement-specific overrides).
      properties:
        kesehatan_employer_pct: { type: number, format: float, example: 4.0 }
        kesehatan_employee_pct: { type: number, format: float, example: 1.0 }
        ketenagakerjaan_employer_pct: { type: number, format: float, example: 6.24 }
        ketenagakerjaan_employee_pct: { type: number, format: float, example: 3.0 }

    CompensationTerms:
      type: object
      description: |
        Current compensation. Encrypted at rest (EA-4); response **masks**
        values to `***` for callers without the `view_compensation`
        permission (HR admin & super admin only; agents on mobile never see
        these — they get the agreement summary only).
      properties:
        base_salary_idr:
          type: number
          format: float
          description: Base monthly salary in IDR. Encrypted at rest.
          example: 5200000
        bpjs_terms: { $ref: '#/components/schemas/BpjsTerms' }
        tax_profile: { $ref: '#/components/schemas/TaxProfile' }
        effective_date:
          type: string
          format: date
          description: |
            Effective date of these terms (`CompensationRecord.effective_date`
            — F2.2 C-3). Defaults to agreement start_date on create.

    Agreement:
      type: object
      required: [id, employee_id, type, status, start_date]
      properties:
        id: { $ref: '#/components/schemas/AgreementId' }
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        employee_name:
          type: string
          nullable: true
          description: >-
            Full name of the agreement's employee (joined from the employee
            record). Populated on the list projection for display; may be
            absent if the employee record is unavailable.
          example: "Budi Santoso"
        type: { $ref: '#/components/schemas/AgreementType' }
        agreement_no:
          type: string
          example: "PKWT/SWP/2026/0142"
        start_date: { type: string, format: date }
        end_date:
          type: [string, "null"]
          format: date
          description: Required when type=PKWT; null for PKWTT.
        status: { $ref: '#/components/schemas/AgreementStatus' }
        predecessor_id:
          allOf: [{ $ref: '#/components/schemas/AgreementId' }]
          nullable: true
          description: Set on the successor created via `:renew` (EA-3).
        successor_id:
          allOf: [{ $ref: '#/components/schemas/AgreementId' }]
          nullable: true
        closed_reason: { $ref: '#/components/schemas/AgreementCloseReason' }
        closed_at:
          type: [string, "null"]
          format: date-time
        compensation:
          allOf: [{ $ref: '#/components/schemas/CompensationTerms' }]
          description: |
            Current comp. Hidden / masked for unauthorized roles (EA-4). On
            mobile (agent role) this field is omitted entirely.
        annual_leave_entitlement_days:
          type: integer
          minimum: 0
          nullable: true
          description: >-
            Annual leave entitlement in days (hak cuti tahunan) — term of the
            employment agreement; source for E6 leave quota.
          example: 12
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    AgreementWriteRequest:
      type: object
      description: Body for create/patch on agreements.
      properties:
        employee_id: { $ref: '#/components/schemas/EmployeeId' }
        type: { $ref: '#/components/schemas/AgreementType' }
        agreement_no: { type: string }
        start_date: { type: string, format: date }
        end_date:
          type: string
          format: date
          description: Required for PKWT; must be omitted for PKWTT.
        compensation: { $ref: '#/components/schemas/CompensationTerms' }
        annual_leave_entitlement_days:
          type: integer
          minimum: 0
          nullable: true
          description: >-
            Annual leave entitlement in days (hak cuti tahunan) — term of the
            employment agreement; source for E6 leave quota.

    # ---- ClientCompany --------------------------------------------------

    Geofence:
      type: object
      description: |
        Geofence definition for a client company. `radius_m` defaults to
        **100m** per EPICS.md §8 lock. `active` is derived server-side from
        `center` (lat/lng) presence per D11.
      properties:
        center:
          type: object
          nullable: true
          required: [lat, lng]
          properties:
            lat: { type: number, format: double, minimum: -90, maximum: 90 }
            lng: { type: number, format: double, minimum: -180, maximum: 180 }
        radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
          description: Geofence radius in meters. Out-of-range → `GEOFENCE_RADIUS_INVALID`.
        active:
          type: boolean
          readOnly: true
          description: Server-derived from `center` presence (D11).

    ClientCompany:
      type: object
      description: |
        Client company directory entry (F2.3). Holds statutory/billing info only —
        the **physical locations + geofence live on its Sites** (F2.6, relocated
        2026-06-03; see the `Site` schema and `/client-companies/{id}/sites`).
      required: [id, name, address, leader_scope, status]
      properties:
        id: { $ref: '#/components/schemas/ClientCompanyId' }
        name: { type: string, maxLength: 200, example: Plaza Group }
        address:
          type: string
          description: Registered / billing address (not the geofence — that's per Site).
          example: "Jl. M.H. Thamrin Kav. 28-30, Jakarta Pusat 10350"
        leader_scope:
          type: string
          enum: [company, site]
          default: company
          description: |
            Shift-leadership granularity (E3 F3.4): `company` = one leader for the
            whole company; `site` = one leader per active Site. Default `company`.
        npwp:
          type: [string, "null"]
          description: Optional Indonesian tax ID. Unique when set (CC-2).
        pic_name: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        email: { type: [string, "null"], format: email }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        has_leader:
          type: boolean
          readOnly: true
          description: True iff the company has an assigned shift leader (company-scope) (E3).
        site_count:
          type: integer
          readOnly: true
          description: Number of active sites (always ≥1 — every company has a primary Main Site, INV-5).
        active_placement_count:
          type: integer
          readOnly: true
          description: Cached count for the warn-and-guide deactivate flow (CC-5).
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    ClientCompanyWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        address: { type: string }
        leader_scope:
          type: string
          enum: [company, site]
          default: company
        npwp: { type: string }
        pic_name: { type: string }
        phone: { type: string }
        email: { type: string, format: email }

    # ---- Site (F2.6 — placement location + geofence) --------------------

    Site:
      type: object
      description: |
        A physical placement location of a client company (F2.6). Holds the
        attendance **geofence** (center + radius) that E5 clock-in validates
        against. Every company has ≥1 Site; exactly one `is_primary` (INV-5).
      required: [id, client_company_id, name, address, geofence_radius_m, is_primary, status]
      properties:
        id: { $ref: '#/components/schemas/SiteId' }
        client_company_id: { $ref: '#/components/schemas/ClientCompanyId' }
        name: { type: string, maxLength: 200, example: Plaza Senayan }
        code:
          type: [string, "null"]
          description: Optional short code, unique within the company when set.
        address: { type: string, example: "Jl. Asia Afrika No. 8, Jakarta Pusat 10270" }
        geo:
          type: object
          nullable: true
          required: [lat, lng]
          description: Geofence center. Null until coordinates are set (then geofence activates).
          properties:
            lat: { type: number, format: double }
            lng: { type: number, format: double }
        geofence_radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
          description: Geofence radius in meters (default 100m per §8 lock). Out-of-range → `GEOFENCE_RADIUS_INVALID`.
        geofence_active:
          type: boolean
          readOnly: true
          description: Server-derived — true iff `geo.lat` and `geo.lng` are set (ST-8 / D11).
        is_primary:
          type: boolean
          description: The company's default "Main Site". Exactly one per company (INV-5).
        pic_name: { type: [string, "null"], description: Optional on-site contact. }
        phone: { type: [string, "null"] }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        active_placement_count:
          type: integer
          readOnly: true
          description: Cached count for the deactivate guard (ST-6).
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    SiteWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        code: { type: string }
        address: { type: string }
        geo:
          type: object
          nullable: true
          properties:
            lat: { type: number, format: double, minimum: -90, maximum: 90 }
            lng: { type: number, format: double, minimum: -180, maximum: 180 }
        geofence_radius_m:
          type: integer
          minimum: 25
          maximum: 1000
          default: 100
        is_primary:
          type: boolean
          description: Set true to make this the primary site (demotes the current primary).
        pic_name: { type: string }
        phone: { type: string }

    # ---- Operational master data ----------------------------------------

    LeaveType:
      type: object
      required: [id, name, code, is_annual, requires_document, status]
      properties:
        id: { $ref: '#/components/schemas/LeaveTypeId' }
        name:
          type: string
          example: Cuti Tahunan
          description: Unique (MD-2).
        code:
          type: string
          description: Machine-readable code (e.g., `ANNUAL`, `SICK`, `MATERNITY`). Unique.
          example: ANNUAL
        description: { type: string }
        default_annual_quota:
          type: integer
          minimum: 0
          description: Default per-year quota days (consumed by E6 quota seeding).
        is_annual:
          type: boolean
          description: If true, quota accrues annually (LT-2).
        requires_document:
          type: boolean
          description: If true, leave request must attach a document (LT-3).
        color:
          type: string
          description: Hex color used by calendar UIs (E6). Tokenized — DESIGN-SYSTEM §2.
          example: "#188E4D"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    LeaveTypeWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        code: { type: string, maxLength: 30 }
        description: { type: string }
        default_annual_quota: { type: integer, minimum: 0 }
        is_annual: { type: boolean }
        requires_document: { type: boolean }
        color: { type: string }

    AttendanceCode:
      type: object
      required: [id, code, label, color, is_workday, is_paid, is_billable, needs_verification, status]
      properties:
        id: { $ref: '#/components/schemas/AttendanceCodeId' }
        code:
          type: string
          description: Machine-readable code (e.g., `PRESENT`, `LATE`, `ABSENT`). Unique.
          example: PRESENT
        label:
          type: string
          description: Indonesian display label (e.g., "Hadir"). Unique.
          example: Hadir
        description: { type: string }
        color:
          type: string
          description: |
            Hex. Per DESIGN-SYSTEM §2 the **present** status is **teal**
            (`#0F8B8D`), NOT brand green — brand green (`#188E4D`) is reserved
            for primary actions.
          example: "#0F8B8D"
        is_workday:
          type: boolean
          description: Counts as a working day (relevant for E6 day-counting).
        is_paid:
          type: boolean
          description: Paid by SWP to the agent.
        is_billable:
          type: boolean
          description: Chargeable to the client (E10 billable reporting; verified-only).
        needs_verification:
          type: boolean
          description: Shift-leader verification required (E5).
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    AttendanceCodeWriteRequest:
      type: object
      properties:
        code: { type: string, maxLength: 30 }
        label: { type: string, maxLength: 60 }
        description: { type: string }
        color: { type: string }
        is_workday: { type: boolean }
        is_paid: { type: boolean }
        is_billable: { type: boolean }
        needs_verification: { type: boolean }

    OvertimeRule:
      type: object
      required: [id, name, weekday_rate, restday_rate, holiday_rate, min_minutes, pre_approval_required, status]
      properties:
        id: { $ref: '#/components/schemas/OvertimeRuleId' }
        name:
          type: string
          example: Default OT
          description: Unique (MD-2).
        weekday_rate:
          type: number
          format: float
          description: Multiplier for weekday OT (e.g., 1.5).
          example: 1.5
        restday_rate:
          type: number
          format: float
          description: Multiplier for rest-day OT (e.g., 2.0).
          example: 2.0
        holiday_rate:
          type: number
          format: float
          description: Multiplier for public-holiday OT (e.g., 3.0). Beats rest-day when both apply.
          example: 3.0
        min_minutes:
          type: integer
          minimum: 30
          default: 30
          description: |
            Minimum OT counted in minutes. **Locked at 30** per EPICS.md §8
            D4 (resolved 2026-06-02 — was 60 in earlier review). Values
            below 30 → `RULE_VIOLATION` (422).
        max_minutes_per_day:
          type: integer
          description: Daily cap (e.g., 240 minutes = 4 hours).
          example: 240
        pre_approval_required:
          type: boolean
          description: If true, OT request must be pre-approved before worked (E7).
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    OvertimeRuleWriteRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        weekday_rate: { type: number, format: float }
        restday_rate: { type: number, format: float }
        holiday_rate: { type: number, format: float }
        min_minutes:
          type: integer
          minimum: 30
          default: 30
        max_minutes_per_day: { type: integer }
        pre_approval_required: { type: boolean }
