        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateClientCompany
      tags: [client-companies]
      summary: Edit client company (statutory fields, leader_scope)
      description: |
        Partial update — statutory/billing fields, PIC contact, and
        `leader_scope` (company ↔ site). Geofence/location is edited on the
        company's Sites (F2.6), not here.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientCompanyWriteRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientCompany' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Duplicate name or NPWP.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /client-companies/{client_company_id}:deactivate:
    parameters:
      - { $ref: '#/components/parameters/ClientCompanyIdPath' }
    post:
      operationId: deactivateClientCompany
      tags: [client-companies]
      summary: Deactivate a client company (CC-5 — active-placement guard)
      description: |
        Sets the company to `INACTIVE`. **Blocks** if active placements exist
        unless `force=true` is passed AND the actor accepts the consequence
        (returns `COMPANY_HAS_ACTIVE_PLACEMENTS` (409) by default). HR is
        expected to end/transfer placements first per CC-5.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - in: query
          name: force
          description: |
            If `true`, deactivate even with active placements (will mark them
            for review). Default `false` (warn-and-guide per CC-5 open
            decision).
          schema: { type: boolean, default: false }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Deactivated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientCompany' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Active placements present and `force` not set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                active_placements:
                  value:
                    error:
                      code: COMPANY_HAS_ACTIVE_PLACEMENTS
                      message: "Plaza Senayan masih memiliki 42 penempatan aktif. Akhiri atau pindahkan terlebih dahulu."
                      fields:
                        active_placement_count: "42"
                      request_id: req_01J5XLB3

  /client-companies/{client_company_id}:reactivate:
    parameters:
      - { $ref: '#/components/parameters/ClientCompanyIdPath' }
    post:
      operationId: reactivateClientCompany
      tags: [client-companies]
      summary: Reactivate a client company (C-2)
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Reactivated — selectable as placement target again.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientCompany' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

