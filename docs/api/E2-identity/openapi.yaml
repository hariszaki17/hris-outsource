openapi: 3.1.0
info:
  title: hris-outsource · E2 Identity, Org & Master Data
  version: 1.0.0
  description: |
    OpenAPI 3.1 contract for **E2 — Identity, Org & Master Data**.

    Scope: the people the system is about (employees + linked logins), the
    employment relationship (PKWT/PKWTT agreements + compensation), the client
    company directory, and the operational master data (leave types, attendance
    codes, overtime rules). Position is **free-text** (no master) with a
    typeahead search endpoint over existing values.

    Binding conventions: see `docs/api/CONVENTIONS.md` (sections referenced
    inline as §N). Picker endpoints are co-located with their owning resource
    per §18 — no separate `/lookups` namespace.

    Cross-references: employee-detail tab data (Penempatan/Kehadiran/Cuti/Lembur)
    is **not served** by E2; the E2 employee-detail response carries
    `x-cross-epic-references` mapping each tab to the owning epic's endpoint.

    Personas used in examples: **Sari Hadi (HR Admin)**, **Rudi Wijaya (Shift
    Leader, Plaza Senayan)**, **Budi Santoso (Agent, Parking Attendant)**.
  contact:
    name: SWP HRIS Product
  license:
    name: Internal — SWP
servers:
  - url: https://api.swp.example.com/api/v1
    description: Production
  - url: https://api-staging.swp.example.com/api/v1
    description: Staging

tags:
  - name: employees
    description: |
      Employee directory + agent self-service change-requests. Doubles as the
      Employee picker per §18 — listing fields are picker-shaped.
  - name: change-requests
    description: |
      Agent-initiated change-requests (approval queue, routed to the agent's
      shift leader with HR fallback). Approval-tier fields: phone,
      emergency_contact, bank. Statutory fields stay HR-only; bank approval
      additionally needs `change_requests.approve.bank` (HR-only).
  - name: self-service
    description: |
      Agent self-service on their own record (`/me/*`). Instant-tier profile
      edits (address, app_language, photo) apply immediately with no approval;
      approval-tier fields go through `change-requests` instead.
  - name: agreements
    description: |
      Employment agreements (PKWT/PKWTT) — the legal SWP↔agent relationship
      and the source of current compensation referenced by E7/E8.
  - name: client-companies
    description: |
      Client company directory (legacy `companies.role=2`). Doubles as the
      ClientCompany picker. Statutory/billing info + `leader_scope`; geofence
      lives on Sites (F2.6).
  - name: sites
    description: |
      Client sites (F2.6) — placement locations under a company, each with its
      own geofence (center + radius, default 100m per EPICS §8). Every company
      has ≥1 site (primary "Main Site"). `GET /client-companies/{id}/sites`
      doubles as the Site picker for placement (E3).
  - name: people
    description: |
      Cross-cutting people utilities — e.g. the position typeahead
      (`GET /positions:search`) backing the free-text position field used by
      employee placement (E3). Position is free-text, not a master entity.
  - name: master-data
    description: |
      Operational master data — leave types, attendance codes, overtime rules
      (the OT rule's `min_minutes` defaults to **30** per D4 lock).

security:
  - bearerAuth: []

paths:

  # =====================================================================
  # EMPLOYEES (F2.1)
  # =====================================================================

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees (also serves as Employee picker per §18)
      description: |
        Cursor-paginated list of employees. Same endpoint doubles as the
        Employee picker (`?q=...&status=ACTIVE&role=...`) per CONVENTIONS §18.
        When called for picker use, the consumer reads only the
        `picker_summary` projection on each item (`id`, `full_name`, `nip`,
        `position`, `client_company`).
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      x-design-screens:
        - WElYh   # E2 · Karyawan — Daftar (Admin list)
        - n3wi1w  # E2 SL · Karyawan — List (scoped)
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Sort' }
        - in: query
          name: q
          description: Free-text search across `full_name`, `nip`, `nik`, `email`, `phone`.
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
        - in: query
          name: status__in
          description: Multi-value status filter (CONVENTIONS §9).
          schema: { type: string, example: "ACTIVE,INACTIVE" }
        - in: query
          name: client_company
          description: Filter by current placement's client company ID.
          schema: { $ref: '#/components/schemas/ClientCompanyId' }
        - in: query
          name: role
          description: |
            Filter by linked User role (E1). Use `shift_leader` (combined
            with `assigned=false`) for the unassigned-leader picker (§18).
          schema:
            type: string
            enum: [agent, shift_leader, hr_admin, super_admin]
        - in: query
          name: assigned
          description: |
            Only meaningful with `role=shift_leader`. `false` = leader not yet
            assigned to any client company (drives the leader-picker for E3).
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated employee page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Employee' }
              examples:
                two_employees:
                  summary: HR list, default sort
                  value:
                    data:
                      - id: SWP-EMP-1042
                        full_name: Budi Santoso
                        nip: "1042"
                        nik: "3175011505900012"
                        join_at: "2024-03-15"
                        phone: "+62-812-3344-5566"
                        status: ACTIVE
                        current_position: Petugas Parkir
                        current_client_company:
                          id: SWP-CMP-101
                          name: Plaza Senayan
                        user_id: SWP-USR-1042
                      - id: SWP-EMP-1043
                        full_name: Rudi Wijaya
                        nip: "1043"
                        nik: "3175011505900019"
                        join_at: "2023-11-01"
                        phone: "+62-812-5566-7788"
                        status: ACTIVE
                        current_position: Koordinator Lokasi
                        current_client_company:
                          id: SWP-CMP-101
                          name: Plaza Senayan
                        user_id: SWP-USR-1043
                    next_cursor: "eyJpZCI6IlNXUC1FTVAtMTA0MyJ9"
                    has_more: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee (EP-1)
      description: |
        Creates an Employee. Creation **always** auto-provisions a linked E1
        User (1:1, non-null) with default role `agent` (D1, EP-3). The login
        identifier is the employee's `phone` (required); `login_email` is an
        optional secondary identifier. The response returns a one-time
        `temp_password` (show-once) for the new account; the agent rotates it
        on first login (D3).

        Required fields per EP-1: `full_name`, `nik`, `join_at`, `phone`.
        Duplicate NIK returns `DUPLICATE_NIK` (409); a duplicate phone or
        login email returns a 409 conflict.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - h6bDz   # E2 · Karyawan — Tambah
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeWriteRequest' }
            examples:
              hr_creating_agent:
                summary: HR creates an agent (login auto-provisioned)
                value:
                  full_name: Budi Santoso
                  nik: "3175011505900012"
                  nip: "1042"
                  join_at: "2024-03-15"
                  gender: MALE
                  phone: "+62-812-3344-5566"
                  email_personal: budi.santoso@gmail.com
                  npwp: "12.345.678.9-012.000"
                  bpjs_kesehatan: "0001234567890"
                  bpjs_ketenagakerjaan: "1234567890"
                  bank_account:
                    bank_name: BCA
                    account_number: "1234567890"
                    account_holder_name: Budi Santoso
                  address: "Jl. Mawar 23, Jakarta Selatan"
                  login_email: budi.santoso@swp.co.id
      responses:
        '201':
          description: Created.
          headers:
            Location:
              description: URI of the new employee.
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Conflict — NIK, phone, or login email already in use.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                duplicate_nik:
                  value:
                    error:
                      code: DUPLICATE_NIK
                      message: "NIK sudah terdaftar untuk karyawan lain."
                      fields:
                        nik: "NIK 3175011505900012 sudah dipakai oleh Budi Santoso (SWP-EMP-1042)."
                      request_id: req_01J5XK2Q7
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /employees/{employee_id}:
    parameters:
      - { $ref: '#/components/parameters/EmployeeIdPath' }
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee detail (EP-1)
      description: |
        Returns the full Employee record. The response carries
        `x-cross-epic-references` semantics: the design's 5-tab detail
        (Profil / Penempatan / Kehadiran / Cuti & Lembur / Dokumen) is
        populated by **separate** endpoints — only the Profil tab is served
        from E2. See `x-cross-epic-references` extension below.
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader, agent]
        scope: company_or_global
      x-design-screens:
        - JBjBb   # E2 · Karyawan — Detail
        - rtKzk   # E2 SL · Detail (read-only)
        - s5RO1   # Agen · Profil Saya
      x-cross-epic-references:
        description: |
          The employee-detail UI has 5 tabs. Only the **Profil** tab is served
          by this endpoint. The other tabs are powered by these endpoints
          (D3 — annotated, not duplicated):
        tabs:
          profil:
            served_by: GET /employees/{employee_id}
            epic: E2
          penempatan:
            served_by: GET /placements?employee_id={employee_id}
            epic: E3
          kehadiran:
            served_by: GET /attendance?employee_id={employee_id}
            epic: E5
          cuti_lembur:
            served_by:
              - GET /leave-requests?employee_id={employee_id}
              - GET /overtime-requests?employee_id={employee_id}
            epic: E6, E7
          dokumen:
            served_by: GET /employees/{employee_id}/attachments
            epic: E2 (future v1.1+ — no PRD reference today)
      responses:
        '200':
          description: Employee record (Profil tab data).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
              examples:
                budi:
                  value:
                    id: SWP-EMP-1042
                    full_name: Budi Santoso
                    nip: "1042"
                    nik: "3175011505900012"
                    join_at: "2024-03-15"
                    gender: MALE
                    birth_date: "1990-05-15"
                    birth_place: Jakarta
                    phone: "+62-812-3344-5566"
                    email_personal: budi.santoso@gmail.com
                    npwp: "12.345.678.9-012.000"
                    bpjs_kesehatan: "0001234567890"
                    bpjs_ketenagakerjaan: "1234567890"
                    bank_account:
                      bank_name: BCA
                      account_number: "1234567890"
                      account_holder_name: Budi Santoso
                    address: "Jl. Mawar 23, Jakarta Selatan"
                    status: ACTIVE
                    user_id: SWP-USR-1042
                    current_position: Petugas Parkir
                    current_client_company:
                      id: SWP-CMP-101
                      name: Plaza Senayan
                    created_at: "2024-03-15T08:00:00Z"
                    updated_at: "2026-05-30T11:42:08Z"
                    created_by: SWP-EMP-0001
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: HR/admin edit of an employee (EP-6)
      description: |
        Partial update by HR/super-admin. **Statutory fields (NIK, NPWP,
        full_name) are HR-only** per EP-6. Agents must instead use
        `POST /employees/{id}/change-requests` for non-statutory edits
        (phone, address, bank).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - JBjBb   # E2 · Karyawan — Detail (Edit Profil)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeWriteRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Duplicate NIK.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /employees/{employee_id}:deactivate:
    parameters:
      - { $ref: '#/components/parameters/EmployeeIdPath' }
    post:
      operationId: deactivateEmployee
      tags: [employees]
      summary: Offboard employee — atomic, traceable cascade (F2.7 OB-1)
      description: |
        Offboards an employee in a SINGLE transaction (F2.7 OB-1). It sets the
        employee status to `INACTIVE`, **closes the active employment agreement**
        (sets `closed_reason` to the offboard `reason`), **ends every
        non-terminal placement** (E3), and disables the linked User login (EP-7).
        Historical records (attendance, leave, payroll) are preserved. Terminal
        state per Wave 3.4 — reactivation possible via `:reactivate` (C-3).

        The cascade is **traceable** (OB-3): the agreement-close and each
        placement-end emit their own audit entries carrying
        `caused_by=employee_offboard` + `source_employee_id`, so it is clear they
        closed *because of* the offboard rather than via a direct close. The
        parent `employee.offboard` audit entry lists the cascaded ids.

        `reason` → agreement `closed_reason` (same value) and → placement terminal
        pair: `RESIGNED`→(RESIGNED, RESIGNED), `TERMINATED`→(TERMINATED,
        TERMINATED), `END_OF_TERM`→(ENDED, END_OF_TERM), `OTHER`→(ENDED, ENDED).

        Disabling the login bumps the user's session epoch
        (`users.tokens_valid_after`) and calls `RevokeAllRefreshForUser`
        (E1). The auth middleware now performs a per-request user
        status + epoch check, so revocation is instant — prior access tokens
        fail on their next validation rather than living out their TTL (F2.7,
        OB-#). This is the ONLY path that revokes login: placement-end
        (transfer/renewal/supersede/auto-end) NEVER revokes.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - JBjBb   # row-kebab → Nonaktifkan overlay (wlNma)
        - WElYh
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: [RESIGNED, TERMINATED, END_OF_TERM, OTHER]
                  description: |
                    Required offboard reason (F2.7 OB-1). Drives the traceable
                    cascade: becomes the agreement `closed_reason` and is mapped to
                    the placement terminal `lifecycle_status` / `ended_reason`.
                note:
                  type: string
                  description: Optional free-text note recorded on the offboard audit entry.
      responses:
        '200':
          description: Deactivated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already inactive.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /employees/{employee_id}:reactivate:
    parameters:
      - { $ref: '#/components/parameters/EmployeeIdPath' }
    post:
      operationId: reactivateEmployee
      tags: [employees]
      summary: Reactivate a deactivated employee (C-3)
      description: |
        Restores status to `ACTIVE`. The employee's linked User login is
        re-enabled (every employee has a 1:1 login, D1).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens:
        - JBjBb
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Reactivated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /employees:bulk-deactivate:
    post:
      operationId: bulkDeactivateEmployees
      tags: [employees]
      summary: Bulk deactivate employees (rare)
      description: |
        Bulk-deactivate path per CONVENTIONS §14. Idempotency-Key required.
        Use cases: bulk end-of-contract from a payroll cycle. Most flows use
        per-id `:deactivate` instead.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens: []
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKeyRequired' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items: { $ref: '#/components/schemas/EmployeeId' }
                reason:
                  type: string
                  description: Audit note applied to every affected entity.
      responses:
        '200':
          description: Partial-success result envelope per §14.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkResult' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: All items failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkResult' }

  # --- Agent self-edit change requests (EP-5) -----------------------------

  /employees/{employee_id}/change-requests:
    parameters:
      - { $ref: '#/components/parameters/EmployeeIdPath' }
    post:
      operationId: createChangeRequest
      tags: [change-requests, employees]
      summary: Agent submits a profile-change request (EP-5)
      description: |
        Approval-tier self-edit (web + mobile). Agent can request changes to
        **phone, emergency_contact, or bank_account**. Statutory fields (NIK,
        NPWP, full_name) are blocked — sending them returns `FIELD_NOT_EDITABLE`
        (422). Instant-tier fields (`address`, `app_language`, photo) must NOT
        be sent here — they apply immediately via `PATCH /me/profile` and
        return `FIELD_REQUIRES_APPROVAL` only in the reverse direction.

        The request is queued for approval (shift leader for the agent's
        company, HR fallback); the resulting `ChangeRequest` has
        `status=PENDING` and ID prefix `SWP-CHG-`.
      x-rbac:
        roles: [agent]
        scope: self
      x-design-screens:
        - n465cT  # Agen · Ajukan Perubahan
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeRequestCreate' }
            examples:
              budi_phone_and_bank:
                value:
                  changes:
                    phone: "+62-812-9988-7766"
                    bank_account:
                      bank_name: BCA
                      account_number: "9999000011"
                      account_holder_name: Budi Santoso
                  note: "Ganti nomor & rekening baru"
      responses:
        '201':
          description: Pending change request created.
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChangeRequest' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Validation — including `FIELD_NOT_EDITABLE` if a statutory field was sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                statutory_blocked:
                  value:
                    error:
                      code: FIELD_NOT_EDITABLE
                      message: "Field NIK hanya dapat diubah oleh HR."
                      fields:
                        nik: "Statutori — tidak dapat diajukan dari mobile."
                      request_id: req_01J5XKN2
    get:
      operationId: listOwnChangeRequests
      tags: [change-requests, employees]
      summary: Agent lists own change requests
      description: |
        Agent's own history (PENDING/APPROVED/REJECTED). Powers the mobile
        "Riwayat Pengajuan" list on `SXqA5`.
      x-rbac:
        roles: [agent, hr_admin, super_admin]
        scope: self
      x-design-screens:
        - SXqA5
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ChangeRequestStatus' }
      responses:
        '200':
          description: Page of own change requests.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ChangeRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # --- HR approval queue --------------------------------------------------

  /change-requests:
    get:
      operationId: listPendingChangeRequests
      tags: [change-requests]
      summary: HR approval queue — all pending change requests
      description: |
        HR sees the cross-employee pending queue (BLOCKER finding from
        E2-AUDIT.md §6: this surface didn't exist in legacy). Filterable by
        request type and employee.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens: []  # AUDIT BLOCKER: design surface still missing
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Sort' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ChangeRequestStatus' }
        - in: query
          name: employee_id
          schema: { $ref: '#/components/schemas/EmployeeId' }
        - in: query
          name: request_type
          description: |
            Filter by the *type* of change requested. Derived server-side
            from the fields present in the request body.
          schema:
            type: string
            enum: [PHONE, EMERGENCY_CONTACT, BANK_ACCOUNT, MULTIPLE]
        - in: query
          name: q
          description: Free-text search on submitter name / NIP.
          schema: { type: string }
      responses:
        '200':
          description: Pending queue page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ChangeRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /change-requests/{change_request_id}:
    parameters:
      - in: path
        name: change_request_id
        required: true
        schema: { $ref: '#/components/schemas/ChangeRequestId' }
    get:
      operationId: getChangeRequest
      tags: [change-requests]
      summary: View change-request detail (old → new diff + per-field resolutions)
      description: |
        Detail of a single change request including the old → new diff per
        field and the `field_resolutions` map; powers the review modal for HR
        **and shift leaders** (company-scoped). A shift leader sees the bank
        row but can only approve it if they hold `change_requests.approve.bank`
        (HR-only) — otherwise it surfaces as "Perlu HR" / escalated.
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader, agent]
        scope: company_or_global
      x-design-screens:
        - MdhFZ   # E2 · Change-request review (per-field diff + resolutions)
        - CATOn   # E2 SL · Inbox approval panel (company-scoped)
        - jg8zl   # E2 · Reject change-request modal (reason required)
      responses:
        '200':
          description: Change-request detail with diff.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChangeRequestDetail' }
              examples:
                budi_diff:
                  value:
                    id: SWP-CHG-2117
                    employee:
                      id: SWP-EMP-1042
                      full_name: Budi Santoso
                      nip: "1042"
                    status: PENDING
                    submitted_at: "2026-06-01T09:14:22Z"
                    note: "Ganti nomor & rekening baru"
                    diff:
                      phone:
                        old: "+62-812-3344-5566"
                        new: "+62-812-9988-7766"
                      bank_account:
                        old:
                          bank_name: BCA
                          account_number: "1234567890"
                          account_holder_name: Budi Santoso
                        new:
                          bank_name: BCA
                          account_number: "9999000011"
                          account_holder_name: Budi Santoso
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /change-requests/{change_request_id}:approve:
    parameters:
      - in: path
        name: change_request_id
        required: true
        schema: { $ref: '#/components/schemas/ChangeRequestId' }
    post:
      operationId: approveChangeRequest
      tags: [change-requests]
      summary: Approve a change request — applies the change (bank-split aware)
      description: |
        On approve, the requested values are atomically written to the
        Employee record (audit log captures the actor + before/after).
        Idempotent via Idempotency-Key.

        **Approver routing & bank split.** Shift leaders (company-scoped) and
        HR/super-admin may approve. The `bank_account` field additionally
        requires the `change_requests.approve.bank` permission (HR/super-admin
        only). When a shift leader approves a **mixed** request (bank +
        non-bank):
        - the non-bank fields are applied now (`field_resolutions[*]=APPLIED`),
        - the `bank_account` field is escalated
          (`field_resolutions.bank_account=ESCALATED_TO_HR`, `bank_pending=true`),
        - the request moves to `PARTIALLY_APPROVED`.

        HR then approves again to finalize the bank field → `APPROVED`. A
        bank-only request approved by a leader without the bank permission is
        escalated, not applied. On approve the agent is notified
        (`CHANGE_REQUEST_APPROVED`, listing the applied fields and whether it
        was partial — see E10 `NotificationKind`).
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      x-design-screens:
        - MdhFZ   # E2 · Change-request review (approve / partial-approve)
        - CATOn   # E2 SL · Inbox approval panel (company-scoped)
        - jg8zl   # E2 · Reject change-request modal (reason required)
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: |
            Approved & applied. When a shift leader approved a mixed request,
            the response carries `status=PARTIALLY_APPROVED` + `bank_pending=true`
            with the bank field escalated in `field_resolutions`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChangeRequest' }
              examples:
                fully_approved:
                  summary: HR approves all fields
                  value:
                    id: SWP-CHG-2117
                    employee_id: SWP-EMP-1042
                    status: APPROVED
                    bank_pending: false
                sl_partial:
                  summary: Shift leader applies phone, bank escalates to HR
                  value:
                    id: SWP-CHG-2117
                    employee_id: SWP-EMP-1042
                    status: PARTIALLY_APPROVED
                    bank_pending: true
                    field_resolutions:
                      phone: { resolution: APPLIED, resolved_by: SWP-EMP-1043, resolved_at: "2026-06-11T03:20:00Z" }
                      bank_account: { resolution: ESCALATED_TO_HR, resolved_by: SWP-EMP-1043, resolved_at: "2026-06-11T03:20:00Z" }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403':
          description: |
            Forbidden — leader out of company scope (`OUT_OF_SCOPE`), or the
            bank field requires `change_requests.approve.bank` which the caller
            lacks (the UI escalates instead of calling approve in that case).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already resolved (APPROVED or REJECTED).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /change-requests/{change_request_id}:reject:
    parameters:
      - in: path
        name: change_request_id
        required: true
        schema: { $ref: '#/components/schemas/ChangeRequestId' }
    post:
      operationId: rejectChangeRequest
      tags: [change-requests]
      summary: Reject a change request (reason required — Wave-1 ModalReject)
      description: |
        Reject with a required free-text `reason` (Wave-1 ModalReject
        pattern). The Employee record is **not** modified. Shift leaders
        (company-scoped) and HR/super-admin may reject. The agent is notified
        with the reason (`CHANGE_REQUEST_REJECTED` — see E10 `NotificationKind`).
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      x-design-screens:
        - jg8zl   # E2 · Reject change-request modal (reason required)
        - CATOn   # E2 SL · Inbox approval panel (company-scoped)
        - MdhFZ   # E2 · Change-request review
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 3
                  maxLength: 500
                  description: Human-readable rejection reason (surfaced to the agent).
            examples:
              budi_bank_rejected:
                value:
                  reason: "Mohon lampirkan foto buku tabungan untuk verifikasi rekening baru."
      responses:
        '200':
          description: Rejected.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChangeRequest' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already resolved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # --- Agent self-service (instant-tier) ----------------------------------

  /me/profile:
    patch:
      operationId: updateMyProfile
      tags: [self-service, employees]
      summary: Agent edits own instant-tier profile fields
      description: |
        Instant self-edit of the caller's own employee record — **no
        approval**. Only the instant-tier fields are accepted: `address`,
        `app_language`, and `photo_object_key` (the `object_key` from a prior
        `POST /me/profile/photo-upload-init`, after the file was PUT to the
        presigned URL). The change is written immediately and audited; no
        notification is dispatched.

        Approval-tier fields (`phone`, `emergency_contact`, `bank_account`)
        are rejected here with `FIELD_REQUIRES_APPROVAL` (422) — the agent
        must use `POST /employees/{id}/change-requests` for those. The employee
        is resolved from the authenticated principal (self scope); there is no
        path id.
      x-rbac:
        roles: [agent]
        scope: self
      x-design-screens:
        - l2BKa   # Agen · Ubah Profil (tiered instant-edit form)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SelfProfileUpdate' }
            examples:
              address_and_language:
                summary: Agent updates address + switches UI to English
                value:
                  address: "Jl. Melati 12, Jakarta Selatan"
                  app_language: en
              new_photo:
                summary: Agent applies a freshly uploaded photo
                value:
                  photo_object_key: "profile-photos/SWP-EMP-1042/01J8XK7QF3.jpg"
      responses:
        '200':
          description: Applied immediately — returns the updated employee.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: |
            An approval-tier field was sent (`FIELD_REQUIRES_APPROVAL`), or the
            `photo_object_key` does not match a key issued to this employee.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                requires_approval:
                  value:
                    error:
                      code: FIELD_REQUIRES_APPROVAL
                      message: "Perubahan nomor telepon memerlukan persetujuan. Gunakan Ajukan Perubahan."
                      fields:
                        phone: "Field ini memerlukan persetujuan dan tidak dapat diubah langsung."
                      request_id: req_01J8XK7Q1

  /me/profile/photo-upload-init:
    post:
      operationId: initProfilePhotoUpload
      tags: [self-service, employees]
      summary: Start a profile-photo upload — returns a presigned PUT ticket
      description: |
        Initializes a direct-to-storage photo upload for the caller's own
        profile photo. Returns an `UploadTicket` (presigned PUT URL +
        server-generated `object_key` + size cap). The client PUTs the image
        bytes to `upload_url` with the pinned `Content-Type`, then calls
        `PATCH /me/profile { photo_object_key }` to apply it.

        Content-type allowlist: `image/jpeg`, `image/png`, `image/webp`. The
        size cap (`max_bytes`) and content type are baked into the presigned
        signature, so an oversized or wrong-type upload fails at the storage
        layer. Same pattern is reused by E5 attendance selfies.
      x-rbac:
        roles: [agent]
        scope: self
      x-design-screens:
        - l2BKa   # Agen · Ubah Profil (photo picker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type]
              properties:
                content_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                  description: MIME type of the photo to upload (pinned into the presign).
                content_length:
                  type: integer
                  description: |
                    Optional declared byte size, validated against `max_bytes`
                    before issuing the ticket. The signature enforces the cap
                    regardless.
            examples:
              jpeg:
                value:
                  content_type: image/jpeg
                  content_length: 482310
      responses:
        '200':
          description: Presigned upload ticket.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadTicket' }
              examples:
                ticket:
                  value:
                    upload_url: "https://storage.swp.example.com/hris-private/profile-photos/SWP-EMP-1042/01J8XK7QF3.jpg?X-Amz-Signature=..."
                    object_key: "profile-photos/SWP-EMP-1042/01J8XK7QF3.jpg"
                    expires_at: "2026-06-11T03:25:00Z"
                    max_bytes: 5242880
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: |
            Disallowed content type, or declared `content_length` exceeds
            `max_bytes`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                too_large:
                  value:
                    error:
                      code: UPLOAD_TOO_LARGE
                      message: "Ukuran foto melebihi batas 5 MB."
                      fields:
                        content_length: "5242880 byte adalah batas maksimum."
                      request_id: req_01J8XK7Q2

  # =====================================================================
  # EMPLOYMENT AGREEMENTS (F2.2)
  # =====================================================================

  /agreements:
    get:
      operationId: listAgreements
      tags: [agreements]
      summary: List employment agreements
      description: |
        Filter by employee, status (ACTIVE/SUPERSEDED/CLOSED/EXPIRING), and
        type (PKWT/PKWTT). `EXPIRING` is a server-computed virtual status —
        active PKWT agreements within 30 days of `end_date` (matches the
        notifications cron in CONVENTIONS §16.2).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens: []  # AUDIT BLOCKER: F2.2 screens entirely missing
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Sort' }
        - in: query
          name: q
          description: Free-text search across employee name, employee id, or agreement number.
          schema: { type: string }
        - in: query
          name: employee_id
          schema: { $ref: '#/components/schemas/EmployeeId' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/AgreementStatus' }
        - in: query
          name: status__in
          schema: { type: string, example: "ACTIVE,EXPIRING" }
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/AgreementType' }
        - in: query
          name: end_date__lte
          schema: { type: string, format: date }
      responses:
        '200':
          description: Page of agreements.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Agreement' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createAgreement
      tags: [agreements]
      summary: Create a PKWT or PKWTT agreement (EA-1)
      description: |
        Creates an employment agreement. Validations per EA-1/EA-2:
        - `PKWT` requires `start_date` + `end_date`; `PKWTT` requires
          `start_date` only.
        - At most one **active** agreement per employee (EA-2). If one
          exists, either close it first or use `:renew` for the successor
          flow (EA-3).
        - `PKWT` period must be ≤ 5 years (Indonesian labor law) →
          `PKWT_PERIOD_EXCEEDS_MAX` (422).
        - Compensation fields are encrypted at rest (EA-4); see schema
          `CompensationTerms`.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens: []  # AUDIT BLOCKER
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgreementWriteRequest' }
            examples:
              pkwt_budi:
                summary: PKWT, 1-year, with comp
                value:
                  employee_id: SWP-EMP-1042
                  type: PKWT
                  agreement_no: "PKWT/SWP/2026/0142"
                  start_date: "2026-06-01"
                  end_date: "2027-05-31"
                  compensation:
                    base_salary_idr: 5200000
                    bpjs_terms:
                      kesehatan_employer_pct: 4.0
                      kesehatan_employee_pct: 1.0
                      ketenagakerjaan_employer_pct: 6.24
                      ketenagakerjaan_employee_pct: 3.0
                    tax_profile: PTKP_K0
              pkwtt_rudi:
                summary: PKWTT, indefinite, no end_date
                value:
                  employee_id: SWP-EMP-1043
                  type: PKWTT
                  agreement_no: "PKWTT/SWP/2024/0019"
                  start_date: "2024-01-01"
                  compensation:
                    base_salary_idr: 8500000
                    bpjs_terms:
                      kesehatan_employer_pct: 4.0
                      kesehatan_employee_pct: 1.0
                      ketenagakerjaan_employer_pct: 6.24
                      ketenagakerjaan_employee_pct: 3.0
                    tax_profile: PTKP_K1
      responses:
        '201':
          description: Created.
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agreement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Active agreement already exists (use `:renew` instead).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                inv2:
                  value:
                    error:
                      code: ACTIVE_AGREEMENT_EXISTS
                      message: "Karyawan sudah memiliki perjanjian aktif. Gunakan endpoint :renew untuk perpanjangan."
                      request_id: req_01J5XKQ9
        '422':
          description: Business-rule violation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                pkwt_too_long:
                  value:
                    error:
                      code: PKWT_PERIOD_EXCEEDS_MAX
                      message: "Periode PKWT melebihi batas 5 tahun yang diizinkan UU Ketenagakerjaan."
                      fields:
                        end_date: "Periode 6 tahun melebihi maksimum 5 tahun."
                      request_id: req_01J5XKR0
                missing_doc:
                  value:
                    error:
                      code: MISSING_REQUIRED_DOCUMENT
                      message: "Dokumen kontrak wajib dilampirkan sebelum perjanjian dapat diaktifkan."
                      request_id: req_01J5XKR1

  /agreements/{agreement_id}:
    parameters:
      - { $ref: '#/components/parameters/AgreementIdPath' }
    get:
      operationId: getAgreement
      tags: [agreements]
      summary: Get agreement detail
      description: |
        Returns the agreement record. **Compensation fields are masked**
        unless the caller has the `view_compensation` permission (EA-4
        role-gated; HR admin & super admin only). Agents (mobile) get a
        slimmer view: type, period, status — compensation hidden (EA-4 §4).
      x-rbac:
        roles: [hr_admin, super_admin, agent]
        scope: self
      responses:
        '200':
          description: Agreement detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agreement' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateAgreement
      tags: [agreements]
      summary: Partial update on an agreement
      description: |
        Patch agreement fields. Compensation changes via this endpoint are
        **effective-dated and historized** as new `CompensationRecord`s (C-3
        decision); the underlying field is never overwritten in place. The
        agreement's "current comp" is the latest record effective today.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgreementWriteRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agreement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /agreements/{agreement_id}:renew:
    parameters:
      - { $ref: '#/components/parameters/AgreementIdPath' }
    post:
      operationId: renewAgreement
      tags: [agreements]
      summary: Renew a PKWT (generates a linked successor — EA-3)
      description: |
        Creates a **new** agreement with `predecessor_id` set to the current
        one and sets the predecessor's status to `SUPERSEDED`. The successor
        may itself be PKWT (with new end_date) or convert to PKWTT (C-2 —
        permanent conversion).

        Returns the new agreement (with new `SWP-AG-*` id).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, start_date]
              properties:
                type: { $ref: '#/components/schemas/AgreementType' }
                agreement_no:
                  type: string
                  description: New agreement reference number (e.g. PKWT/SWP/2027/0142).
                start_date: { type: string, format: date }
                end_date:
                  type: string
                  format: date
                  description: Required when type=PKWT.
                compensation: { $ref: '#/components/schemas/CompensationTerms' }
                note:
                  type: string
                  description: Optional human note carried into the audit log.
            examples:
              budi_renew_pkwt:
                value:
                  type: PKWT
                  agreement_no: "PKWT/SWP/2027/0142"
                  start_date: "2027-06-01"
                  end_date: "2028-05-31"
                  compensation:
                    base_salary_idr: 5500000
                    bpjs_terms:
                      kesehatan_employer_pct: 4.0
                      kesehatan_employee_pct: 1.0
                      ketenagakerjaan_employer_pct: 6.24
                      ketenagakerjaan_employee_pct: 3.0
                    tax_profile: PTKP_K0
      responses:
        '201':
          description: Successor created.
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agreement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Predecessor is not in a renewable state (e.g., already SUPERSEDED).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: Business-rule violation (e.g., PKWT > 5 years).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /agreements/{agreement_id}:close:
    parameters:
      - { $ref: '#/components/parameters/AgreementIdPath' }
    post:
      operationId: closeAgreement
      tags: [agreements]
      summary: Close an agreement early (EA-5)
      description: |
        Terminates an agreement with a reason and effective date (EA-5).
        Reason ∈ {RESIGNED, TERMINATED, END_OF_TERM, DECEASED, RETIRED,
        ABSCONDED, OTHER}. Active
        placements (E3) referencing this agreement are flagged for review
        (cascade — implicit side effect; not a separate API call).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, effective_date]
              properties:
                reason:
                  type: string
                  enum: [RESIGNED, TERMINATED, END_OF_TERM, DECEASED, RETIRED, ABSCONDED, OTHER]
                effective_date:
                  type: string
                  format: date
                note:
                  type: string
                  maxLength: 500
            examples:
              budi_resigned:
                value:
                  reason: RESIGNED
                  effective_date: "2026-08-15"
                  note: "Pengunduran diri atas permintaan sendiri (lampirkan surat di attachments)."
      responses:
        '200':
          description: Closed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agreement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already closed/superseded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /agreements/{agreement_id}/attachments:
    parameters:
      - { $ref: '#/components/parameters/AgreementIdPath' }
    post:
      operationId: uploadAgreementAttachment
      tags: [agreements]
      summary: Upload an agreement document (PDF/JPG/PNG)
      description: |
        Multipart upload per CONVENTIONS §15. Used for the signed agreement
        scan, ID copies, etc. Max 10 MB; allowed types: `application/pdf`,
        `image/jpeg`, `image/png`.

        On agreement create, server-side validation may require at least one
        attachment of category `signed_agreement` — failing this returns
        `MISSING_REQUIRED_DOCUMENT` (422) at create time, not here.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [signed_agreement, addendum, supporting_doc]
                  default: signed_agreement
                caption:
                  type: string
                  maxLength: 200
      responses:
        '201':
          description: File stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileRef' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: File too large (> 10 MB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # =====================================================================
  # CLIENT COMPANIES (F2.3)
  # =====================================================================

  /client-companies:
    get:
      operationId: listClientCompanies
      tags: [client-companies]
      summary: List client companies (also serves as ClientCompany picker)
      description: |
        Doubles as the ClientCompany picker per §18. Supports filters by
        status and whether a shift leader is already assigned (`has_leader`) —
        the unassigned-company picker is used by E3 leader-assignment.
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      x-design-screens: []  # AUDIT BLOCKER: F2.3 screens entirely missing
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Sort' }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
        - in: query
          name: has_leader
          description: |
            `true` = company has an assigned shift leader (1 leader / company
            invariant from E3). `false` = unassigned (leader-picker use).
          schema: { type: boolean }
      responses:
        '200':
          description: Page of client companies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ClientCompany' }
              examples:
                two_companies:
                  value:
                    data:
                      - id: SWP-CMP-101
                        name: Plaza Group
                        address: "Jl. M.H. Thamrin Kav. 28-30, Jakarta Pusat 10350"
                        leader_scope: site
                        npwp: "01.234.567.8-013.000"
                        pic_name: Ahmad Rizki
                        phone: "+62-21-572-5555"
                        email: ops@plazagroup.example.com
                        status: ACTIVE
                        has_leader: true
                        site_count: 3
                        active_placement_count: 42
                      - id: SWP-CMP-102
                        name: Mall Kelapa Gading
                        address: "Jl. Boulevard Raya, Jakarta Utara 14240"
                        leader_scope: company
                        npwp: null
                        pic_name: null
                        phone: null
                        email: null
                        status: ACTIVE
                        has_leader: false
                        site_count: 1
                        active_placement_count: 0
                    next_cursor: null
                    has_more: false
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createClientCompany
      tags: [client-companies]
      summary: Create a client company (CC-1)
      description: |
        Creates a client company and **auto-provisions a primary "Main Site"**
        (F2.6 / CC-1c) so it is immediately placeable. Geofence config lives on
        Sites — set it via `POST /client-companies/{id}/sites` or by editing the
        Main Site. `leader_scope` defaults to `company`.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      x-design-screens: []  # AUDIT BLOCKER
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientCompanyWriteRequest' }
            examples:
              plaza_group:
                value:
                  name: Plaza Group
                  address: "Jl. M.H. Thamrin Kav. 28-30, Jakarta Pusat 10350"
                  leader_scope: site
                  npwp: "01.234.567.8-013.000"
                  pic_name: Ahmad Rizki
                  phone: "+62-21-572-5555"
                  email: ops@plazagroup.example.com
      responses:
        '201':
          description: Created.
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientCompany' }
        '400':
          description: Bad request — e.g., geofence radius out of bounds.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                bad_radius:
                  value:
                    error:
                      code: GEOFENCE_RADIUS_INVALID
                      message: "Radius geofence harus 25–1000 meter."
                      fields:
                        geofence_radius_m: "Nilai 5000 di luar rentang yang diizinkan."
                      request_id: req_01J5XLA2
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Duplicate name or NPWP (CC-2).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /client-companies/{client_company_id}:
    parameters:
      - { $ref: '#/components/parameters/ClientCompanyIdPath' }
    get:
      operationId: getClientCompany
