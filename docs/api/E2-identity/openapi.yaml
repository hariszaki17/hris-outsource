        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateSite
      tags: [sites]
      summary: Edit a site (geofence, location, contact)
      description: |
        Partial update — set `geo` to activate the geofence, adjust
        `geofence_radius_m`, update the on-site PIC. Set `is_primary: true` to
        make this the primary site (demotes the current primary atomically).
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SiteWriteRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Site' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Duplicate site name within the company (ST-2).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /sites/{site_id}:deactivate:
    parameters:
      - { $ref: '#/components/parameters/SiteIdPath' }
    post:
      operationId: deactivateSite
      tags: [sites]
      summary: Deactivate a site (ST-6 — active-placement + last-site guard)
      description: |
        Sets the site `INACTIVE`. **Blocks** (409) if active placements exist
        (`SITE_HAS_ACTIVE_PLACEMENTS`) or if it is the company's last active
        site while the company is active (`SITE_IS_LAST_ACTIVE`). The primary
        flag must be moved to another active site first.
      x-rbac:
        roles: [hr_admin, super_admin]
        scope: global
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Deactivated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Site' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Active placements present, or this is the last active site.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              examples:
                active_placements:
                  value:
                    error:
                      code: SITE_HAS_ACTIVE_PLACEMENTS
                      message: "Plaza Senayan masih memiliki 42 penempatan aktif. Akhiri atau pindahkan terlebih dahulu."
                      fields: { active_placement_count: "42" }
                      request_id: req_01J5XLB3

  # =====================================================================
  # POSITION TYPEAHEAD (free-text)
  # =====================================================================

  /positions:search:
    get:
      operationId: searchPositions
      tags: [people]
      summary: Position typeahead — distinct existing position strings
      description: |
        Position is **free-text** (no master entity, no FK, no ID). This
        endpoint backs the position typeahead on the placement create/transfer
        forms (E3): given a query `q`, it returns the **distinct** existing
        position strings (case-insensitive substring match) already recorded
        across placements, so admins can reuse a consistent label or type a new
        one. There is no create/update/delete — values are persisted as the
        free-text `position` on the placement (E3).
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader]
        scope: company_or_global
      parameters:
        - in: query
          name: q
          description: |
            Substring to match against existing position strings
            (case-insensitive). Omit to get the most common positions.
          schema: { type: string }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Distinct matching position strings.
          content:
            application/json:
              schema:
                type: object
                required: [positions]
                properties:
                  positions:
                    type: array
                    items: { type: string }
              examples:
                parking_match:
                  value:
                    positions:
                      - Petugas Parkir
                      - Koordinator Lokasi
                      - Supervisor Parkir
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

