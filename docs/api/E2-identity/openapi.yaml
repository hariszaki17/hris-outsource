      summary: List positions in a service line (also Position picker)
      description: |
        Returns positions scoped under one service line (SP-2). Doubles as
        the Position picker used by E3 placement creation (filtered by the
        placement's service_line).
      x-rbac:
        roles: [hr_admin, super_admin, shift_leader, agent]
