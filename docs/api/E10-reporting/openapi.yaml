  /reports/attendance-billable:export:
    post:
      operationId: exportBillableAttendanceReport
      tags: [reports]
      summary: Trigger an Excel export of the billable attendance report
      description: |
        Convenience wrapper around `POST /exports` that pre-fills
        `report_type=ATTENDANCE_BILLABLE` and passes the report's filters
        as-is. Returns 202 + an `ExportJob` reference; the client polls
        `GET /exports/{id}` or waits for the `EXPORT_READY` notification
        (NT-3, EX-3).

        **Format:** Excel only in v1 (D5). PDF deferred to v1.1 — clients
        showing a disabled PDF affordance should NOT call this endpoint
        with `format=PDF`; the underlying export framework returns 422
        `EXPORT_FORMAT_UNSUPPORTED` if forced.

        **Idempotency required** (CONVENTIONS §13). Re-submit with the
        same key to retrieve the same `ExportJob`.

        **Audit (EX-4, INV-5):** the resulting export is logged with the
        full filter set.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: company_or_global
      x-design-screens: [MxNSO, FJ6hX, uSW4W, KnZN9]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period_start, period_end]
              properties:
                company_id:
                  type: string
                  nullable: true
                  example: SWP-CMP-0021
                service_line_id:
                  type: string
                  nullable: true
                  example: null
                period_start:
                  type: string
                  format: date
                  example: "2026-06-01"
                period_end:
                  type: string
                  format: date
                  example: "2026-06-30"
                group_by:
                  type: string
                  enum: [employee, day, shift_master]
                  default: employee
            examples:
              hrJuneExport:
                summary: HR exports June for Plaza Senayan
                value:
                  company_id: SWP-CMP-0021
                  period_start: "2026-06-01"
                  period_end: "2026-06-30"
                  group_by: employee
      responses:
        '202':
          description: |
            Export queued. Body is an `ExportJob` with `status=QUEUED`
            (or `PROCESSING` if the worker picked it up synchronously).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              examples:
                queued:
                  value:
                    id: SWP-EXP-1042
                    report_type: ATTENDANCE_BILLABLE
                    status: QUEUED
                    format: EXCEL
                    confidential: false
                    progress_percent: 0
                    filename: null
                    size_bytes: null
                    file_url: null
                    error: null
                    filters:
                      company_id: SWP-CMP-0021
                      period_start: "2026-06-01"
                      period_end: "2026-06-30"
                      group_by: employee
                    audit_log_entry_id: SWP-AL-1204520
                    requester_id: SWP-USR-1042
                    requested_at: "2026-06-03T07:14:52Z"
                    completed_at: null
                    expires_at: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Period out of range or filter invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                periodTooWide:
                  value:
                    error:
                      code: REPORT_PERIOD_TOO_WIDE
                      message: "Rentang tanggal melebihi 1 tahun."
                      request_id: req_01J7K3W3B1
        '429':
          description: |
            Per-user export throttle (RATE_LIMITED_EXPORTS) or general
            rate limit. Both return 429 — the `code` distinguishes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                exportThrottle:
                  value:
                    error:
                      code: RATE_LIMITED_EXPORTS
                      message: "Terlalu banyak ekspor. Coba lagi sebentar."
                      request_id: req_01J7K3W3B2

  # ====================================================================
  # EXPORT FRAMEWORK
  # ====================================================================
  /exports:
    get:
      operationId: listMyExports
      tags: [exports]
      summary: List the caller's recent export jobs
      description: |
        Returns the caller's own export history (scope = self per EX-2).
        HR/Super Admin do NOT see other users' exports here — those live
        in the audit log (E1).

        Filterable by `report_type` and `status`. Cursor-paginated.
        Sort: `requested_at:desc` by default.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: self
      x-design-screens: [uSW4W]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: report_type
          in: query
          description: Filter by report type.
          required: false
          schema:
            $ref: '#/components/schemas/ReportType'
        - name: status
          in: query
          description: Filter by job status.
          required: false
          schema:
            $ref: '#/components/schemas/ExportStatus'
      responses:
        '200':
          description: A page of export jobs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExportJob'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'

    post:
      operationId: createExport
      tags: [exports]
      summary: Request a new export (generic, any report_type)
      description: |
        Generic export entry-point used by every export-capable report
        (F10.4). The `report_type` discriminates which downstream query
        runs; `filters` is a free-form object validated against that
        report's allowed filter schema (server-side; documented per
        report).

        **Format (D5; locked in EPICS §8 E10):** Excel only in v1.
        Clients SHOULD send `format: EXCEL`; sending `format: PDF` or
        `format: CSV` returns 422 `EXPORT_FORMAT_UNSUPPORTED`. The
        Wave-1.3 disabled-affordance pattern applies on the UI — the
        format dropdown only offers Excel.

        **Confidential flag (EX-5):**
        - Always `true` for `report_type=PAYSLIPS` (E8). The server forces
          it true regardless of the request body — clients sending `false`
          for payslips are silently coerced (and the audit log records
          the coercion).
        - Defaults `false` for other report types; HR may override to
          `true` on sensitive HR exports.

        **Scope (EX-2):** the export inherits the caller's report-scope
        — a shift leader's payload is filtered to their assigned company
        even if `filters.company_id` is omitted.

        **Throttle:** per-user export rate limit returns 429
        `RATE_LIMITED_EXPORTS`. Bulk-spamming the same key returns the
        cached job (idempotency).

        **Size guard:** the server estimates the result set; if it would
        exceed the v1 row cap (e.g., 250k rows) the call returns 422
        `EXPORT_TOO_LARGE` with a hint to narrow the period (Wave-1
        SizeWarn).

        **Audit (EX-4, INV-5):** one audit entry per export job; the
        entry's id is returned in `audit_log_entry_id` for traceability.

        **Idempotency required** (CONVENTIONS §13). Re-submit the same
        key → same job (no new audit entry).
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: company_or_global
      x-design-screens: [FJ6hX, uSW4W, KnZN9]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
            examples:
              billableAttendance:
                summary: HR exports the billable-attendance report
                value:
                  report_type: ATTENDANCE_BILLABLE
                  format: EXCEL
                  confidential: false
                  filters:
                    company_id: SWP-CMP-0021
                    period_start: "2026-06-01"
                    period_end: "2026-06-30"
                    group_by: employee
              payslips:
                summary: HR exports payslips (confidential forced true)
                value:
                  report_type: PAYSLIPS
                  format: EXCEL
                  confidential: true
                  filters:
                    period: "2026-05"
                    company_id: SWP-CMP-0021
              auditLog:
                summary: HR exports an audit-log slice
                value:
                  report_type: AUDIT_LOG
                  format: EXCEL
                  confidential: false
                  filters:
                    period_start: "2026-06-01"
                    period_end: "2026-06-02"
                    entity_type: leave_request
              pdfRejected:
                summary: Client mistakenly requests PDF — will be rejected (D5)
                value:
                  report_type: ATTENDANCE_BILLABLE
                  format: PDF
                  filters:
                    period_start: "2026-06-01"
                    period_end: "2026-06-30"
      responses:
        '202':
          description: Export job queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Idempotency key reused with a different body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                idempotencyReuse:
                  value:
                    error:
                      code: IDEMPOTENCY_KEY_REUSED
                      message: "Idempotency-Key sudah digunakan dengan body berbeda."
                      request_id: req_01J7K3W3C1
        '422':
          description: |
            Validation failed semantically. Possible codes:
            `EXPORT_TOO_LARGE`, `EXPORT_FORMAT_UNSUPPORTED`,
            `REPORT_PERIOD_TOO_WIDE`, `RULE_VIOLATION`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                tooLarge:
                  summary: Size guard tripped — surfaces Wave-1 SizeWarn
                  value:
                    error:
                      code: EXPORT_TOO_LARGE
                      message: "Hasil terlalu besar. Persempit rentang tanggal."
                      fields:
                        period_end: "Estimasi melebihi 250.000 baris."
                      request_id: req_01J7K3W3C2
                pdfUnsupported:
                  summary: PDF requested — rejected per D5
                  value:
                    error:
                      code: EXPORT_FORMAT_UNSUPPORTED
                      message: "Format PDF belum tersedia. Gunakan Excel."
                      fields:
                        format: "PDF akan tersedia di v1.1."
                      request_id: req_01J7K3W3C3
        '429':
          description: Per-user export throttle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                exportThrottle:
                  value:
                    error:
                      code: RATE_LIMITED_EXPORTS
                      message: "Terlalu banyak ekspor. Coba lagi sebentar."
                      request_id: req_01J7K3W3C4

  /exports/{export_id}:
    get:
      operationId: getExport
      tags: [exports]
      summary: Get an export job by ID (status, progress, file URL)
      description: |
        Poll endpoint for export job lifecycle (Wave-1 Step-2 progress,
        Step-3 success). Returns the current state:

        - `QUEUED` — accepted, awaiting worker pickup.
        - `PROCESSING` — worker is generating; `progress_percent` is
          populated when known.
        - `COMPLETED` — `file_url` (use `GET /exports/{id}/download` to
          fetch with auth), `filename`, `size_bytes`, `expires_at`.
        - `FAILED` — `error` carries `{code, message}`.
        - `CANCELLED` — caller (or HR) aborted via `:cancel`.

        Polling cadence: clients SHOULD use 2-5s intervals while
        `QUEUED` / `PROCESSING`; back off to 30s after 30s of no change.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: self
      x-design-screens: [uSW4W]
      parameters:
        - $ref: '#/components/parameters/ExportIdPath'
      responses:
        '200':
          description: Current state of the export job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              examples:
                processing:
                  value:
                    id: SWP-EXP-1042
                    report_type: ATTENDANCE_BILLABLE
                    status: PROCESSING
                    format: EXCEL
                    confidential: false
                    progress_percent: 40
                    filename: null
                    size_bytes: null
                    file_url: null
                    error: null
                    filters:
                      company_id: SWP-CMP-0021
                      period_start: "2026-06-01"
                      period_end: "2026-06-30"
                    audit_log_entry_id: SWP-AL-1204520
                    requester_id: SWP-USR-1042
                    requested_at: "2026-06-03T07:14:52Z"
                    completed_at: null
                    expires_at: null
                completed:
                  value:
                    id: SWP-EXP-1042
                    report_type: ATTENDANCE_BILLABLE
                    status: COMPLETED
                    format: EXCEL
                    confidential: false
                    progress_percent: 100
                    filename: "billable-plaza-senayan-2026-06.xlsx"
                    size_bytes: 184320
                    file_url: "https://api.swp.example.com/api/v1/exports/SWP-EXP-1042/download"
                    error: null
                    filters:
                      company_id: SWP-CMP-0021
                      period_start: "2026-06-01"
                      period_end: "2026-06-30"
                    audit_log_entry_id: SWP-AL-1204520
                    requester_id: SWP-USR-1042
                    requested_at: "2026-06-03T07:14:52Z"
                    completed_at: "2026-06-03T07:15:48Z"
                    expires_at: "2026-06-10T07:15:48Z"
                failed:
                  value:
                    id: SWP-EXP-1043
                    report_type: PAYSLIPS
                    status: FAILED
                    format: EXCEL
                    confidential: true
                    progress_percent: null
                    filename: null
                    size_bytes: null
                    file_url: null
                    error:
                      code: INTERNAL
                      message: "Gagal menghasilkan file. Coba lagi."
                    filters:
                      period: "2026-05"
                    audit_log_entry_id: SWP-AL-1204521
                    requester_id: SWP-USR-1042
                    requested_at: "2026-06-03T07:14:52Z"
                    completed_at: "2026-06-03T07:15:01Z"
                    expires_at: null
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /exports/{export_id}/download:
    get:
      operationId: downloadExport
      tags: [exports]
      summary: Download the generated export file
      description: |
        Redirects to a signed, short-TTL storage URL for the actual file.
        The redirect target is opaque storage infrastructure (presigned
        S3-style URL) — clients follow the redirect.

        **Access control (EX-5):** auth required (same `Authorization`
        Bearer token); response is `302 Found` with the signed URL only
        if the caller is the requester (scope=self).

        **Expiry (EX-5, C-4):** files expire at `ExportJob.expires_at`
        (default 7 days post-completion). Subsequent calls return 410
        `EXPORT_EXPIRED`. Clients SHOULD re-create the export with the
        same filters to refresh.

        **Confidential payslip exports (EX-5):** the signed URL TTL is
        shorter (default 5 minutes); the file itself carries a
        confidentiality marker in metadata.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: self
      x-design-screens: [uSW4W]
      parameters:
        - $ref: '#/components/parameters/ExportIdPath'
      responses:
        '302':
          description: Redirect to signed storage URL.
          headers:
            Location:
              description: Short-TTL signed URL.
              schema:
                type: string
                format: uri
                example: "https://files.swp.example.com/exports/SWP-EXP-1042.xlsx?sig=..."
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Export file has expired (EX-5 retention; C-4).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                expired:
                  value:
                    error:
                      code: EXPORT_EXPIRED
                      message: "File ekspor sudah kedaluwarsa. Jalankan ulang ekspor."
                      request_id: req_01J7K3W3D1

  /exports/{export_id}:cancel:
    post:
      operationId: cancelExport
      tags: [exports]
      summary: Cancel an in-flight export (Wave-1.3 Step2 abort)
      description: |
        Aborts an export job that is `QUEUED` or `PROCESSING`. Idempotent:
        cancelling an already-`CANCELLED` / `FAILED` / `COMPLETED` job is
        a no-op (200 with current state).

        Surfaces the Wave-1.3 Step-2 abort button (E10-AUDIT P0
        progress-state).

        Only the requester (scope=self) may cancel.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: self
      x-design-screens: [uSW4W]
      parameters:
        - $ref: '#/components/parameters/ExportIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Cancellation request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              examples:
                cancelled:
                  value:
                    id: SWP-EXP-1042
                    report_type: ATTENDANCE_BILLABLE
                    status: CANCELLED
                    format: EXCEL
                    confidential: false
                    progress_percent: null
                    filename: null
                    size_bytes: null
                    file_url: null
                    error: null
                    filters:
                      company_id: SWP-CMP-0021
                      period_start: "2026-06-01"
                      period_end: "2026-06-30"
                    audit_log_entry_id: SWP-AL-1204520
                    requester_id: SWP-USR-1042
                    requested_at: "2026-06-03T07:14:52Z"
                    completed_at: "2026-06-03T07:15:10Z"
                    expires_at: null
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ===========================================================================
# COMPONENTS
# ===========================================================================
components:

  # ------------------------------------------------------------------ SECURITY
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT-or-opaque
      description: |
        `Authorization: Bearer <token>`. Token format is treated as opaque
        by clients (CONVENTIONS §3). Issued by E1 `/auth/login`.

  # --------------------------------------------------------------- PARAMETERS
  parameters:
    Cursor:
      name: cursor
      in: query
      description: Opaque pagination cursor from the previous page's `next_cursor`.
      required: false
      schema:
        type: string
        example: "eyJpZCI6IlNXUC1OVEYtODgwMTAwIn0"
    Limit:
      name: limit
      in: query
      description: Page size. Default 50, server max 200.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: |
        Client-generated UUID v4 (CONVENTIONS §13). Cached for 24 h.
        Required on every write/action endpoint in E10.
      required: true
      schema:
        type: string
        format: uuid
        example: "3c7e9a48-1c3d-4b3a-9f1a-2b1f2cf3a401"
    NotificationIdPath:
      name: notification_id
      in: path
      description: Full prefixed notification ID (`SWP-NTF-...`).
      required: true
      schema:
        type: string
        example: SWP-NTF-880241
    ExportIdPath:
      name: export_id
      in: path
      description: Full prefixed export-job ID (`SWP-EXP-...`).
      required: true
      schema:
        type: string
        example: SWP-EXP-1042

  # -------------------------------------------------------------- RESPONSES
  responses:
    BadRequest:
      description: Validation failed (malformed body, bad query param). CONVENTIONS §11.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalid:
              value:
                error:
                  code: INVALID_REQUEST
                  message: "Permintaan tidak valid."
                  fields:
                    period_end: "Wajib diisi."
                  request_id: req_01J7K3W3E1
    Unauthenticated:
      description: |
        Missing, invalid, or expired access token. Client renders
        `comp/EmptySessionExpired` and re-auths.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            expired:
              value:
                error:
                  code: UNAUTHENTICATED
                  message: "Sesi berakhir. Silakan masuk kembali."
                  request_id: req_01J7K3W3E2
    Forbidden:
      description: Authenticated but role / scope lacks permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            forbidden:
              value:
                error:
                  code: FORBIDDEN
                  message: "Anda tidak memiliki izin untuk tindakan ini."
                  request_id: req_01J7K3W3E3
    NotFound:
      description: Resource does not exist or caller lacks visibility.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            notFound:
              value:
                error:
                  code: NOT_FOUND
                  message: "Sumber tidak ditemukan."
                  request_id: req_01J7K3W3E4
    RateLimited:
      description: Too many requests (CONVENTIONS §19).
      headers:
        Retry-After:
          description: Seconds the client should wait before retrying.
          schema:
            type: integer
            example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            rateLimited:
              value:
                error:
                  code: RATE_LIMITED
                  message: "Terlalu banyak permintaan. Coba lagi sebentar."
                  request_id: req_01J7K3W3E5

  # ----------------------------------------------------------------- SCHEMAS
  schemas:

    # -- common envelopes --------------------------------------------------
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: |
                UPPER_SNAKE_CASE machine-readable error code (CONVENTIONS §11).

                **E10 domain-specific codes:**
                  - `EXPORT_TOO_LARGE` (422) — result-set exceeds row cap
                    (Wave-1 SizeWarn).
                  - `EXPORT_FORMAT_UNSUPPORTED` (422) — PDF/CSV requested
                    on a v1 endpoint (D5; Excel only).
                  - `EXPORT_EXPIRED` (410) — download URL TTL expired
                    (EX-5 retention).
                  - `RATE_LIMITED_EXPORTS` (429) — per-user export
                    throttle.
                  - `REPORT_PERIOD_TOO_WIDE` (422) — date range exceeds
                    the per-report cap.
                  - `OUT_OF_SCOPE` (403) — shift leader requesting a
                    company they are not assigned to (BR-4 / INV-3).
              example: EXPORT_TOO_LARGE
            message:
              type: string
              description: Human-readable message, defaults to Bahasa Indonesia.
              example: "Hasil terlalu besar. Persempit rentang tanggal."
            fields:
              type: object
              description: |
                Field-level errors (400 / 422). Keys are request-body or
                query-param field names.
              additionalProperties:
                type: string
              example:
                period_end: "Estimasi melebihi 250.000 baris."
            request_id:
              type: string
              example: req_01J7K3W3F1

    CursorPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          description: Page of items (typed per endpoint).
          items: {}
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` if `has_more` is false.
          example: "eyJpZCI6IlNXUC1OVEYtODgwMTAwIn0"
        has_more:
          type: boolean
          example: true

    DeepLink:
      type: object
      description: |
        A reference to a target screen in another epic. The client routes
        on `epic` + `path`; `entity_id` is the prefixed ID for analytics
        / deep-link copy. (E10 owns no UI of its own beyond the
        dashboards and notification center — every actionable widget
        links into another epic.)
      required: [epic, path]
      properties:
        epic:
          type: string
          description: Owning epic code.
          enum: [E2, E3, E4, E5, E6, E7, E8]
          example: E6
        entity_id:
          type: string
          nullable: true
          description: Full prefixed ID of the target entity (when applicable).
          example: SWP-LR-1042
        path:
          type: string
          description: Client-side route path (mobile + web share path conventions).
          example: "/leave-requests/SWP-LR-1042"

    # -- shared enums ------------------------------------------------------
    Role:
      type: string
      description: Caller's role (RB-1; same enum as E1 `Role`).
      enum: [super_admin, hr_admin, shift_leader, agent]
      example: hr_admin

    # ====================================================================
    # DASHBOARDS
    # ====================================================================
    Dashboard:
      description: |
        POV-shaped dashboard payload. The `role` discriminator selects
        the per-role variant. `super_admin` reuses the `HrDashboard`
        shape with `role: super_admin`, `role_label: "Super Admin"`, and
        an additional `admin` widget block (DB-7) that `hr_admin` does not
        receive — a superset, not a relabel (EPICS §8 2026-06-11).
      oneOf:
        - $ref: '#/components/schemas/HrDashboard'
        - $ref: '#/components/schemas/LeaderDashboard'
        - $ref: '#/components/schemas/AgentDashboard'
      discriminator:
        propertyName: role
        mapping:
          hr_admin: '#/components/schemas/HrDashboard'
          super_admin: '#/components/schemas/HrDashboard'
          shift_leader: '#/components/schemas/LeaderDashboard'
          agent: '#/components/schemas/AgentDashboard'

    HrDashboard:
      type: object
      description: |
        HR Admin (and Super Admin per D1) dashboard. Cross-company KPIs.
        Data sources: E2 (companies, employees, agreements), E3
        (placements + expiring), E5 (attendance anomalies), E6/E7
        (pending counts), F10.1 (notifications).
      required:
        - role
        - role_label
        - generated_at
        - period_label
        - kpis
        - expiring_placements_30d
        - expiring_agreements_30d
        - attendance_anomalies_today
        - billable_trend
        - pending_approvals_panel
      properties:
        role:
          type: string
          enum: [hr_admin, super_admin]
          description: |
            `super_admin` returns the same body shape with a distinct
            `role_label` (D1).
        role_label:
          type: string
          description: Human label for the topbar / dashboard header.
          example: "HR Admin"
        generated_at:
          type: string
          format: date-time
          description: Server compute timestamp (DB-6 freshness).
        period_label:
          type: string
          description: Display label for the KPI period (current month by default).
          example: "Juni 2026"
        kpis:
          type: object
          required:
            - active_placements
            - active_companies
            - attendance_rate_pct
            - billable_hours_mtd
            - ot_hours_mtd
            - leave_pending
          properties:
            active_placements:
              type: integer
              description: |
                Count of E3 placements currently **non-terminal**
                (`ACTIVE` / `PENDING_START` / `EXPIRING`), i.e. excluding the
                terminal states (`ENDED`, `TRANSFERRED`, `TERMINATED`,
                `RESIGNED`, `SUPERSEDED`). An `EXPIRING` placement is still
                counted — per F2.7 it is not auto-ended at `end_date`.
              example: 482
            active_companies:
              type: integer
              description: Count of E2 client companies with ≥1 active placement.
              example: 27
            attendance_rate_pct:
              type: number
              format: float
              description: |
                Verified-present / scheduled in the current period (E5
                aggregate).
              example: 96.2
            billable_hours_mtd:
              type: number
              format: float
              description: |
                Month-to-date billable hours (verified-only per INV-4).
              example: 38420.5
            ot_hours_mtd:
              type: number
              format: float
              description: Month-to-date approved OT hours (E7).
              example: 1284.0
            leave_pending:
              type: integer
              description: Leave requests pending HR-level approval (E6).
              example: 6
        expiring_placements_30d:
          type: integer
          description: |
            Placements flagged `EXPIRING` within 30 days of `end_date` (E3
            cron-driven, LC-3). Per F2.7 these are **HR-decision Inbox
            items** (Continue=renew vs End=offboard), **not** auto-ended —
            the placement and the agent's login stay valid until HR acts.
          example: 12
        expiring_agreements_30d:
          type: integer
          description: Employment agreements ending within 30 days (E2).
          example: 4
        attendance_anomalies_today:
          type: integer
          description: |
            Today's flagged attendance exceptions (E5: out-of-geofence,
            unscheduled clock-in, missing clock-out).
          example: 3
        billable_trend:
          type: object
          required: [granularity, points]
          properties:
            granularity:
              type: string
              enum: [day, week, month]
              example: day
            points:
              type: array
              items:
                type: object
                required: [date, value]
                properties:
                  date:
                    type: string
                    format: date
                  value:
                    type: number
                    format: float
                    description: Billable hours for the bucket.
        pending_approvals_panel:
          type: array
          description: |
            "Perlu Tindakan" inbox panel rows (DB-3, DB-5). Each row
            deep-links into the owning epic's approval queue.
          items:
            $ref: '#/components/schemas/ApprovalInboxRow'
        admin:
          $ref: '#/components/schemas/SuperAdminWidgets'

    SuperAdminWidgets:
      type: object
      description: |
        Admin-only widget block (DB-7). **Present only when the dashboard
        `role` is `super_admin`** — omitted entirely from the `hr_admin`
        payload (C-6). Each sub-widget deep-links into its owning epic
        (DB-5). All counts may be 0 / arrays empty → clients render the
        empty-state variant (C-5).
      required: [user_access, recent_audit, org_rollups, pending_grants]
      properties:
        user_access:
          type: object
          description: User & access summary (E2 / F2.7).
          required: [active_users, pending_provisioning, offboarded_30d]
          properties:
            active_users:
              type: integer
              description: Users with status `active` (E2).
              example: 514
            pending_provisioning:
              type: integer
              description: |
                Employees awaiting login provisioning. Normally 0 under the
                auto-provision rule (E2 §8 D1); surfaced for the F2.7 edge.
              example: 0
            offboarded_30d:
              type: integer
              description: Users offboarded / disabled within the last 30 days (F2.7).
              example: 7
        recent_audit:
          type: array
          description: |
            Last sensitive admin actions (E1 audit), newest first; capped
            (~8, C-7). A "Lihat semua" link deep-links to the full audit log.
          items:
            type: object
            required: [id, actor_label, action, target_label, at]
            properties:
              id:
                type: string
                description: Audit entry id (`SWP-AUD-…`).
                example: SWP-AUD-90412
              actor_label:
                type: string
                example: "Sari (HR Admin)"
              action:
                type: string
                description: Stable action code (UPPER_SNAKE_CASE).
                example: ROLE_GRANTED
              target_label:
                type: string
                example: "Budi → Shift Leader"
              at:
                type: string
                format: date-time
        org_rollups:
          type: array
          description: Headcount + active placements per service line (E3).
          items:
            type: object
            required: [service_line, headcount, active_placements]
            properties:
              service_line:
                type: string
                enum: [FACILITY, BUILDING, PARKING]
              headcount:
                type: integer
                example: 312
              active_placements:
                type: integer
                example: 298
        pending_grants:
          type: object
          description: Items awaiting super-admin action (deep-link, DB-5).
          required: [bank_approvals, role_requests]
          properties:
            bank_approvals:
              type: integer
              description: |
                Bank-account approval escalations (`PARTIALLY_APPROVED` →
                HR/super-admin, see E1 rbac `CanApproveBank`).
              example: 3
            role_requests:
              type: integer
              description: Role-change requests awaiting grant.
              example: 1

    LeaderDashboard:
      type: object
      description: |
        Shift Leader dashboard, scoped to their single assigned company
        (E3 INV-3). Data: E4 (today's schedule), E5 (clock-in status),
        E6/E7 (pending counts).
      required:
        - role
        - role_label
        - company
        - generated_at
        - today
        - pending_counts
        - schedule_alerts
        - pending_approvals_panel
      properties:
        role:
          type: string
          enum: [shift_leader]
        role_label:
          type: string
          example: "Shift Leader"
        company:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              example: SWP-CMP-0021
            name:
              type: string
              example: "Plaza Senayan"
        generated_at:
          type: string
          format: date-time
        today:
          type: object
          required: [date, shifts_total, clocked_in, late_count, absent_count, pending_verifications]
          properties:
            date:
              type: string
              format: date
            shifts_total:
              type: integer
              description: Total scheduled shifts today (E4).
              example: 24
            clocked_in:
              type: integer
              description: Agents who have clocked in (E5).
              example: 19
            late_count:
              type: integer
              description: Agents flagged late (>15 min grace, EPICS §8 E5).
              example: 2
            absent_count:
              type: integer
              example: 3
            pending_verifications:
              type: integer
              description: Attendance records awaiting leader verification (E5).
              example: 4
        pending_counts:
          type: object
          required: [attendance_verify, leave_approve, ot_approve]
          properties:
            attendance_verify:
              type: integer
              example: 4
            leave_approve:
              type: integer
              example: 1
            ot_approve:
              type: integer
              example: 2
        schedule_alerts:
          type: array
          description: |
            Upcoming schedule problems (coverage gaps, unassigned slots,
            placements expiring) for the leader's company.
          items:
            type: object
            required: [kind, label, deep_link]
            properties:
              kind:
                type: string
                enum: [COVERAGE_GAP, UNASSIGNED_SHIFT, PLACEMENT_EXPIRING]
              label:
                type: string
                example: "Shift Malam belum lengkap"
              date:
                type: string
                format: date
                nullable: true
              deep_link:
                $ref: '#/components/schemas/DeepLink'
        pending_approvals_panel:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalInboxRow'

    AgentDashboard:
      type: object
      description: |
        Agent (self) dashboard. Data: E4 (today's shift), E5
        (attendance), E6 (leave balance + pending), E7 (OT MTD), F10.1
        (recent notifications).
      required:
        - role
        - generated_at
        - today_shift
        - recent_attendance
        - leave_balance
        - ot_this_month_hours
        - pending_requests
        - recent_notifications_unread
      properties:
        role:
          type: string
          enum: [agent]
        generated_at:
          type: string
          format: date-time
        today_shift:
          type: object
          nullable: true
          description: |
            Today's scheduled shift, or `null` if the agent is off
            today / has no schedule (E10-AUDIT P2 off-duty state).
          required: [schedule_id, shift_name, start_time, end_time, company_name, clock_in_status]
          properties:
            schedule_id:
              type: string
              example: SWP-SCH-882104
            shift_name:
              type: string
              example: "Shift Pagi"
            start_time:
              type: string
              description: HH:MM Asia/Jakarta (CONVENTIONS §10).
              example: "06:00"
            end_time:
              type: string
              example: "14:00"
            company_name:
              type: string
              example: "Plaza Senayan"
            clock_in_status:
              type: string
              enum: [NOT_CLOCKED_IN, CLOCKED_IN, CLOCKED_OUT, LATE, ABSENT]
              example: NOT_CLOCKED_IN
            deep_link:
              $ref: '#/components/schemas/DeepLink'
        recent_attendance:
          type: object
          required: [last_7d_present, last_7d_late, last_7d_absent]
          properties:
            last_7d_present:
              type: integer
              example: 5
            last_7d_late:
              type: integer
              example: 1
            last_7d_absent:
              type: integer
              example: 0
        leave_balance:
          type: object
          required: [annual_remaining_days, annual_quota_days, period_label]
          description: Summary of annual-leave quota (E6).
          properties:
            annual_remaining_days:
              type: number
              format: float
              example: 7
            annual_quota_days:
              type: number
              format: float
              example: 12
            period_label:
              type: string
              example: "2026"
        ot_this_month_hours:
          type: number
          format: float
          description: Approved OT hours MTD (E7).
          example: 6.5
        pending_requests:
          type: object
          required: [leave, ot]
          properties:
            leave:
              type: integer
              example: 1
            ot:
              type: integer
              example: 0
        recent_notifications_unread:
          type: integer
          description: |
            Convenience: same value as `GET /notifications/count` at the
            moment the dashboard was generated.
          example: 3

    ApprovalInboxRow:
      type: object
      description: |
        One row of the "Perlu Tindakan" panel (HR + Leader). The panel
        doubles as the leader's combined approval inbox (E10-AUDIT §8 —
        accepted option (a)).
      required: [kind, label, count, deep_link]
      properties:
        kind:
          type: string
          enum:
            - ATTENDANCE_VERIFY
            - LEAVE_APPROVE
            - OT_APPROVE
            - PLACEMENT_EXPIRING
            - AGREEMENT_EXPIRING
            - HR_CHANGE_REQUEST
          description: |
            Approval queue type. Each maps to one upstream epic
            (E5/E6/E7/E3/E2).
        label:
          type: string
          example: "Persetujuan cuti"
        count:
          type: integer
          minimum: 0
          example: 3
        deep_link:
          $ref: '#/components/schemas/DeepLink'

    # ====================================================================
    # NOTIFICATIONS
    # ====================================================================
    NotificationKind:
      type: string
      description: |
        Notification kind (NT-3 event catalog). Each kind has a fixed
        owning epic that produces it (CONVENTIONS §16.2):

        - `SCHEDULE_PUBLISHED` — E4
        - `SCHEDULE_CHANGED` — E4
        - `SHIFT_REMINDER` — E4 cron
        - `LEAVE_REQUEST_SUBMITTED` — E6 (to leader/HR)
        - `LEAVE_APPROVED` — E6 (to submitter)
        - `LEAVE_REJECTED` — E6 (to submitter)
        - `OT_REQUEST_SUBMITTED` — E7 (to leader/HR)
        - `OT_AUTO_DETECTED` — E7 (to agent — needs confirmation)
        - `OT_APPROVED` — E7 (to submitter)
        - `OT_REJECTED` — E7 (to submitter)
        - `ATTENDANCE_VERIFY_NEEDED` — E5 (to leader)
        - `ATTENDANCE_CORRECTION_SUBMITTED` — E5 (to leader / HR if >7d)
        - `ATTENDANCE_AUTO_CLOSED` — E5 (to agent)
        - `HR_CHANGE_REQUEST_SUBMITTED` — E2 (to leader/HR)
        - `CHANGE_REQUEST_APPROVED` — E2 (to submitting agent; lists applied fields / partial)
        - `CHANGE_REQUEST_REJECTED` — E2 (to submitting agent; carries reason)
        - `AGREEMENT_EXPIRING` — E2 cron (to HR)
        - `PLACEMENT_EXPIRING` — E3 cron (to HR + leader)
        - `PLACEMENT_LEADER_CHANGED` — E3
        - `EXPORT_READY` — E10 self (export job completed)
        - `EXPORT_FAILED` — E10 self
      enum:
        - SCHEDULE_PUBLISHED
        - SCHEDULE_CHANGED
        - SHIFT_REMINDER
        - LEAVE_REQUEST_SUBMITTED
        - LEAVE_APPROVED
        - LEAVE_REJECTED
        - OT_REQUEST_SUBMITTED
        - OT_AUTO_DETECTED
        - OT_APPROVED
        - OT_REJECTED
        - ATTENDANCE_VERIFY_NEEDED
        - ATTENDANCE_CORRECTION_SUBMITTED
        - ATTENDANCE_AUTO_CLOSED
        - HR_CHANGE_REQUEST_SUBMITTED
        - CHANGE_REQUEST_APPROVED
        - CHANGE_REQUEST_REJECTED
        - AGREEMENT_EXPIRING
        - PLACEMENT_EXPIRING
        - PLACEMENT_LEADER_CHANGED
        - EXPORT_READY
        - EXPORT_FAILED
      example: LEAVE_APPROVED

    Notification:
      type: object
      description: |
        A single in-app notification (NT-4). Push delivery is a separate
        side-channel; the in-app row is the durable record (NT-6).
      required: [id, kind, title, body, read_at, created_at, deep_link, actor, is_critical]
      properties:
        id:
          type: string
          example: SWP-NTF-880241
        kind:
          $ref: '#/components/schemas/NotificationKind'
        title:
          type: string
          description: Short headline (Bahasa Indonesia by default).
          example: "Pengajuan cuti baru"
        body:
          type: string
          description: Body text (single line, ~120 chars max).
          example: "Budi Santoso mengajukan cuti 3 hari (10–12 Jun)."
        read_at:
          type: string
          format: date-time
          nullable: true
          description: |
            When the recipient marked this notification as read.
            `null` = unread.
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-06-03T06:58:11Z"
        deep_link:
          $ref: '#/components/schemas/DeepLink'
        actor:
          type: object
          description: Who triggered the underlying event.
          required: [label]
          properties:
            id:
              type: string
              nullable: true
              description: |
                `SWP-USR-...` of the actor. `null` when the actor is the
                system (cron, auto-detection).
              example: SWP-USR-3104
            label:
              type: string
              description: Display name + role (or "system").
              example: "Budi Santoso"
        is_critical:
          type: boolean
          description: |
            Critical categories (approvals, schedule changes) stay on
            regardless of mute preferences (NT-5, C-3). In v1 preferences
            are all-on so this is informational only.
          example: true

    NotificationPreferences:
      type: object
      description: |
        Notification preferences (v1 stub). D10: notifications are
        all-on in v1, so this endpoint reserves the IA slot and lets the
        client render a disabled affordance.
      required: [enabled, available_in]
      properties:
        enabled:
          type: boolean
          description: Always `false` in v1.
          example: false
        available_in:
          type: string
          description: Target version when preferences ship.
          example: "v1.1"
        message:
          type: string
          description: Human copy for the disabled affordance tooltip.
          example: "Pengaturan notifikasi akan tersedia di v1.1. Semua notifikasi aktif."

    # ====================================================================
    # BILLABLE REPORT
    # ====================================================================
    BillableReport:
      type: object
      description: |
        F10.3 attendance & billable-hours report. Computed live from
        verified attendance (E5) on billable codes (E2). Hours only —
        no rates / amounts per EPICS §8 D-default.
      required:
        - generated_at
        - filters
        - summary
        - pending_summary
        - rows
      properties:
        generated_at:
          type: string
          format: date-time
          description: Compute timestamp (point-in-time per EX-6, BR-7).
        filters:
          type: object
          description: Echo of the filter set used for the run.
          required: [period_start, period_end, group_by]
          properties:
            company_id:
              type: string
              nullable: true
              example: SWP-CMP-0021
            company_name:
              type: string
              nullable: true
              example: "Plaza Senayan"
            service_line_id:
              type: string
              nullable: true
              example: null
            service_line_name:
              type: string
              nullable: true
              example: null
            period_start:
              type: string
              format: date
              example: "2026-06-01"
            period_end:
              type: string
              format: date
              example: "2026-06-30"
            group_by:
              type: string
              enum: [employee, day, shift_master]
              example: employee
        summary:
          type: object
          description: |
            Totals across all rows. Verified-only per INV-4 / BR-1.
          required:
            - total_billable_hours
            - total_worked_hours
            - total_payable_hours
            - total_verified_records
          properties:
            total_billable_hours:
              type: number
              format: float
              description: Hours on billable codes, verified-only.
              example: 4128.5
            total_worked_hours:
              type: number
              format: float
              description: All verified worked hours (billable + non-billable).
              example: 4310.0
            total_payable_hours:
              type: number
              format: float
              description: Hours considered for payroll (per E5 / E8 rules).
              example: 4232.0
            total_verified_records:
              type: integer
              example: 612
            verification_rate_pct:
              type: number
              format: float
              nullable: true
              description: |
                verified / (verified + unverified) for the period.
                `null` when there are zero records.
              example: 98.0
        pending_summary:
          type: object
          description: |
            **Wave-2.10 HIGH callout.** Counts records that are NOT yet
            billable because they remain unverified (BR-6, C-1). These
            are explicitly excluded from `summary.total_billable_hours`
            — the callout exists so HR can chase verification.
          required: [pending_records, pending_hours_estimate, note]
          properties:
            pending_records:
              type: integer
              minimum: 0
              example: 8
            pending_hours_estimate:
              type: number
              format: float
              description: |
                Estimated hours represented by the pending records
                (worked-hours, pre-verification). NOT counted in billable.
              example: 64.0
            note:
              type: string
              example: "Belum dapat ditagih hingga diverifikasi."
        rows:
          type: array
          description: Per-row breakdown driven by `filters.group_by`.
          items:
            $ref: '#/components/schemas/BillableReportRow'

    BillableReportRow:
      type: object
      description: |
        One aggregated row. `group_key` semantics depend on the report's
        `group_by`:
          - `employee` → `SWP-EMP-...`
          - `day` → ISO date (e.g., "2026-06-15")
          - `shift_master` → `SWP-SHF-...`
      required:
        - group_key
        - group_label
        - worked_hours
        - billable_hours
        - payable_hours
        - verified_record_count
        - unverified_record_count
      properties:
        group_key:
          type: string
          example: SWP-EMP-3104
        group_label:
          type: string
          description: Display label for the row (name / date / shift name).
          example: "Budi Santoso"
        company_id:
          type: string
          nullable: true
          description: |
            Populated when the report is scoped to a company OR when
            `group_by=employee` and the agent is currently placed at
            exactly one company (otherwise null; transfers split into
            multiple rows per BR-7, C-3).
          example: SWP-CMP-0021
        company_name:
          type: string
          nullable: true
          example: "Plaza Senayan"
        service_line_id:
          type: string
          nullable: true
          example: SWP-SVC-001
        service_line_name:
          type: string
          nullable: true
          example: "Facility Services"
        worked_hours:
          type: number
          format: float
          example: 176.0
        billable_hours:
          type: number
          format: float
          description: Verified-only (INV-4).
          example: 168.0
        payable_hours:
          type: number
          format: float
          example: 172.0
        verified_record_count:
          type: integer
          example: 22
        unverified_record_count:
          type: integer
          description: |
            Pending records for this group (informational; excluded from
            `billable_hours`).
          example: 0

    # ====================================================================
    # EXPORTS
    # ====================================================================
    ReportType:
      type: string
      description: |
        Identifier for the report being exported. Each value selects a
        different downstream query + filter schema (server-validated):

        - `ATTENDANCE_BILLABLE` — F10.3 (this epic).
        - `ATTENDANCE_RAW` — E5 raw attendance dump.
        - `LEAVE_HISTORY` — E6 leave history.
        - `OVERTIME_RECORDS` — E7 OT records.
        - `PAYSLIPS` — E8 payslip archive (always confidential — EX-5).
        - `AUDIT_LOG` — E1 audit log slice.
      enum:
        - ATTENDANCE_BILLABLE
        - ATTENDANCE_RAW
        - LEAVE_HISTORY
        - OVERTIME_RECORDS
        - PAYSLIPS
        - AUDIT_LOG
      example: ATTENDANCE_BILLABLE

    ExportFormat:
      type: string
      description: |
        Output format. **Excel only in v1** per EPICS §8 E10 (D5). PDF
        and CSV reserved for v1.1 — requesting either now returns 422
        `EXPORT_FORMAT_UNSUPPORTED`.
      enum:
        - EXCEL
        - PDF
        - CSV
      example: EXCEL

    ExportStatus:
      type: string
      description: |
        Export job lifecycle. Wave-1.3 modal step mapping:
          - Step-1 (format choice) → request not yet sent.
          - Step-2 (progress + abort) → `QUEUED` / `PROCESSING`.
          - Step-3 (success + download) → `COMPLETED`.
          - Error variant → `FAILED`.
          - Abort → `CANCELLED`.
      enum:
        - QUEUED
        - PROCESSING
        - COMPLETED
        - FAILED
        - CANCELLED
      example: COMPLETED

    ExportRequest:
      type: object
      description: |
        Request body for `POST /exports`. The `filters` shape is specific
        to the chosen `report_type` and is validated server-side against
        the owning report's filter schema (documented per report).
      required: [report_type, format, filters]
      properties:
        report_type:
          $ref: '#/components/schemas/ReportType'
        format:
          $ref: '#/components/schemas/ExportFormat'
        confidential:
          type: boolean
          description: |
            Marks the file as confidential (EX-5; restricts download TTL
            + tags the audit entry). For `report_type=PAYSLIPS` the
            server forces this to `true` regardless of the request body.
          default: false
        filters:
          type: object
          description: |
            Free-form filter map. Server validates per `report_type`.
            Common keys: `company_id`, `service_line_id`, `period_start`,
            `period_end`, `group_by`. See per-report endpoints for the
            exact filter contract.
          additionalProperties: true
          example:
            company_id: SWP-CMP-0021
            period_start: "2026-06-01"
            period_end: "2026-06-30"
            group_by: employee

    ExportJob:
      type: object
      description: |
        An export job. One per `POST /exports` call (idempotent on
        `Idempotency-Key`). Persisted; queryable forever via
        `GET /exports/{id}`, but the underlying file expires per `expires_at`.
      required:
        - id
        - report_type
        - status
        - format
        - confidential
        - filters
        - audit_log_entry_id
        - requester_id
        - requested_at
      properties:
        id:
          type: string
          example: SWP-EXP-1042
        report_type:
          $ref: '#/components/schemas/ReportType'
        status:
          $ref: '#/components/schemas/ExportStatus'
        format:
          $ref: '#/components/schemas/ExportFormat'
        confidential:
          type: boolean
          description: |
            Whether the file is marked confidential (EX-5). Forced true
            for `PAYSLIPS`.
          example: false
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: |
            Populated while `PROCESSING` (Wave-1.3 Step-2 progress bar).
            `null` before the worker reports progress or once `COMPLETED`
            / `FAILED` / `CANCELLED`.
          example: 40
        filename:
          type: string
          nullable: true
          description: Server-chosen filename (present once `COMPLETED`).
          example: "billable-plaza-senayan-2026-06.xlsx"
        size_bytes:
          type: integer
          nullable: true
          description: File size in bytes (present once `COMPLETED`).
          example: 184320
        file_url:
          type: string
          format: uri
          nullable: true
          description: |
            Stable in-API URL for the download endpoint
            (`/exports/{id}/download`) once `COMPLETED`. The actual
            storage URL is fetched via a 302 redirect from there
            (short-TTL signed URL).
          example: "https://api.swp.example.com/api/v1/exports/SWP-EXP-1042/download"
        error:
          nullable: true
          description: Populated only when `status=FAILED`.
          type: object
          properties:
            code:
              type: string
              example: INTERNAL
            message:
              type: string
              example: "Gagal menghasilkan file. Coba lagi."
        filters:
          type: object
          description: Echo of the filter set used (for audit + display).
          additionalProperties: true
          example:
            company_id: SWP-CMP-0021
            period_start: "2026-06-01"
            period_end: "2026-06-30"
        audit_log_entry_id:
          type: string
          description: |
            E1 audit-log entry created at request time (INV-5, EX-4).
            Use this for traceability — HR can follow back to the audit
            log to see who exported what.
          example: SWP-AL-1204520
        requester_id:
          type: string
          description: User who requested the export.
          example: SWP-USR-1042
        requested_at:
          type: string
          format: date-time
          example: "2026-06-03T07:14:52Z"
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When `status` reached `COMPLETED`/`FAILED`/`CANCELLED`.
          example: "2026-06-03T07:15:48Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            When the underlying file expires (EX-5 retention; C-4).
            Default 7 days post-completion; shorter for `PAYSLIPS`.
            After this, `GET /exports/{id}/download` returns 410
            `EXPORT_EXPIRED` — the job record itself is preserved.
          example: "2026-06-10T07:15:48Z"

# ---------------------------------------------------------------------------
# GLOBAL SECURITY
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []
