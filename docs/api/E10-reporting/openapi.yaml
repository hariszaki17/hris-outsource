                      - kind: LEAVE_APPROVE
                        label: "Persetujuan cuti"
                        count: 1
                        deep_link:
                          epic: E6
                          path: "/leave-requests?company_id=SWP-CMP-0021&status=PENDING_L1"
                      - kind: OT_APPROVE
                        label: "Persetujuan lembur"
                        count: 2
                        deep_link:
                          epic: E7
                          path: "/overtime?company_id=SWP-CMP-0021&status=PENDING"
                agent:
                  summary: Budi Santoso, agent placed at Plaza Senayan
                  value:
                    role: agent
