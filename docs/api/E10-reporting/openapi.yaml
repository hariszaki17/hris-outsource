openapi: 3.1.0
info:
  title: HRIS Outsource — E10 Reporting, Exports & Notifications API
  version: 1.0.0
  description: |
    OpenAPI 3.1 contract for the **E10 Reporting, Exports & Notifications**
    epic of SWP's HRIS rebuild.

    Covers role-based dashboards (F10.2), in-app notifications + center
    (F10.1), the v1-priority Attendance & Billable-Hours report (F10.3),
    and the reusable Export Framework (F10.4).

    E10 is the **cross-cutting glue** of the system. Almost every endpoint
    here reads from other epics' data rather than owning state of its own.
    Endpoint descriptions annotate the upstream data sources explicitly:

      - Dashboards aggregate from E2/E3/E4/E5/E6/E7/E8.
      - Notifications are *generated implicitly* by writes in E2/E3/E4/E5/E6/E7
        (per CONVENTIONS §16.2) — this spec only exposes the read & mark-read
        side of the durable in-app center.
      - The billable-hours report reads verified attendance (E5) joined to
        placements (E3), client companies + service lines + attendance codes
        (E2). Billable = verified-only (EPICS.md §8 E10).
      - Exports consume any report's query and produce an Excel file (v1).

    Inherits binding rules from `docs/api/CONVENTIONS.md` — base URL, auth
    header, pagination shape, error envelope, RBAC extension semantics,
    timestamp/id formats, audit-log side-effect (§16.1), notification
    side-effect (§16.2), idempotency (§13). Do not duplicate those rules
    here.

    PRD refs in operation descriptions point to:
      - `dashboards.md` (DB-1..DB-6, C-1..C-4)
      - `notifications.md` (NT-1..NT-6, C-1..C-4)
      - `attendance-billable-report.md` (BR-1..BR-7, C-1..C-4)
      - `export-framework.md` (EX-1..EX-6, C-1..C-4)

    **Locked decisions consumed by this spec (EPICS.md §8):**
      - Billable = verified attendance only.
      - Notifications all-on in v1 (preferences endpoint returns a disabled
        stub — D10).
      - Billing math = hours only (no rates/amounts).
      - Export format = Excel only in v1 (D5; PDF deferred to v1.1, attempts
        return `EXPORT_FORMAT_UNSUPPORTED`).
      - Super Admin dashboard shape = same as HR + a role label (D1).
  contact:
    name: SWP HRIS — product & architecture
  license:
    name: Proprietary — PT Saranawisesa Properindo
servers:
  - url: https://api.swp.example.com/api/v1
    description: Production
  - url: https://staging-api.swp.example.com/api/v1
    description: Staging

tags:
  - name: dashboards
    description: |
      Role-based landing dashboard data. PRD F10.2 / `dashboards.md`.
      The single endpoint `GET /dashboards/me` returns a POV-shaped payload
      whose schema is discriminated by the caller's role (DB-1).
      Aggregates read projections from E2/E3/E4/E5/E6/E7/E8.
  - name: notifications
    description: |
      Durable in-app notification center + mark-read transitions.
      PRD F10.1 / `notifications.md`. Notifications are PRODUCED implicitly
      by writes in other epics (CONVENTIONS §16.2) — this API exposes only
      the read & state-change endpoints, never a write endpoint to create
      a notification. Push delivery (FCM/APNs) is external infrastructure,
      not a REST endpoint.
  - name: reports
    description: |
      The v1 attendance & billable-hours report (F10.3). PRD
      `attendance-billable-report.md`. Reads verified attendance (E5) on
      billable attendance codes (E2 `is_billable`) joined to placements
      (E3). Export trigger lives here; the export job lifecycle lives
      under the `exports` tag.
  - name: exports
    description: |
      Reusable export framework (F10.4). PRD `export-framework.md`.
      Every report uses this. v1 format is **Excel only** (D5); PDF
      requests are rejected with `EXPORT_FORMAT_UNSUPPORTED` until v1.1.
      Each export creates one `EXPORT_JOB` and one audit-log entry
      (EX-4, INV-5).

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ====================================================================
  # DASHBOARDS
  # ====================================================================
  /dashboards/me:
    get:
      operationId: getMyDashboard
      tags: [dashboards]
      summary: Get the current user's dashboard payload (role-shaped)
      description: |
        Returns the landing dashboard data for the caller. The response
        shape is **POV-shaped**: the server selects the right block layout
        based on the caller's role (DB-1, INV-3).

        - `hr_admin` / `super_admin` → `HrDashboard` shape:
          company totals, expiring placements (E3), pending approvals counts
          (E5/E6/E7), attendance anomalies (E5), "Perlu Tindakan" approval-
          inbox panel rows. Super Admin receives the same payload plus
          `role_label: "Super Admin"` **and an admin-only `admin` block**
          (DB-7: users & access, recent audit feed, org rollups by service
          line, pending grants). The `admin` block is present **only** for
          `super_admin` and omitted for `hr_admin` (extends the dashboard
          D1 "same body" into a superset — locked in EPICS §8 2026-06-11).
        - `shift_leader` → `LeaderDashboard` shape:
          today's team status (clock-ins, late count from E5), pending
          verifications (E5), OT/leave pending counts (E6/E7), schedule
          alerts for the leader's single assigned company (E3 INV-3).
        - `agent` → `AgentDashboard` shape:
          today's shift (E4), recent attendance summary (E5), leave balance
          summary (E6), pending requests (E6/E7), recent notifications
          (F10.1 read projection).

        **Data sources:** E3 (placements, expiring), E4 (schedule), E5
        (attendance, exceptions), E6 (leave + quota), E7 (OT requests),
        plus E10 notifications (count).

        **Caching:** server SHOULD set `Cache-Control: private, max-age=30`
        for freshness (DB-6, C-4). Clients MAY display a "Diperbarui Xs lalu"
        timestamp from `generated_at`.

        **Empty states (DB C-1, C-3):** every count/list may be 0/empty.
        Clients render the empty-state variant from the design system
        (E10-AUDIT §3 P0 gaps).

        **Deep links (DB-5):** each row in `pending_approvals_panel` and
        each card in the agent/leader payload carries a `deep_link` object
        (epic + entity_id + path) the client uses to route into the owning
        epic's screen.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [ETi5H, DhzyL, RiSPW, UMzuO, e8Sw1]
      responses:
        '200':
          description: |
            Dashboard payload. Discriminated by `role`.
          headers:
            Cache-Control:
              description: Server-set cache directive (DB-6).
              schema:
                type: string
                example: "private, max-age=30"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
              examples:
                hrAdmin:
                  summary: HR Admin Sari Hadi opens dashboard
                  value:
                    role: hr_admin
                    role_label: "HR Admin"
                    generated_at: "2026-06-03T07:14:52Z"
                    period_label: "Juni 2026"
                    kpis:
                      active_placements: 482
                      active_companies: 27
                      attendance_rate_pct: 96.2
                      billable_hours_mtd: 38420.5
                      ot_hours_mtd: 1284.0
                      leave_pending: 6
                    expiring_placements_30d: 12
                    expiring_agreements_30d: 4
                    attendance_anomalies_today: 3
                    billable_trend:
                      granularity: day
                      points:
                        - date: "2026-05-28"
                          value: 1240.5
                        - date: "2026-05-29"
                          value: 1310.0
                        - date: "2026-05-30"
                          value: 1198.5
                    pending_approvals_panel:
                      - kind: ATTENDANCE_VERIFY
                        label: "Verifikasi kehadiran"
                        count: 8
                        deep_link:
                          epic: E5
                          path: "/attendance?status=PENDING_VERIFY"
                      - kind: LEAVE_APPROVE
                        label: "Persetujuan cuti"
                        count: 3
                        deep_link:
                          epic: E6
                          path: "/leave-requests?status=PENDING_L1,PENDING_L2"
                      - kind: OT_APPROVE
                        label: "Persetujuan lembur"
                        count: 5
                        deep_link:
                          epic: E7
                          path: "/overtime?status=PENDING"
                      - kind: PLACEMENT_EXPIRING
                        label: "Penempatan akan berakhir"
                        count: 12
                        deep_link:
                          epic: E3
                          path: "/placements?expiring_within=30d"
                superAdmin:
                  summary: Super Admin (same shape, different role label — D1)
                  value:
                    role: super_admin
                    role_label: "Super Admin"
                    generated_at: "2026-06-03T07:14:52Z"
                    period_label: "Juni 2026"
                    kpis:
                      active_placements: 482
                      active_companies: 27
                      attendance_rate_pct: 96.2
                      billable_hours_mtd: 38420.5
                      ot_hours_mtd: 1284.0
                      leave_pending: 6
