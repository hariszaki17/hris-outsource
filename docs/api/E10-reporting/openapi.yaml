                    recent_notifications_unread: 3
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ====================================================================
  # NOTIFICATIONS
  # ====================================================================
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List the current user's notifications (in-app inbox)
      description: |
        Returns the durable in-app notification center for the caller
        (NT-1, NT-2, NT-6). Cursor-paginated per CONVENTIONS §8.

        **Scope:** strictly self — a user only ever sees notifications
        addressed to their `recipient_id` (NT-2). The server enforces;
        no `recipient_id` filter is exposed.

        **Generation:** notifications are NOT created via this API. They
        are dispatched as a side-effect of writes in other epics
        (CONVENTIONS §16.2; NT-3 event catalog):
        schedule published (E4), leave approved/rejected (E6), OT
        approved/rejected/auto-detected (E7), attendance verification
        needed (E5), attendance correction submitted (E5), HR change-
        request submitted (E2), agreement/placement expiring (E2/E3
        cron-driven).

        **Read state filter** (`read_state`): `UNREAD` | `READ` | `ALL`
        (default `ALL`). Wave-1 mobile "Belum dibaca" tab maps to `UNREAD`.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [i0qW8, WKYgI]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: read_state
          in: query
          description: Filter by read state. Default `ALL`.
          required: false
          schema:
            type: string
            enum: [UNREAD, READ, ALL]
            default: ALL
        - name: kind
          in: query
          description: |
            Filter by notification kind (NT-3). Use the multi-value
            `__in` suffix to combine: `?kind__in=LEAVE_APPROVED,OT_APPROVED`.
          required: false
          schema:
            $ref: '#/components/schemas/NotificationKind'
        - name: kind__in
          in: query
          description: Comma-separated list of notification kinds.
          required: false
          schema:
            type: string
            example: "LEAVE_APPROVED,OT_APPROVED,SCHEDULE_PUBLISHED"
      responses:
        '200':
          description: A page of notifications, newest first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
              examples:
                inbox:
                  summary: Mixed inbox for HR Sari Hadi
                  value:
                    data:
                      - id: SWP-NTF-880241
                        kind: LEAVE_REQUEST_SUBMITTED
                        title: "Pengajuan cuti baru"
                        body: "Budi Santoso mengajukan cuti 3 hari (10–12 Jun)."
                        read_at: null
                        created_at: "2026-06-03T06:58:11Z"
                        deep_link:
                          epic: E6
                          entity_id: SWP-LR-1042
                          path: "/leave-requests/SWP-LR-1042"
                        actor:
                          id: SWP-USR-3104
                          label: "Budi Santoso"
                        is_critical: true
                      - id: SWP-NTF-880198
                        kind: ATTENDANCE_VERIFY_NEEDED
                        title: "Verifikasi kehadiran"
                        body: "8 record kehadiran menunggu verifikasi."
                        read_at: "2026-06-03T06:02:00Z"
                        created_at: "2026-06-03T05:45:08Z"
                        deep_link:
                          epic: E5
                          entity_id: null
                          path: "/attendance?status=PENDING_VERIFY"
                        actor:
                          id: null
                          label: "system"
                        is_critical: false
                    next_cursor: "eyJpZCI6IlNXUC1OVEYtODgwMTAwIn0"
                    has_more: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'

  /notifications/count:
    get:
      operationId: getNotificationCount
      tags: [notifications]
      summary: Get the unread-notification count (topbar badge)
      description: |
        Convenience endpoint for the topbar bell badge (web `caFkE`) and
        the mobile bottom-nav indicator. Returns only the unread count —
        cheap & cacheable.

        Clients SHOULD poll this on a low interval (e.g., 60s) rather than
        re-fetching the full list (no SSE/WebSocket in v1, per
        CONVENTIONS §1).
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [caFkE]
      responses:
        '200':
          description: Unread count for the caller.
          content:
            application/json:
              schema:
                type: object
                required: [unread]
                properties:
                  unread:
                    type: integer
                    minimum: 0
                    example: 3
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'

  /notifications/{notification_id}:mark-read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      description: |
        Single-call read-state transition (NT-4; Wave-1 unread→read).
        The server flips `read_at` from `null` to "now" and returns the
        updated `Notification`. Idempotent: a second call with the same
        `Idempotency-Key` returns the same body.

        If the notification is already read, the call is a no-op (200 with
        the existing `read_at` preserved).
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [WslFv, meAQc, LsYPf, eOrnJ, inLk6]
      parameters:
        - $ref: '#/components/parameters/NotificationIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Notification marked as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /notifications/{notification_id}:mark-unread:
    post:
      operationId: markNotificationUnread
      tags: [notifications]
      summary: Mark a single notification as unread
      description: |
        Reverse the read transition (sets `read_at` back to `null`). Used
        when an agent/leader wants to flag a notification for later
        attention. Idempotent.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [i0qW8]
      parameters:
        - $ref: '#/components/parameters/NotificationIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Notification marked as unread.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /notifications:mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Bulk mark-all-read
      description: |
        Marks every notification in the caller's inbox as read in one call
        (web `B9XPDU` "Tandai semua dibaca"). Optional `before_timestamp`
        cutoff scopes the action to notifications created strictly before
        that instant — useful for "mark everything older than today as
        read" patterns. Omit for "all".

        Idempotent on `Idempotency-Key`. Returns the number of records
        affected; the client refetches `/notifications/count` (returns 0
        unless `before_timestamp` was supplied and new items have arrived
        since).
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [B9XPDU]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                before_timestamp:
                  type: string
                  format: date-time
                  description: |
                    Only mark notifications with `created_at < before_timestamp`.
                    Omit to mark all.
                  example: "2026-06-03T00:00:00Z"
      responses:
        '200':
          description: Bulk update completed.
          content:
            application/json:
              schema:
                type: object
                required: [marked_count]
                properties:
                  marked_count:
                    type: integer
                    minimum: 0
                    description: Number of notifications transitioned to READ.
                    example: 12
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'

  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Get notification preferences (disabled stub in v1)
      description: |
        **v1 stub** — per EPICS.md §8 E10 (D10) notifications are all-on
        in v1. This endpoint exists to reserve the IA slot and let the
        client render a "Notification preferences (available in v1.1)"
        disabled affordance per the Wave-1.3 disabled-affordance pattern
        (E10-AUDIT §3 P1).

        Always returns the same payload in v1; never accepts writes.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [i0qW8]
      responses:
        '200':
          description: v1 stub payload — preferences disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
              examples:
                v1Stub:
                  value:
                    enabled: false
                    available_in: "v1.1"
                    message: "Pengaturan notifikasi akan tersedia di v1.1. Semua notifikasi aktif."
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ====================================================================
  # BILLABLE ATTENDANCE REPORT
  # ====================================================================
  /reports/attendance-billable:
    get:
      operationId: getBillableAttendanceReport
      tags: [reports]
      summary: Run the attendance & billable-hours report
      description: |
        The v1 priority report (BR-1..BR-7). Aggregates **verified**
        attendance records (E5) recorded against **billable** attendance
        codes (E2 `is_billable=true`) into hours by the requested
        grouping.

        **Data sources:**
        - E5 `Attendance` filtered by `is_verified=true` (BR-1, INV-4).
        - E2 `AttendanceCode` for the `is_billable` predicate.
        - E3 `Placement` for `company_id`, `service_line_id`, and to split
          hours across companies when an agent transferred mid-period
          (BR-7, C-3).
        - E2 `ClientCompany`, `ServiceLine`, `Employee` for display labels.

        **Cross-midnight (BR-7, C-4):** hours are counted once to the
        shift's start date (avoids double-counting).

        **Hours only (BR-5; EPICS §8 D-default):** no rates, no amounts.

        **Pending callout (BR-6, C-1, E10-AUDIT Wave-2 HIGH):** the
        summary always includes a `pending_summary` block counting
        unverified records in the same period — surfaced as a callout
        ("8j belum bisa ditagih") so HR can chase verification. Pending
        records are NOT included in `total_billable_hours`.

        **Scope (BR-4):**
        - HR / Super Admin → `company_id` optional; omit to span all
          companies.
        - Shift leader → `company_id` MUST equal the leader's assigned
          company (E3 INV-3); other values → 403 `OUT_OF_SCOPE`.

        **Period cap:** the server caps the date range to 1 year for
        performance. Requests over the cap return 422
        `REPORT_PERIOD_TOO_WIDE`.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader]
        scope: company_or_global
      x-design-screens: [EF8AZ, IZPG8]
      parameters:
        - name: company_id
          in: query
          description: |
            Client company filter. Required for `shift_leader` (must
            equal their assigned company). Optional for HR/Super Admin
            (omit for cross-company).
          required: false
          schema:
            type: string
            example: SWP-CMP-0021
        - name: service_line_id
          in: query
          description: Optional service-line filter (E2).
          required: false
          schema:
            type: string
            example: SWP-SVC-001
        - name: period_start
          in: query
          description: Inclusive start date (ISO `full-date`). Required.
          required: true
          schema:
            type: string
            format: date
            example: "2026-06-01"
        - name: period_end
          in: query
          description: |
            Inclusive end date. Required. `end < start` → 400.
            Range over 1 year → 422 `REPORT_PERIOD_TOO_WIDE`.
          required: true
          schema:
            type: string
            format: date
            example: "2026-06-30"
        - name: group_by
          in: query
