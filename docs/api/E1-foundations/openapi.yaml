openapi: 3.1.0
info:
  title: HRIS Outsource — E1 Foundations API
  version: 1.0.0
  description: |
    OpenAPI 3.1 contract for the **E1 Foundations** epic of SWP's HRIS rebuild.

    Covers authentication & sessions (F1.1), RBAC user management (F1.2),
    the comprehensive audit log (F1.3), and read-only platform settings (F1.4).

    This spec inherits binding rules from `docs/api/CONVENTIONS.md` — base URL,
    auth header, pagination shape, error envelope, RBAC extension semantics,
    timestamp/id formats. Do not duplicate those rules here.

    PRD refs in operation descriptions point to:
      - `authentication.md` (AU-1..AU-7, C-1..C-4)
      - `rbac-roles.md` (RB-1..RB-7, C-1..C-4)
      - `audit-log.md` (AL-1..AL-7, C-1..C-4)
      - `platform-conventions.md` (PC-1..PC-6)

    Audit log writes are IMPLICIT for every mutation — per CONVENTIONS.md §16.1
    we do NOT add audit fields to endpoint bodies.
  contact:
    name: SWP HRIS — product & architecture
  license:
    name: Proprietary — PT Saranawisesa Properindo
servers:
  - url: https://api.swp.example.com/api/v1
    description: Production
  - url: https://staging-api.swp.example.com/api/v1
    description: Staging

tags:
  - name: authentication
    description: |
      Identifier (phone or email) + password login, refresh, logout,
      forgot/reset password, current user introspection. PRD F1.1 /
      `authentication.md`. Login + forgot-password are the only two
      unauthenticated endpoints in the entire system (CONVENTIONS §1).
  - name: users
    description: |
      User account CRUD, role assignment, deactivation/reactivation,
      HR-initiated password reset, bulk deactivation. PRD F1.2 / `rbac-roles.md`.
      A `User` is the login credential — its 1:1 link to an `Employee`
      (`SWP-EMP-*`) is owned by E2.
  - name: audit-log
    description: |
      Read-only access to the immutable, append-only audit log. PRD F1.3 /
      `audit-log.md`. Writes are implicit on every mutating endpoint across
      every epic (CONVENTIONS §16.1).
  - name: platform
    description: |
      Read-only platform settings (locale, timezone, currency, version, data
      source). PRD F1.4 / `platform-conventions.md`. v1 has no PUT endpoint —
      these values are locked per `EPICS.md` §8 E1.

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # --------------------------------------------------------------------- AUTH
  /auth/login:
    post:
      operationId: authLogin
      tags: [authentication]
      summary: Log in with phone or email + password
      description: |
        Authenticates a user (AU-1) by `identifier` — their phone number
        (E.164, e.g. `+62...`) or email — plus password, and, if the account
        is **active** (AU-2),
        issues an access + refresh token pair and records `last_login_at`
        (AU-3). Repeated failures trigger rate-limit / lockout (AU-5).
        Auth events are audited (AU-7) — that side-effect is implicit
        (CONVENTIONS §16.1).

        This is one of the only two unauthenticated endpoints in the system
        (the other is `/auth/forgot-password`).
      x-rbac:
        roles: [public]
        scope: global
      x-design-screens: [lKRjr, Y09E0]
      security: []  # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              hrAdminLogin:
                summary: HR Admin Sari Hadi logs in by email (web)
                value:
                  identifier: sari.hadi@swp.co.id
                  password: "Pass1ng-Garuda!"
                  stay_signed_in: false
              agentMobileLogin:
                summary: Agent Budi Santoso logs in by phone (mobile)
                value:
                  identifier: "+6281233445566"
                  password: "Lor3m-Ipsum-2026"
                  stay_signed_in: true
      responses:
        '200':
          description: Authenticated. Tokens issued; `last_login_at` updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "rt_01J7K3VQHM4XYZ8N5R2T9PWB6F"
                    token_type: Bearer
                    expires_in: 1800
                    user:
                      id: SWP-USR-1042
                      phone: "+628111000042"
                      email: sari.hadi@swp.co.id
                      role: hr_admin
                      status: ACTIVE
                      employee_id: SWP-EMP-1042
                      full_name: Sari Hadi
                      last_login_at: "2026-06-03T07:14:52Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: |
            Authentication failed. The `code` distinguishes the failure
            class so the client can render the right UI state (AU-2, AU-5,
            C-2 of `authentication.md`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidCredentials:
                  summary: Wrong identifier or password (AU-1 fail)
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: "Nomor telepon/email atau kata sandi salah."
                      request_id: req_01J7K3W2BX
                accountDisabled:
                  summary: Account is disabled (AU-2)
                  value:
                    error:
                      code: ACCOUNT_DISABLED
                      message: "Akun Anda nonaktif. Hubungi admin."
                      request_id: req_01J7K3W2BY
                accountLocked:
                  summary: Account temporarily locked (AU-5)
                  value:
                    error:
                      code: ACCOUNT_LOCKED
                      message: "Akun dikunci sementara. Coba lagi dalam 15 menit."
                      request_id: req_01J7K3W2BZ
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      operationId: authLogout
      tags: [authentication]
      summary: Log out the current session
      description: |
        Invalidates the current access + refresh token (AU-6). Subsequent
        requests with the same token return 401. Auth event is audited.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [caFkE]
      responses:
        '204':
          description: Logged out. No body.
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [authentication]
      summary: Exchange a refresh token for a new access token
      description: |
        Used by the mobile app for silent renewal (AU-6, C-3 of
        `authentication.md`). The old access token is invalidated; the
        refresh token MAY be rotated (server's choice). Disabled accounts
        receive 401 `ACCOUNT_DISABLED` (AU-2) — refresh also fails with this
        code when the user was disabled since the token was issued, caught by
        the same per-request status + session-epoch (`tokens_valid_after`)
        check (F2.7).
      x-rbac:
        roles: [public]
        scope: global
      x-design-screens: []
      security: []  # presented refresh_token is the credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: Opaque refresh token obtained from `/auth/login`.
                  example: rt_01J7K3VQHM4XYZ8N5R2T9PWB6F
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh token invalid, expired, or revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                expired:
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: "Sesi berakhir. Silakan masuk kembali."
                      request_id: req_01J7K3W2C0

  /auth/forgot-password:
    post:
      operationId: authForgotPassword
      tags: [authentication]
      summary: Request a password-reset email
      description: |
        Sends a reset link to the user's email if the account exists (AU-4).
        Per C-2 of `authentication.md` the response is **generic** — it does
        NOT reveal whether the email is registered — to prevent account
        enumeration. Always returns 202 unless the request itself is
        malformed.

        This reset channel is **email-delivered** and therefore requires the
        account to have an email on file; phone-only accounts cannot use it
        (out of scope here).

        This is one of the only two unauthenticated endpoints in the system.
      x-rbac:
        roles: [public]
        scope: global
      x-design-screens: [lKRjr, Y09E0]
      security: []  # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: sari.hadi@swp.co.id
      responses:
        '202':
          description: |
            Accepted. If the email matches an active account, a reset link is
            dispatched asynchronously. Response is identical regardless
            (anti-enumeration, C-2).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Jika email terdaftar, tautan reset telah dikirim."
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [authentication]
      summary: Set a new password using a reset token
      description: |
        Verifies the email-delivered reset token and sets a new password
        (AU-4). Token is single-use and time-limited. Password must meet
        the platform password policy — violations return 422
        `WEAK_PASSWORD`. Successful reset invalidates all of the user's
        existing sessions (AU-6).
      x-rbac:
        roles: [public]
        scope: global
      x-design-screens: []
      security: []  # presented reset_token is the credential
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reset_token, new_password]
              properties:
                reset_token:
                  type: string
                  description: Opaque single-use token from the reset email.
                  example: prt_01J7K3VQHM4XYZ8N5R2T9PWB6F
                new_password:
                  type: string
                  format: password
                  minLength: 10
                  description: New password. Must satisfy platform policy.
                  example: "Pass1ng-Garuda!"
      responses:
        '204':
          description: Password updated; existing sessions invalidated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Reset token invalid, expired, or already used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                expired:
                  value:
                    error:
                      code: RESET_TOKEN_EXPIRED
                      message: "Tautan reset sudah kedaluwarsa. Mohon minta tautan baru."
                      request_id: req_01J7K3W2C1
        '422':
          description: Password did not meet policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                weakPassword:
                  value:
                    error:
                      code: WEAK_PASSWORD
                      message: "Kata sandi tidak memenuhi kebijakan."
                      fields:
                        new_password: "Minimal 10 karakter, harus mengandung huruf besar, kecil, angka, dan simbol."
                      request_id: req_01J7K3W2C2

  /auth/me:
    get:
      operationId: authMe
      tags: [authentication]
      summary: Get the currently-authenticated user
      description: |
        Returns identity, role, and employee link of the bearer of the
        current access token. Drives the topbar user pill, role-based
        nav (PC-4), and any "self-scope" UI gating.
      x-rbac:
        roles: [super_admin, hr_admin, shift_leader, agent]
        scope: self
      x-design-screens: [caFkE]
      responses:
        '200':
          description: Current user info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              examples:
                hrAdmin:
                  summary: Sari Hadi (HR Admin)
                  value:
                    id: SWP-USR-1042
                    phone: "+628111000042"
                    email: sari.hadi@swp.co.id
                    role: hr_admin
                    status: ACTIVE
                    employee_id: SWP-EMP-1042
                    full_name: Sari Hadi
                    last_login_at: "2026-06-03T07:14:52Z"
                    scope:
                      type: global
                      company_id: null
                shiftLeader:
                  summary: Rudi Wijaya (Shift Leader, Plaza Senayan)
                  value:
                    id: SWP-USR-1108
                    phone: "+628111000108"
                    email: rudi.wijaya@swp.co.id
                    role: shift_leader
                    status: ACTIVE
                    employee_id: SWP-EMP-1108
                    full_name: Rudi Wijaya
                    last_login_at: "2026-06-03T05:48:11Z"
                    scope:
                      type: company
                      company_id: SWP-CMP-0021
                agent:
                  summary: Budi Santoso (Agent, phone-only login)
                  value:
                    id: SWP-USR-2891
                    phone: "+6281233445566"
                    email: null
                    role: agent
                    status: ACTIVE
                    employee_id: SWP-EMP-2891
                    full_name: Budi Santoso
                    last_login_at: "2026-06-03T06:01:08Z"
                    scope:
                      type: self
                      company_id: null
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # -------------------------------------------------------------------- USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List user accounts
      description: |
        Paginated, filterable list of user accounts (RB-1, RB-5). Backs the
        **Pengguna & Peran** screen (`kHNWT`). Visible only to `hr_admin` and
        `super_admin` — per RB-5 and `EPICS.md` §8 E1 (role assignment is
        their responsibility).
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
        - name: role
          in: query
          description: Filter by role.
          schema:
            $ref: '#/components/schemas/Role'
        - name: status
          in: query
          description: Filter by account status.
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: company_id
          in: query
          description: |
            Filter shift leaders by their assigned company (E3). Only
            meaningful with `role=shift_leader`.
          schema:
            type: string
            example: SWP-CMP-0021
      responses:
        '200':
          description: A page of users.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
              examples:
                firstPage:
                  value:
                    data:
                      - id: SWP-USR-1042
                        phone: "+628111000042"
                        email: sari.hadi@swp.co.id
                        role: hr_admin
                        status: ACTIVE
                        employee_id: SWP-EMP-1042
                        full_name: Sari Hadi
                        company_id: null
                        company_name: null
                        last_login_at: "2026-06-03T07:14:52Z"
                        created_at: "2025-11-02T03:22:08Z"
                        updated_at: "2026-06-03T07:14:52Z"
                      - id: SWP-USR-1108
                        phone: "+628111000108"
                        email: rudi.wijaya@swp.co.id
                        role: shift_leader
                        status: ACTIVE
                        employee_id: SWP-EMP-1108
                        full_name: Rudi Wijaya
                        company_id: SWP-CMP-0021
                        company_name: Plaza Senayan
                        last_login_at: "2026-06-03T05:48:11Z"
                        created_at: "2025-12-15T01:10:00Z"
                        updated_at: "2026-06-03T05:48:11Z"
                      - id: SWP-USR-2891
                        phone: "+6281233445566"
                        email: null
                        role: agent
                        status: ACTIVE
                        employee_id: SWP-EMP-2891
                        full_name: Budi Santoso
                        company_id: SWP-CMP-0021
                        company_name: Plaza Senayan
                        last_login_at: "2026-06-03T06:01:08Z"
                        created_at: "2026-01-04T02:00:00Z"
                        updated_at: "2026-06-03T06:01:08Z"
                    next_cursor: "eyJpZCI6IlNXUC1VU1ItMjg5MSJ9"
                    has_more: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

    # NOTE: There is no standalone "create user" endpoint. Per D1
    # (2026-06-07) every Employee auto-provisions a 1:1 login at create
    # (E2 `POST /employees`), so user accounts are never created on their
    # own. User management here is read + role/status/credential mutation.

  /users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user account
      description: User detail view (RB-1, RB-5). Backs the row-action "Edit" / "Detail" flow on `kHNWT`.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      responses:
        '200':
          description: User found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update non-role fields of a user
      description: |
        Updates editable user fields (e.g., email). Role changes go through
        the dedicated `:change-role` action (RB-6). Body contains only the
        fields to change.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            examples:
              changeEmail:
                value:
                  email: sari.hadi-baru@swp.co.id
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/{user_id}:change-role:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: changeUserRole
      tags: [users]
      summary: Change a user's role
      description: |
        Promotes/demotes a user to a different fixed role (RB-1, RB-6).
        Separated from `PATCH /users/{id}` because it is an explicitly
        audited promotion — both per RB-6 and per `EPICS.md` §8 E1
        (super_admin + hr_admin may assign roles).

        This action only sets the stored `users.role` field, which is
        advisory. Shift-leader status is NOT governed by this field: it is
        governed by the E3 `ShiftLeaderAssignment` (assign/revoke on the
        company's Pemimpin Shift tab). The effective `shift_leader` role and
        company scope are derived server-side at request time from the active
        assignment (INV-3) — so this action neither creates nor ends an
        assignment, and changing the stored role does not, by itself, grant
        or remove leader access.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_role]
              properties:
                new_role:
                  $ref: '#/components/schemas/Role'
                reason:
                  type: string
                  description: Optional human-readable reason; surfaced in the audit detail.
                  maxLength: 500
                  example: "Promosi menjadi HR Admin per memo MIG-2891"
            examples:
              promoteToHrAdmin:
                value:
                  new_role: hr_admin
                  reason: "Promosi menjadi HR Admin per memo MIG-2891"
      responses:
        '200':
          description: Role changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: The requested role transition is not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                roleNotAllowed:
                  value:
                    error:
                      code: ROLE_NOT_ALLOWED
                      message: "Perubahan peran tidak diizinkan."
                      fields:
                        new_role: "Hanya super_admin yang dapat mempromosikan ke super_admin."
                      request_id: req_01J7K3W2C5

  /users/{user_id}:deactivate:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate (soft-disable) a user account
      description: |
        Sets the user's `status` to `DISABLED` (RB-1). Per AU-2, disabled
        accounts cannot log in; per AU-6, all of their active sessions are
        revoked immediately. Audited per RB-6.

        Revocation mechanism (F2.7): this bumps `users.tokens_valid_after`
        (the session epoch) and calls `RevokeAllRefreshForUser`. Already-issued
        access tokens remain cryptographically valid, but fail the epoch check
        (`tokens_valid_after > token.iat`) on their next middleware validation —
        so revocation is instant without a per-token denylist. This is the only
        path that revokes login.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for the audit record.
                  maxLength: 500
                  example: "Karyawan keluar per 2026-05-31"
      responses:
        '200':
          description: User deactivated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/{user_id}:reactivate:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: reactivateUser
      tags: [users]
      summary: Reactivate a deactivated user account
      description: |
        Sets the user's `status` back to `ACTIVE`. Does NOT restore prior
        sessions (those remain revoked). The user may log in again from a
        clean state.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  example: "Karyawan kembali bekerja"
      responses:
        '200':
          description: User reactivated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/{user_id}:send-password-reset:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      operationId: sendUserPasswordReset
      tags: [users]
      summary: HR-initiated password reset
      description: |
        Dispatches a password-reset email to the target user (AU-4 variant
        for HR/admin convenience — same flow as `/auth/forgot-password` but
        invoked by an admin against a chosen user instead of by the user
        themselves). Mentioned in `E1-AUDIT.md` §2.1 BLOCKER row-actions.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      responses:
        '202':
          description: Reset email queued for dispatch.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tautan reset dikirim ke sari.hadi@swp.co.id."
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users:bulk-deactivate:
    post:
      operationId: bulkDeactivateUsers
      tags: [users]
      summary: Deactivate multiple users in one call
      description: |
        Bulk variant of `/users/{id}:deactivate` (RB-1). Per CONVENTIONS §14
        bulk endpoints accept a list of IDs, return a partial-success
        envelope (`succeeded[]` / `failed[]`), require `Idempotency-Key`,
        and write one audit entry per affected entity (CONVENTIONS §16.1 +
        `EPICS.md` §8 E1 "bulk actions audited per affected row").
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [kHNWT]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    type: string
                    example: SWP-USR-2891
                reason:
                  type: string
                  description: Optional reason recorded against every affected row.
                  maxLength: 500
                  example: "Penutupan kontrak Plaza Senayan 2026-05-31"
            examples:
              endOfContract:
                value:
                  ids:
                    - SWP-USR-2891
                    - SWP-USR-2892
                    - SWP-USR-2893
                  reason: "Penutupan kontrak Plaza Senayan 2026-05-31"
      responses:
        '200':
          description: At least one user was deactivated. Inspect `failed[]` for partial failures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResult'
              examples:
                partialSuccess:
                  value:
                    succeeded:
                      - SWP-USR-2891
                      - SWP-USR-2892
                    failed:
                      - id: SWP-USR-2893
                        error:
                          code: CONFLICT
                          message: "Sudah nonaktif."
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: All rows failed (no row could be deactivated).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResult'

  # ------------------------------------------------------------- AUDIT LOG
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit-log]
      summary: List audit entries
      description: |
        Cursor-paginated read of the immutable audit log (AL-1, AL-3, AL-5).
        Sensitive values are masked per AL-4. Access restricted to HR /
        Super Admin (AL-7).

        Cursor pagination is REQUIRED per CONVENTIONS §8 (heavy table —
        offset pagination forbidden for tables exceeding 100k rows).
        Default sort: `created_at:desc`.
      x-rbac:
        roles: [super_admin, hr_admin]
        scope: global
      x-design-screens: [rtJRB]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Query'
        - name: actor_user_id
          in: query
          description: Filter by acting user.
          schema:
            type: string
            example: SWP-USR-1042
        - name: action
          in: query
          description: Filter by action verb (e.g., `placement.transfer`, `attendance.verify`).
          schema:
            type: string
            example: placement.transfer
        - name: entity_type
          in: query
          description: Filter by entity type (e.g., `placement`, `attendance`, `user`).
          schema:
            type: string
            example: placement
        - name: entity_id
          in: query
          description: Filter by a specific entity (full prefixed ID, e.g., `SWP-PL-882`).
          schema:
            type: string
            example: SWP-PL-882
        - name: created_at__gte
          in: query
          description: Earliest `created_at` (inclusive, ISO-8601 UTC).
          schema:
            type: string
            format: date-time
            example: "2026-05-01T00:00:00Z"
        - name: created_at__lte
          in: query
          description: Latest `created_at` (inclusive, ISO-8601 UTC).
          schema:
            type: string
            format: date-time
            example: "2026-05-31T23:59:59Z"
      responses:
        '200':
          description: A page of audit entries (summary projection).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLogEntrySummary'
              examples:
                firstPage:
                  value:
                    data:
                      - id: SWP-AL-1204381
                        actor_user_id: SWP-USR-1042
                        actor_label: "Sari Hadi · HR Admin"
                        action: leave_request.approve_l2
                        entity_type: leave_request
                        entity_id: SWP-LR-1042
                        change_summary: "status: PENDING_L2 → APPROVED"
                        ip: "10.32.18.221"
                        created_at: "2026-06-03T07:14:52Z"
                      - id: SWP-AL-1204380
                        actor_user_id: SWP-USR-1108
                        actor_label: "Rudi Wijaya · Shift Leader · Plaza Senayan"
                        action: attendance.verify
                        entity_type: attendance
                        entity_id: SWP-ATT-10711
                        change_summary: "verified_at: null → 2026-06-03T07:11:30Z"
                        ip: "10.32.18.198"
                        created_at: "2026-06-03T07:11:30Z"
                      - id: SWP-AL-1204379
                        actor_user_id: null
                        actor_label: "system · auto-clock-out"
                        action: attendance.auto_close
                        entity_type: attendance
                        entity_id: SWP-ATT-10705
                        change_summary: "clock_out_at: null → 2026-06-03T06:00:00Z"
                        ip: null
                        created_at: "2026-06-03T06:00:00Z"
                    next_cursor: "eyJpZCI6IlNXUC1BTC0xMjA0Mzc5In0"
                    has_more: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /audit-log/{audit_log_id}:
