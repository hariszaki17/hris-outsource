# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:

  # ------------------------------------------------------------------ SECURITY
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT-or-opaque
      description: |
        `Authorization: Bearer <token>`. Token format is treated as opaque
        by clients (CONVENTIONS §3). Issued by `/auth/login` and
        `/auth/refresh`.

  # --------------------------------------------------------------- PARAMETERS
  parameters:
    Cursor:
      name: cursor
      in: query
      description: Opaque pagination cursor from the previous page's `next_cursor`.
      required: false
      schema:
        type: string
        example: "eyJpZCI6IlNXUC1BTC0xMjA0MzgwIn0"
    Limit:
      name: limit
      in: query
      description: Page size. Default 50, server max 200 (heavy tables may cap lower).
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Sort:
      name: sort
      in: query
      description: |
        Comma-separated `field:direction` pairs (e.g.,
        `created_at:desc,id:desc`). Endpoint-specific sortable fields
        documented per operation.
      required: false
      schema:
        type: string
        example: "created_at:desc"
    Query:
      name: q
      in: query
      description: Free-text search across the endpoint's documented searchable fields.
      required: false
      schema:
        type: string
        example: "sari"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: |
        Client-generated UUID v4 (CONVENTIONS §13). The server caches the
        response under this key for 24 h — replaying with the same body
        returns the same response; replaying with a different body returns
        409 `IDEMPOTENCY_KEY_REUSED`.
      required: true
      schema:
        type: string
        format: uuid
        example: "3c7e9a48-1c3d-4b3a-9f1a-2b1f2cf3a401"
    UserIdPath:
      name: user_id
      in: path
      description: Full prefixed user ID (`SWP-USR-...`).
      required: true
      schema:
        type: string
        example: SWP-USR-1042
    AuditLogIdPath:
      name: audit_log_id
      in: path
      description: Full prefixed audit-log entry ID (`SWP-AL-...`).
      required: true
      schema:
        type: string
        example: SWP-AL-1204381

  # -------------------------------------------------------------- RESPONSES
  responses:
    BadRequest:
      description: |
        Validation failed (malformed JSON, missing required field, bad query
        param, etc.). Per CONVENTIONS §11, `error.fields` may carry
        field-level messages.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            missingField:
              value:
                error:
                  code: INVALID_REQUEST
                  message: "Permintaan tidak valid."
                  fields:
                    email: "Wajib diisi."
                  request_id: req_01J7K3W2C8
    Unauthenticated:
      description: |
        Missing, invalid, or expired access token. Client must re-authenticate.
        Web/mobile clients render `comp/EmptySessionExpired`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            expired:
              value:
                error:
                  code: UNAUTHENTICATED
                  message: "Sesi berakhir. Silakan masuk kembali."
                  request_id: req_01J7K3W2C9
    Forbidden:
      description: |
        Authenticated but role lacks permission for this resource/action
        (RB-2). Client renders `comp/EmptyNoPermission`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            forbidden:
              value:
                error:
                  code: FORBIDDEN
                  message: "Anda tidak memiliki izin untuk tindakan ini."
                  request_id: req_01J7K3W2CA
    NotFound:
      description: Resource does not exist or caller lacks visibility (treated the same to avoid leaking).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            notFound:
              value:
                error:
                  code: NOT_FOUND
                  message: "Sumber tidak ditemukan."
                  request_id: req_01J7K3W2CB
    RateLimited:
      description: Too many requests (CONVENTIONS §19).
      headers:
        Retry-After:
          description: Seconds the client should wait before retrying.
          schema:
            type: integer
            example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            rateLimited:
              value:
                error:
                  code: RATE_LIMITED
                  message: "Terlalu banyak permintaan. Coba lagi sebentar."
                  request_id: req_01J7K3W2CC

  # ----------------------------------------------------------------- SCHEMAS
  schemas:

    # -- common envelopes ----------------------------------------------------
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: UPPER_SNAKE_CASE machine-readable error code (CONVENTIONS §11).
              example: INVALID_CREDENTIALS
            message:
              type: string
              description: Human-readable message, defaults to Bahasa Indonesia.
              example: "Nomor telepon/email atau kata sandi salah."
            fields:
              type: object
              description: |
                Field-level errors (400 / 422 only). Keys are field names
                from the request body.
              additionalProperties:
                type: string
              example:
                email: "Wajib diisi."
            request_id:
              type: string
              description: Server-assigned request identifier for support.
              example: req_01J7K3W2C8

    CursorPage:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          description: Page of items (typed per endpoint).
          items: {}
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; `null` if `has_more` is false.
          example: "eyJpZCI6IlNXUC1BTC0xMjA0Mzc5In0"
        has_more:
          type: boolean
          example: true

    BulkResult:
      type: object
      required: [succeeded, failed]
      properties:
        succeeded:
          type: array
          description: IDs that were processed successfully.
          items:
            type: string
            example: SWP-USR-2891
        failed:
          type: array
          items:
            type: object
            required: [id, error]
            properties:
              id:
                type: string
                example: SWP-USR-2893
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    example: CONFLICT
                  message:
                    type: string
                    example: "Sudah nonaktif."

    # -- enums --------------------------------------------------------------
    Role:
      type: string
      description: |
        The four fixed roles (RB-1 / INV-2). Not user-extensible in v1.
      enum:
        - super_admin
        - hr_admin
        - shift_leader
        - agent
      example: hr_admin

    UserStatus:
      type: string
      description: Lifecycle status of a user account.
      enum:
        - ACTIVE
        - DISABLED
      example: ACTIVE

    ScopeType:
      type: string
      description: |
        Effective access scope (CONVENTIONS §17). For `shift_leader` the
        scope is derived at request time from the active E3
        `ShiftLeaderAssignment` (INV-3).
      enum:
        - global
        - company
        - self
      example: global

    # -- auth ---------------------------------------------------------------
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: |
            Login identifier — either the user's phone number (E.164,
            `+62...`) or their email. Phone is always present; email only
            for accounts that have one on file (D2, 2026-06-07).
          example: sari.hadi@swp.co.id
        password:
          type: string
          format: password
          minLength: 1
          example: "Pass1ng-Garuda!"
        stay_signed_in:
          type: boolean
          description: |
            If true, the issued refresh token is long-lived (mobile
            "Tetap masuk"). AU-3 / C-3.
          default: false
          example: true

    LoginResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
          description: Bearer token for the `Authorization` header.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: Opaque token used at `/auth/refresh`. AU-6.
          example: rt_01J7K3VQHM4XYZ8N5R2T9PWB6F
        token_type:
          type: string
          enum: [Bearer]
          example: Bearer
        expires_in:
          type: integer
          description: Access-token TTL in seconds (per CONVENTIONS §3 ~15-60 min).
          example: 1800
        user:
          $ref: '#/components/schemas/MeResponse'

    RefreshResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: Present if the refresh token was rotated; absent otherwise.
          example: rt_01J7M4XQHM4XYZ8N5R2T9PWB6F
        token_type:
          type: string
          enum: [Bearer]
          example: Bearer
        expires_in:
          type: integer
          example: 1800

    MeResponse:
      type: object
      required: [id, phone, role, status, employee_id, full_name]
      properties:
        id:
          type: string
          description: User ID. `SWP-USR-<numeric>`.
          example: SWP-USR-1042
        phone:
          type: string
          description: Login phone identifier (E.164, `+62...`). Always present (D2).
          example: "+628111000042"
        email:
          type: string
          format: email
          nullable: true
          description: Optional login email; `null` for phone-only accounts (D2).
          example: sari.hadi@swp.co.id
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/UserStatus'
        employee_id:
          type: string
          description: 1:1 link to E2 Employee (INV-1).
          example: SWP-EMP-1042
        full_name:
          type: string
          description: Convenience — denormalized from the linked Employee.
          example: Sari Hadi
        last_login_at:
          type: string
          format: date-time
          nullable: true
          description: Previous login. `null` on first-ever login.
          example: "2026-06-03T07:14:52Z"
        scope:
          type: object
          description: Effective access scope.
          required: [type]
          properties:
            type:
              $ref: '#/components/schemas/ScopeType'
            company_id:
              type: string
              nullable: true
              description: |
                Present (non-null) only when `type=company` — the
                shift leader's E3 assigned company.
              example: SWP-CMP-0021

    # -- users --------------------------------------------------------------
    User:
      type: object
      required: [id, phone, role, status, employee_id, full_name, created_at, updated_at]
      properties:
        id:
          type: string
          example: SWP-USR-1042
        phone:
          type: string
          description: Login phone identifier (E.164, `+62...`). Required, unique (D2).
          example: "+628111000042"
        email:
          type: string
          format: email
          nullable: true
          description: Optional login email; unique when present, else `null` (D2).
          example: sari.hadi@swp.co.id
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/UserStatus'
        employee_id:
          type: string
          description: 1:1 link to the Employee (INV-1, E2).
          example: SWP-EMP-1042
        full_name:
          type: string
          description: Denormalized for list rendering.
          example: Sari Hadi
        company_id:
          type: string
          nullable: true
          description: |
            For `shift_leader`, the currently-assigned client company (E3,
            INV-3). `null` for other roles or if no active assignment.
          example: SWP-CMP-0021
        company_name:
          type: string
          nullable: true
          description: Denormalized company display name (E2).
          example: Plaza Senayan
        last_login_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-03T07:14:52Z"
        created_at:
          type: string
          format: date-time
          description: Server-set. Clients MUST NOT send (CONVENTIONS §10).
          example: "2025-11-02T03:22:08Z"
        updated_at:
          type: string
          format: date-time
          description: Server-set. Clients MUST NOT send (CONVENTIONS §10).
          example: "2026-06-03T07:14:52Z"

    # CreateUserRequest removed (D1, 2026-06-07): users are no longer created
    # standalone — every Employee auto-provisions its 1:1 login at create (E2).

    UpdateUserRequest:
      type: object
      description: |
        Partial update — only non-role mutable fields. Role changes go
        through `/users/{id}:change-role`. Status changes through the
        `:deactivate` / `:reactivate` actions.
      properties:
        phone:
          type: string
          description: Login phone identifier (E.164, `+62...`). Unique (D2).
          example: "+628111000042"
        email:
          type: string
          format: email
          nullable: true
          description: Optional login email; unique when present (D2).
          example: sari.hadi-baru@swp.co.id

    # -- audit log ---------------------------------------------------------
    AuditLogEntrySummary:
      type: object
      description: |
        Lightweight projection for the audit-log list (`rtJRB`). Omits
        full `before`/`after` snapshots; surfaces a one-line
        `change_summary` for the table's "Perubahan" column.
      required: [id, action, entity_type, entity_id, change_summary, created_at]
      properties:
        id:
          type: string
          example: SWP-AL-1204381
        actor_user_id:
          type: string
          nullable: true
          description: Null when the actor is `system` (AL-6).
          example: SWP-USR-1042
        actor_label:
          type: string
          description: |
            Display label combining actor name + role + company (if leader).
            "system · <context>" when `actor_user_id` is null.
          example: "Sari Hadi · HR Admin"
        action:
          type: string
          description: Dotted action verb (e.g., `placement.transfer`, `attendance.verify`).
          example: leave_request.approve_l2
        entity_type:
          type: string
          description: Snake-case entity (e.g., `leave_request`, `attendance`, `user`).
          example: leave_request
        entity_id:
          type: string
          description: Full prefixed ID of the affected entity.
          example: SWP-LR-1042
        change_summary:
          type: string
          description: |
            One-line human summary suitable for the table's Perubahan column.
            Sensitive values are masked here too (AL-4).
          example: "status: PENDING_L2 → APPROVED"
        ip:
          type: string
          nullable: true
          description: Source IP; null for system actions.
          example: "10.32.18.221"
        created_at:
          type: string
          format: date-time
          example: "2026-06-03T07:14:52Z"

    AuditLogEntry:
      allOf:
        - $ref: '#/components/schemas/AuditLogEntrySummary'
        - type: object
          required: [before, after, request_id]
          properties:
            before:
              type: object
              description: |
                Pre-mutation snapshot (AL-2). Sensitive fields (comp/payroll)
                are masked to `"***"` per AL-4. `{}` for create actions.
              additionalProperties: true
              example:
                status: PENDING_L2
                approved_l2_at: null
            after:
              type: object
              description: |
                Post-mutation snapshot (AL-2). Same masking rule as `before`.
                `{}` for delete actions.
              additionalProperties: true
              example:
                status: APPROVED
                approved_l2_at: "2026-06-03T07:14:52Z"
            request_id:
              type: string
              description: Correlates back to the originating API request.
              example: req_01J7K3W2C6

    # -- platform settings -------------------------------------------------
    PlatformSetting:
      type: object
      description: |
        One read-only platform setting. `locked: true` marks v1 values that
        have no PUT endpoint (per `EPICS.md` §8 E1). The chevron-row UI on
        `m3sWh` reads these (E1-AUDIT §2.1 noted those chevrons should NOT
        navigate to edit — they may open a read-only info drawer).
      required: [value, label, locked]
      properties:
        value:
          type: string
          description: Machine-readable value.
          example: id-ID
        label:
          type: string
          description: Human-readable label (Bahasa Indonesia).
          example: "Bahasa Indonesia"
        locked:
          type: boolean
          description: True if v1 has no PUT endpoint for this setting.
          example: true

    PlatformSettings:
      type: object
      description: |
        Read-only snapshot of all platform settings. All fields locked in v1.
      required:
        - locale
        - timezone
        - date_format
        - currency
        - version
        - stack
        - legacy_data_source
      properties:
        locale:
          $ref: '#/components/schemas/PlatformSetting'
        timezone:
          $ref: '#/components/schemas/PlatformSetting'
        date_format:
          $ref: '#/components/schemas/PlatformSetting'
        currency:
          $ref: '#/components/schemas/PlatformSetting'
        version:
          $ref: '#/components/schemas/PlatformSetting'
        stack:
          $ref: '#/components/schemas/PlatformSetting'
        legacy_data_source:
          $ref: '#/components/schemas/PlatformSetting'

# ---------------------------------------------------------------------------
# GLOBAL SECURITY
